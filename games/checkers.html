<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Checkers Classic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        #gameContainer {
            display: none;
            flex-direction: row;
            gap: 20px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .sidebar {
            width: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 10px;
            background: #0a0a0a;
            border: 2px solid #8B4513;
            border-radius: 4px;
            font-size: 12px;
        }

        .sidebar-item {
            text-align: center;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #8B4513;
            border-radius: 4px;
            margin: 5px 0;
        }

        .sidebar-label {
            color: #DAA520;
            font-weight: bold;
            font-size: 11px;
        }

        .sidebar-value {
            color: #fff;
            font-size: 14px;
            margin-top: 5px;
        }

        #canvas {
            border: 3px solid #8B4513;
            cursor: pointer;
            background: #8B6F47;
        }

        #status {
            text-align: center;
            color: #DAA520;
            font-weight: bold;
            font-size: 14px;
            margin: 20px 0;
        }

        #menuScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #8B6F47 0%, #5a5a3a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .menu-content {
            text-align: center;
        }

        #menuTitle {
            font-size: 48px;
            color: #FFD700;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        #menuInstructions {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
        }

        #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .game-over-content {
            text-align: center;
            background: #1a1a2e;
            border: 3px solid #8B4513;
            border-radius: 8px;
            padding: 40px;
        }

        #gameOverMessage {
            font-size: 32px;
            color: #DAA520;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #playAgainBtn {
            padding: 12px 24px;
            font-size: 16px;
            background: #8B4513;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
        }

        #playAgainBtn:hover {
            background: #A0522D;
        }

        #viewHighScoresBtn {
            padding: 8px 16px;
            font-size: 12px;
            background: #DAA520;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
        }

        #viewHighScoresBtn:hover {
            background: #FFB730;
        }
    </style>
</head>
<body>

<!-- Menu Screen -->
<div id="menuScreen">
    <div class="menu-content">
        <div id="menuTitle">CHECKERS CLASSIC</div>
        <div id="menuInstructions">Press SPACE to Begin</div>
    </div>
</div>

<!-- Game Over Screen -->
<div id="gameOverScreen">
    <div class="game-over-content">
        <div id="gameOverMessage"></div>
        <button id="playAgainBtn">Play Again</button>
        <button id="viewHighScoresBtn">View High Scores</button>
    </div>
</div>

<!-- Main Game Container -->
<div id="gameContainer">
    <div class="sidebar">
        <div class="sidebar-item">
            <div class="sidebar-label">RED PIECES</div>
            <div class="sidebar-value" id="redCount">12</div>
        </div>
        <div class="sidebar-item">
            <div class="sidebar-label">BLACK PIECES</div>
            <div class="sidebar-value" id="blackCount">12</div>
        </div>
        <div class="sidebar-item">
            <div class="sidebar-label">MOVES</div>
            <div class="sidebar-value" id="moveCount">0</div>
        </div>
        <div id="status">Your Turn</div>
    </div>

    <canvas id="canvas" width="480" height="480"></canvas>

    <div class="sidebar">
        <div style="color: #8B4513; text-align: center; font-weight: bold;">GAME INFO</div>
    </div>
</div>

<script>
const BOARD_SIZE = 8;
const EMPTY = 0;
const RED = 1;
const RED_KING = 2;
const BLACK = 3;
const BLACK_KING = 4;

const COLORS = {
    RED: 'RED',
    BLACK: 'BLACK'
};

class CheckersGame {
    constructor() {
        this.canvas = document.getElementById('canvas');
        this.ctx = this.canvas.getContext('2d');
        this.board = this.initBoard();
        this.selectedPiece = null;
        this.validMoves = [];
        this.validJumps = [];
        this.currentPlayer = COLORS.RED;
        this.moveCount = 0;
        this.gameOver = false;
        this.aiThinking = false;

        this.setupEventListeners();
        this.draw();
    }

    initBoard() {
        const board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY));

        // Red pieces at bottom (rows 5-7), moves UP
        for (let r = 5; r < 8; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                if ((r + c) % 2 === 1) {
                    board[r][c] = RED;
                }
            }
        }

        // Black pieces at top (rows 0-2), moves DOWN
        for (let r = 0; r < 3; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                if ((r + c) % 2 === 1) {
                    board[r][c] = BLACK;
                }
            }
        }

        return board;
    }

    setupEventListeners() {
        this.canvas.addEventListener('click', (e) => this.handleCanvasClick(e));
        document.addEventListener('keypress', (e) => {
            if (e.code === 'Space') {
                if (document.getElementById('menuScreen').style.display !== 'none') {
                    this.startGame();
                }
            }
        });
        document.getElementById('playAgainBtn').addEventListener('click', () => this.restartGame());
        document.getElementById('viewHighScoresBtn').addEventListener('click', () => openHS());
    }

    startGame() {
        document.getElementById('menuScreen').style.display = 'none';
        document.getElementById('gameContainer').style.display = 'flex';
        this.draw();
    }

    handleCanvasClick(e) {
        if (this.gameOver || this.aiThinking || this.currentPlayer !== COLORS.RED) return;

        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const squareSize = this.canvas.width / BOARD_SIZE;
        const c = Math.floor(x / squareSize);
        const r = Math.floor(y / squareSize);

        if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) return;

        // Click on piece to select
        if (!this.selectedPiece) {
            if (this.isRedPiece(this.board[r][c])) {
                this.selectedPiece = {r, c};
                const moves = this.getMovesForPiece(this.board, r, c);
                this.validMoves = moves.moves;
                this.validJumps = moves.jumps;
            }
        } else {
            // Try to move selected piece
            let moveFound = false;

            // Check jumps first (mandatory)
            if (this.validJumps.length > 0) {
                for (const jump of this.validJumps) {
                    if (jump[0] === r && jump[1] === c) {
                        this.executeJump(this.selectedPiece.r, this.selectedPiece.c, r, c, jump[2], jump[3]);
                        moveFound = true;
                        break;
                    }
                }
            }

            // Check regular moves
            if (!moveFound && this.validMoves.length > 0) {
                for (const move of this.validMoves) {
                    if (move[0] === r && move[1] === c) {
                        this.movePiece(this.selectedPiece.r, this.selectedPiece.c, r, c);
                        moveFound = true;
                        break;
                    }
                }
            }

            if (moveFound) {
                this.selectedPiece = null;
                this.validMoves = [];
                this.validJumps = [];
            } else if (this.isRedPiece(this.board[r][c])) {
                // Select different piece
                this.selectedPiece = {r, c};
                const moves = this.getMovesForPiece(this.board, r, c);
                this.validMoves = moves.moves;
                this.validJumps = moves.jumps;
            } else {
                // Deselect
                this.selectedPiece = null;
                this.validMoves = [];
                this.validJumps = [];
            }
        }

        this.draw();
    }

    isRedPiece(piece) {
        return piece === RED || piece === RED_KING;
    }

    isBlackPiece(piece) {
        return piece === BLACK || piece === BLACK_KING;
    }

    getMovesForPiece(board, r, c) {
        const piece = board[r][c];
        const moves = [];
        const jumps = [];

        if (piece === EMPTY) return {moves, jumps};

        const directions = this.getDirections(piece);

        // Regular moves
        for (const [dr, dc] of directions) {
            const nr = r + dr;
            const nc = c + dc;
            if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr][nc] === EMPTY) {
                moves.push([nr, nc]);
            }
        }

        // Jumps
        for (const [dr, dc] of directions) {
            const jumpR = r + 2 * dr;
            const jumpC = c + 2 * dc;
            const capturedR = r + dr;
            const capturedC = c + dc;

            if (jumpR >= 0 && jumpR < BOARD_SIZE && jumpC >= 0 && jumpC < BOARD_SIZE) {
                const captured = board[capturedR][capturedC];
                if (board[jumpR][jumpC] === EMPTY) {
                    if (this.isRedPiece(piece) && this.isBlackPiece(captured)) {
                        jumps.push([jumpR, jumpC, capturedR, capturedC]);
                    } else if (this.isBlackPiece(piece) && this.isRedPiece(captured)) {
                        jumps.push([jumpR, jumpC, capturedR, capturedC]);
                    }
                }
            }
        }

        return {moves, jumps};
    }

    getDirections(piece) {
        if (piece === RED) return [[-1, -1], [-1, 1]];
        if (piece === RED_KING) return [[-1, -1], [-1, 1], [1, -1], [1, 1]];
        if (piece === BLACK) return [[1, -1], [1, 1]];
        if (piece === BLACK_KING) return [[-1, -1], [-1, 1], [1, -1], [1, 1]];
        return [];
    }

    movePiece(fromR, fromC, toR, toC) {
        const piece = this.board[fromR][fromC];
        this.board[fromR][fromC] = EMPTY;
        this.board[toR][toC] = piece;

        this.playMoveSound();
        this.checkPromotion(toR, toC);
        this.moveCount++;
        this.updateUI();

        // Check for additional jumps after moving
        const additionalJumps = this.getMovesForPiece(this.board, toR, toC).jumps;
        if (additionalJumps.length > 0) {
            // Multi-jump: ask player to continue
            this.selectedPiece = {r: toR, c: toC};
            this.validMoves = [];
            this.validJumps = additionalJumps;
            this.draw();
            return;
        }

        this.endTurn();
    }

    executeJump(fromR, fromC, toR, toC, capturedR, capturedC) {
        const piece = this.board[fromR][fromC];
        this.board[fromR][fromC] = EMPTY;
        this.board[toR][toC] = piece;
        this.board[capturedR][capturedC] = EMPTY;

        this.playJumpSound();
        this.checkPromotion(toR, toC);
        this.moveCount++;
        this.updateUI();

        // Check for additional jumps
        const additionalJumps = this.getMovesForPiece(this.board, toR, toC).jumps;
        if (additionalJumps.length > 0) {
            this.selectedPiece = {r: toR, c: toC};
            this.validMoves = [];
            this.validJumps = additionalJumps;
            this.draw();
            return;
        }

        this.endTurn();
    }

    checkPromotion(r, c) {
        const piece = this.board[r][c];
        if (piece === RED && r === 0) {
            this.board[r][c] = RED_KING;
            this.playPromoteSound();
        } else if (piece === BLACK && r === 7) {
            this.board[r][c] = BLACK_KING;
            this.playPromoteSound();
        }
    }

    endTurn() {
        this.selectedPiece = null;
        this.validMoves = [];
        this.validJumps = [];

        // Check for game over
        if (this.isGameOver()) {
            this.showGameOver();
            return;
        }

        // Switch player
        this.currentPlayer = this.currentPlayer === COLORS.RED ? COLORS.BLACK : COLORS.RED;
        this.updateUI();
        this.draw();

        // AI turn
        if (this.currentPlayer === COLORS.BLACK) {
            this.aiThinking = true;
            this.updateUI();
            this.draw();
            setTimeout(() => this.makeAIMove(), 300);
        }
    }

    makeAIMove() {
        const bestMove = this.minimax(4, COLORS.BLACK, -Infinity, Infinity);

        if (bestMove.move) {
            const {fromR, fromC, toR, toC, capturedR, capturedC} = bestMove.move;

            if (capturedR !== null) {
                // Jump move
                this.executeAIJump(fromR, fromC, toR, toC, capturedR, capturedC);
            } else {
                // Regular move
                const piece = this.board[fromR][fromC];
                this.board[fromR][fromC] = EMPTY;
                this.board[toR][toC] = piece;
                this.playMoveSound();
                this.checkPromotion(toR, toC);
                this.moveCount++;
                this.updateUI();
            }
        }

        this.aiThinking = false;

        if (!this.isGameOver()) {
            this.currentPlayer = COLORS.RED;
            this.updateUI();
            this.draw();
        } else {
            this.showGameOver();
        }
    }

    executeAIJump(fromR, fromC, toR, toC, capturedR, capturedC) {
        const piece = this.board[fromR][fromC];
        this.board[fromR][fromC] = EMPTY;
        this.board[toR][toC] = piece;
        this.board[capturedR][capturedC] = EMPTY;

        this.playJumpSound();
        this.checkPromotion(toR, toC);
        this.moveCount++;

        // Check for additional jumps and chain them
        const additionalJumps = this.getMovesForPiece(this.board, toR, toC).jumps;
        if (additionalJumps.length > 0) {
            // Continue jumping with the same piece
            const nextJump = additionalJumps[0];
            this.executeAIJump(toR, toC, nextJump[0], nextJump[1], nextJump[2], nextJump[3]);
        } else {
            this.updateUI();
        }
    }

    minimax(depth, player, alpha, beta) {
        // Terminal node: evaluate board
        if (depth === 0 || this.isGameOver()) {
            return {value: this.evaluateBoard(player), move: null};
        }

        const moves = this.getAllMoves(this.board, player);

        if (moves.length === 0) {
            return {value: player === COLORS.BLACK ? -Infinity : Infinity, move: null};
        }

        if (player === COLORS.BLACK) {
            // Maximizing player (AI)
            let maxEval = -Infinity;
            let bestMove = null;

            for (const move of moves) {
                // Save board state
                const savedBoard = this.board.map(row => [...row]);

                // Apply move
                this.applyMove(move);

                // Recurse with opposite player
                const result = this.minimax(depth - 1, COLORS.RED, alpha, beta);

                // Restore board
                this.board = savedBoard;

                if (result.value > maxEval) {
                    maxEval = result.value;
                    bestMove = move;
                }

                alpha = Math.max(alpha, result.value);
                if (beta <= alpha) break;
            }

            return {value: maxEval, move: bestMove};
        } else {
            // Minimizing player (human)
            let minEval = Infinity;
            let bestMove = null;

            for (const move of moves) {
                // Save board state
                const savedBoard = this.board.map(row => [...row]);

                // Apply move
                this.applyMove(move);

                // Recurse with opposite player
                const result = this.minimax(depth - 1, COLORS.BLACK, alpha, beta);

                // Restore board
                this.board = savedBoard;

                if (result.value < minEval) {
                    minEval = result.value;
                    bestMove = move;
                }

                beta = Math.min(beta, result.value);
                if (beta <= alpha) break;
            }

            return {value: minEval, move: bestMove};
        }
    }

    getAllMoves(board, player) {
        const moves = [];
        const jumpsAvailable = [];

        // Find all pieces and their moves
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                const piece = board[r][c];
                const isPlayerPiece = player === COLORS.RED ? this.isRedPiece(piece) : this.isBlackPiece(piece);

                if (isPlayerPiece) {
                    const pieceMoves = this.getMovesForPiece(board, r, c);

                    // Collect jumps
                    for (const jump of pieceMoves.jumps) {
                        jumpsAvailable.push({fromR: r, fromC: c, toR: jump[0], toC: jump[1], capturedR: jump[2], capturedC: jump[3]});
                    }

                    // Collect regular moves
                    for (const move of pieceMoves.moves) {
                        moves.push({fromR: r, fromC: c, toR: move[0], toC: move[1], capturedR: null, capturedC: null});
                    }
                }
            }
        }

        // If jumps available, only return jumps (mandatory)
        if (jumpsAvailable.length > 0) {
            return jumpsAvailable;
        }

        return moves;
    }

    applyMove(move) {
        const {fromR, fromC, toR, toC, capturedR, capturedC} = move;
        const piece = this.board[fromR][fromC];

        this.board[fromR][fromC] = EMPTY;
        this.board[toR][toC] = piece;

        if (capturedR !== null) {
            this.board[capturedR][capturedC] = EMPTY;
        }

        // Check for promotion
        if (piece === RED && toR === 0) {
            this.board[toR][toC] = RED_KING;
        } else if (piece === BLACK && toR === 7) {
            this.board[toR][toC] = BLACK_KING;
        }
    }

    evaluateBoard(player) {
        let redScore = 0;
        let blackScore = 0;

        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                const piece = this.board[r][c];
                if (piece === RED) redScore += 1;
                if (piece === RED_KING) redScore += 3;
                if (piece === BLACK) blackScore += 1;
                if (piece === BLACK_KING) blackScore += 3;
            }
        }

        // From the perspective of the given player
        return player === COLORS.BLACK ? (blackScore - redScore) : (redScore - blackScore);
    }

    isGameOver() {
        const redPieces = this.countPieces(COLORS.RED);
        const blackPieces = this.countPieces(COLORS.BLACK);

        if (redPieces === 0 || blackPieces === 0) return true;

        const redMoves = this.getAllMoves(this.board, COLORS.RED);
        const blackMoves = this.getAllMoves(this.board, COLORS.BLACK);

        return (this.currentPlayer === COLORS.RED && redMoves.length === 0) ||
               (this.currentPlayer === COLORS.BLACK && blackMoves.length === 0);
    }

    showGameOver() {
        this.gameOver = true;
        const redPieces = this.countPieces(COLORS.RED);

        let message = '';
        if (redPieces === 0) {
            message = 'YOU LOSE!';
        } else if (this.countPieces(COLORS.BLACK) === 0) {
            message = 'YOU WIN!';
        } else if (this.currentPlayer === COLORS.RED) {
            message = 'YOU LOSE!';
        } else {
            message = 'YOU WIN!';
        }

        if (message === 'YOU WIN!') {
            this.playVictorySound();
            saveGameScore(redPieces);
        }

        document.getElementById('gameOverMessage').textContent = message;
        document.getElementById('gameOverScreen').style.display = 'flex';
    }

    restartGame() {
        document.getElementById('gameOverScreen').style.display = 'none';
        this.board = this.initBoard();
        this.selectedPiece = null;
        this.validMoves = [];
        this.validJumps = [];
        this.currentPlayer = COLORS.RED;
        this.moveCount = 0;
        this.gameOver = false;
        this.aiThinking = false;
        this.updateUI();
        this.draw();
    }

    countPieces(player) {
        let count = 0;
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                const piece = this.board[r][c];
                if (player === COLORS.RED && this.isRedPiece(piece)) count++;
                if (player === COLORS.BLACK && this.isBlackPiece(piece)) count++;
            }
        }
        return count;
    }

    updateUI() {
        document.getElementById('redCount').textContent = this.countPieces(COLORS.RED);
        document.getElementById('blackCount').textContent = this.countPieces(COLORS.BLACK);
        document.getElementById('moveCount').textContent = this.moveCount;

        let statusText = '';
        if (this.gameOver) {
            statusText = 'GAME OVER';
        } else if (this.aiThinking) {
            statusText = 'AI Thinking...';
        } else if (this.currentPlayer === COLORS.RED) {
            statusText = 'Your Turn';
        } else {
            statusText = 'AI Playing...';
        }
        document.getElementById('status').textContent = statusText;
    }

    draw() {
        const squareSize = this.canvas.width / BOARD_SIZE;

        // Draw board
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                const x = c * squareSize;
                const y = r * squareSize;

                // Checkerboard pattern
                if ((r + c) % 2 === 0) {
                    this.ctx.fillStyle = '#D4A574'; // Light wood
                } else {
                    this.ctx.fillStyle = '#8B6F47'; // Dark wood
                }
                this.ctx.fillRect(x, y, squareSize, squareSize);
            }
        }

        // Draw valid moves
        if (this.selectedPiece && !this.gameOver && !this.aiThinking) {
            for (const move of this.validMoves) {
                const x = move[1] * squareSize + squareSize / 2;
                const y = move[0] * squareSize + squareSize / 2;
                this.ctx.fillStyle = '#00cc00';
                this.ctx.beginPath();
                this.ctx.arc(x, y, 6, 0, Math.PI * 2);
                this.ctx.fill();
            }

            for (const jump of this.validJumps) {
                const x = jump[1] * squareSize + squareSize / 2;
                const y = jump[0] * squareSize + squareSize / 2;
                this.ctx.fillStyle = '#00ff00';
                this.ctx.beginPath();
                this.ctx.arc(x, y, 8, 0, Math.PI * 2);
                this.ctx.fill();
            }
        }

        // Draw pieces
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                const piece = this.board[r][c];
                if (piece !== EMPTY) {
                    this.drawPiece(c, r, piece, squareSize);
                }
            }
        }

        // Draw selected piece highlight
        if (this.selectedPiece && !this.gameOver && !this.aiThinking) {
            const x = this.selectedPiece.c * squareSize;
            const y = this.selectedPiece.r * squareSize;
            this.ctx.strokeStyle = '#FFD700';
            this.ctx.lineWidth = 3;
            this.ctx.strokeRect(x, y, squareSize, squareSize);
        }
    }

    drawPiece(c, r, piece, squareSize) {
        const x = c * squareSize + squareSize / 2;
        const y = r * squareSize + squareSize / 2;
        const radius = squareSize / 2 - 4;

        const isRed = piece === RED || piece === RED_KING;
        const isKing = piece === RED_KING || piece === BLACK_KING;

        // Draw piece
        const gradient = this.ctx.createRadialGradient(x - 3, y - 3, 0, x, y, radius);
        if (isRed) {
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(1, '#880000');
        } else {
            gradient.addColorStop(0, '#555');
            gradient.addColorStop(1, '#000');
        }

        this.ctx.fillStyle = gradient;
        this.ctx.beginPath();
        this.ctx.arc(x, y, radius, 0, Math.PI * 2);
        this.ctx.fill();

        // Draw piece border
        this.ctx.strokeStyle = isRed ? '#cc0000' : '#222';
        this.ctx.lineWidth = 2;
        this.ctx.stroke();

        // Draw king crown
        if (isKing) {
            this.ctx.fillStyle = '#FFD700';
            this.ctx.font = `bold ${radius}px Arial`;
            this.ctx.textAlign = 'center';
            this.ctx.textBaseline = 'middle';
            this.ctx.fillText('♛', x, y);
        }
    }

    playMoveSound() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 400;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        } catch (e) {
            // Silently fail
        }
    }

    playJumpSound() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 600;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.15);
        } catch (e) {
            // Silently fail
        }
    }

    playPromoteSound() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const frequencies = [523, 659, 784]; // C5, E5, G5
            const duration = 0.15;

            for (let i = 0; i < frequencies.length; i++) {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = frequencies[i];
                oscillator.type = 'sine';

                const startTime = audioContext.currentTime + i * duration;
                gainNode.gain.setValueAtTime(0.2, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);

                oscillator.start(startTime);
                oscillator.stop(startTime + duration);
            }
        } catch (e) {
            // Silently fail
        }
    }

    playVictorySound() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const frequencies = [523, 659, 784, 1047]; // C5, E5, G5, C6
            const duration = 0.2;

            for (let i = 0; i < frequencies.length; i++) {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = frequencies[i];
                oscillator.type = 'sine';

                const startTime = audioContext.currentTime + i * duration;
                gainNode.gain.setValueAtTime(0.2, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);

                oscillator.start(startTime);
                oscillator.stop(startTime + duration);
            }
        } catch (e) {
            // Silently fail
        }
    }
}

// Initialize game
let game;
window.addEventListener('load', () => {
    game = new CheckersGame();
});

// High score functions
function getHighScores() {
    const stored = localStorage.getItem('sg_hs_checkers');
    return stored ? JSON.parse(stored) : [];
}

function saveGameScore(score) {
    const scores = getHighScores();
    scores.push({score, name: 'Anonymous', date: new Date().toLocaleDateString()});
    scores.sort((a, b) => b.score - a.score);
    scores.splice(10); // Keep top 10
    localStorage.setItem('sg_hs_checkers', JSON.stringify(scores));
}

function displayHighScores() {
    const scores = getHighScores();
    const list = document.getElementById('hs-list');
    list.innerHTML = '';

    if (scores.length === 0) {
        list.innerHTML = '<div style="color:#DAA520;text-align:center">No scores yet</div>';
        return;
    }

    for (let i = 0; i < scores.length; i++) {
        const div = document.createElement('div');
        div.style.color = '#DAA520';
        div.style.padding = '6px';
        div.style.borderBottom = '1px solid #8B4513';
        div.textContent = `${i + 1}. ${scores[i].name} - ${scores[i].score}`;
        list.appendChild(div);
    }
}

function openHS() {
    displayHighScores();
    const overlay = document.getElementById('hs-overlay');
    overlay.style.display = 'flex';

    const gameScore = game ? game.countPieces(COLORS.RED) : 0;
    document.getElementById('hs-game-score').textContent = `YOUR SCORE: ${gameScore}`;

    const saveBtn = document.getElementById('hs-save-btn');
    const nameInput = document.getElementById('hs-name');
    const inputDiv = document.getElementById('hs-input');

    const scores = getHighScores();
    if (scores.length < 10 || gameScore > scores[scores.length - 1].score) {
        inputDiv.style.display = 'block';
        saveBtn.style.display = 'inline-block';
        nameInput.focus();
    } else {
        inputDiv.style.display = 'none';
        saveBtn.style.display = 'none';
    }
}

function closeHS() {
    document.getElementById('hs-overlay').style.display = 'none';
}

function saveHS() {
    const name = document.getElementById('hs-name').value.trim() || 'Anonymous';
    const scores = getHighScores();
    const gameScore = game.countPieces(COLORS.RED);

    scores.push({score: gameScore, name, date: new Date().toLocaleDateString()});
    scores.sort((a, b) => b.score - a.score);
    scores.splice(10);

    localStorage.setItem('sg_hs_checkers', JSON.stringify(scores));
    displayHighScores();

    document.getElementById('hs-name').value = '';
    document.getElementById('hs-input').style.display = 'none';
    document.getElementById('hs-save-btn').style.display = 'none';
}
</script>

<script>
