<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slingshot — Gravitational Pull Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
  canvas { display: block; }
  #ui-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  #hud {
    position: absolute; top: 20px; left: 20px; right: 20px;
    display: flex; justify-content: space-between; align-items: flex-start;
    color: #fff;
  }
  .hud-group { display: flex; flex-direction: column; gap: 6px; }
  .hud-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #8af; opacity: 0.7; }
  .hud-value { font-size: 22px; font-weight: 300; color: #fff; text-shadow: 0 0 12px #4af; }
  .hud-center { text-align: center; }
  #fuel-bar-container {
    width: 180px; height: 8px; background: rgba(255,255,255,0.1);
    border-radius: 4px; overflow: hidden; margin-top: 4px;
  }
  #fuel-bar {
    height: 100%; width: 100%; background: linear-gradient(90deg, #f44, #ff0, #0f8);
    border-radius: 4px; transition: width 0.1s;
  }
  #message-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; pointer-events: auto; background: rgba(0,0,10,0.85);
  }
  #message-overlay.hidden { display: none; }
  #msg-title {
    font-size: 52px; font-weight: 200; color: #fff;
    text-shadow: 0 0 30px #4af, 0 0 60px #28f; margin-bottom: 8px;
    letter-spacing: 6px;
  }
  #msg-subtitle {
    font-size: 18px; color: #8cf; font-weight: 300; margin-bottom: 30px;
    letter-spacing: 1px; opacity: 0.8;
  }
  #msg-body {
    font-size: 15px; color: #adf; text-align: center; line-height: 1.8;
    max-width: 400px; margin-bottom: 36px; opacity: 0.7;
  }
  .btn {
    pointer-events: auto; padding: 14px 44px; font-size: 16px;
    background: transparent; color: #fff; border: 1px solid rgba(100,180,255,0.4);
    border-radius: 30px; cursor: pointer; letter-spacing: 3px;
    text-transform: uppercase; transition: all 0.3s;
    text-shadow: 0 0 10px #4af;
  }
  .btn:hover {
    background: rgba(60,140,255,0.15); border-color: #4af;
    box-shadow: 0 0 20px rgba(60,140,255,0.3);
  }
  #controls-hint {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: #68a; letter-spacing: 1px; opacity: 0.5;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui-overlay">
  <div id="hud">
    <div class="hud-group">
      <div class="hud-label">Level</div>
      <div class="hud-value" id="hud-level">1</div>
    </div>
    <div class="hud-group hud-center">
      <div class="hud-label" id="level-name">First Flight</div>
      <div class="hud-value" id="hud-time">0.0s</div>
    </div>
    <div class="hud-group" style="align-items:flex-end;">
      <div class="hud-label">Fuel</div>
      <div id="fuel-bar-container"><div id="fuel-bar"></div></div>
    </div>
  </div>
  <div id="controls-hint">WASD / Arrow Keys — Thrust &nbsp;&nbsp;|&nbsp;&nbsp; R — Restart Level</div>
</div>

<div id="message-overlay">
  <div id="msg-title">SLINGSHOT</div>
  <div id="msg-subtitle">Navigate the gravity fields</div>
  <div id="msg-body">Use thrust to steer your ship through gravitational wells.<br>Reach the glowing portal to advance.</div>
  <button class="btn" id="msg-btn" onclick="startGame()">Launch</button>
</div>

<script>
// ========== CANVAS SETUP ==========
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ========== COLOR HELPER ==========
// Expand shorthand hex (#4af) to full (#44aaff) then append alpha
function hexToRgba(hex, alpha) {
  let r, g, b;
  if (hex.length === 4) {
    r = parseInt(hex[1] + hex[1], 16);
    g = parseInt(hex[2] + hex[2], 16);
    b = parseInt(hex[3] + hex[3], 16);
  } else {
    r = parseInt(hex.slice(1, 3), 16);
    g = parseInt(hex.slice(3, 5), 16);
    b = parseInt(hex.slice(5, 7), 16);
  }
  return `rgba(${r},${g},${b},${alpha})`;
}

// ========== CONSTANTS ==========
const G = 800;              // gravitational constant
const THRUST = 280;         // ship thrust force
const MAX_SPEED = 500;
const DRAG = 0.997;
const SHIP_SIZE = 10;
const GOAL_RADIUS = 28;
const DEATH_RADIUS_FACTOR = 1.0; // die if you hit the planet surface
const FUEL_BURN_RATE = 8;   // per second while thrusting
const TRAIL_MAX = 120;

// ========== STATE ==========
let ship, particles, trail, stars, levelTime, gameState, currentLevel;
let keys = {};

      { x: 0.5, y: 0.5, mass: 6000, radius: 40, color: '#fff' },
      { x: 0.2, y: 0.3, mass: 3000, radius: 26, color: '#f84' },
      { x: 0.8, y: 0.3, mass: 3000, radius: 26, color: '#84f' },
      { x: 0.2, y: 0.7, mass: 3000, radius: 26, color: '#4f8' },
      { x: 0.8, y: 0.7, mass: 3000, radius: 26, color: '#f48' },
      { x: 0.5, y: 0.15, mass: 2000, radius: 18, color: '#8ff' },

    ]
  },
  {
    name: "Singularity",
    fuel: 22,

    goal: { x: -50, y: 0.42 },
    planets: [
      { x: 0.5, y: 0.5, mass: 18000, radius: 55, color: '#f00' },
      { x: 0.2, y: 0.2, mass: 3500, radius: 28, color: '#0af' },
      { x: 0.8, y: 0.2, mass: 3500, radius: 28, color: '#af0' },
      { x: 0.2, y: 0.8, mass: 3500, radius: 28, color: '#f0a' },
      { x: 0.8, y: 0.8, mass: 3500, radius: 28, color: '#a0f' },
      { x: 0.35, y: 0.5, mass: 2000, radius: 16, color: '#ff0' },

    ]

];

// ========== STARS BACKGROUND ==========
function generateStars() {
  stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      brightness: Math.random() * 0.5 + 0.3,
      twinkleSpeed: Math.random() * 2 + 1
    });
  }
}

// ========== PARTICLES ==========
function spawnParticle(x, y, vx, vy, color, life) {
  particles.push({
    x, y, vx, vy, color, life, maxLife: life,
    size: Math.random() * 2.5 + 1
  });
}

function spawnThrustParticles(ship, dirX, dirY) {
  for (let i = 0; i < 3; i++) {
    const spread = 0.6;
    const speed = 80 + Math.random() * 60;
    spawnParticle(
      ship.x + (Math.random() - 0.5) * 6,
      ship.y + (Math.random() - 0.5) * 6,
      -dirX * speed + (Math.random() - 0.5) * spread * speed,
      -dirY * speed + (Math.random() - 0.5) * spread * speed,
      `hsl(${200 + Math.random() * 40}, 100%, ${60 + Math.random() * 30}%)`,
      0.4 + Math.random() * 0.3
    );
  }
}

function spawnExplosion(x, y) {
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 200;
    spawnParticle(x, y,
      Math.cos(angle) * speed, Math.sin(angle) * speed,
      `hsl(${Math.random() * 60 + 10}, 100%, ${50 + Math.random() * 40}%)`,
      0.5 + Math.random() * 1.0
    );
  }
}

function spawnGoalParticles(x, y) {
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 30 + Math.random() * 120;
    spawnParticle(x, y,
      Math.cos(angle) * speed, Math.sin(angle) * speed,
      `hsl(${140 + Math.random() * 40}, 100%, ${60 + Math.random() * 30}%)`,
      0.6 + Math.random() * 0.8
    );
  }
}

// ========== LEVEL SETUP ==========
function resolvePos(def, isGoal) {
  if (isGoal) {
    return { x: W + def.x, y: H / 2 + def.y * H };
  }
  return {
    x: typeof def.x === 'number' && def.x < 5 ? def.x * W : def.x,
    y: def.y === null ? H / 2 : (typeof def.y === 'number' && Math.abs(def.y) < 5 ? H / 2 + def.y * H : def.y)
  };
}

function loadLevel(idx) {
  currentLevel = idx;
  const lev = levels[idx];
  const shipPos = resolvePos(lev.ship, false);
  const goalPos = resolvePos(lev.goal, true);

  ship = {
    x: shipPos.x, y: shipPos.y,
    vx: 0, vy: 0,
    fuel: lev.fuel,
    maxFuel: lev.fuel,
    alive: true,
    won: false,
    angle: 0
  };

  // Resolve planet positions
  ship.planets = lev.planets.map(p => ({
    x: p.x * W, y: p.y * H,
    mass: p.mass, radius: p.radius, color: p.color
  }));

  ship.goal = { x: goalPos.x, y: goalPos.y, radius: GOAL_RADIUS };

  particles = [];
  trail = [];
  levelTime = 0;

  // Update HUD
  document.getElementById('hud-level').textContent = idx + 1;
  document.getElementById('level-name').textContent = lev.name;
  document.getElementById('hud-time').textContent = '0.0s';
  document.getElementById('fuel-bar').style.width = '100%';
}

// ========== INPUT ==========
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === 'r' && gameState === 'playing') {
    loadLevel(currentLevel);
  }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ========== GAME LOOP ==========
let lastTime = 0;

function update(dt) {
  if (gameState !== 'playing' || !ship || !ship.alive || ship.won) return;

  levelTime += dt;

  // Thrust input
  let tx = 0, ty = 0;
  if (keys['w'] || keys['arrowup']) ty -= 1;
  if (keys['s'] || keys['arrowdown']) ty += 1;
  if (keys['a'] || keys['arrowleft']) tx -= 1;
  if (keys['d'] || keys['arrowright']) tx += 1;

  const thrusting = (tx !== 0 || ty !== 0) && ship.fuel > 0;
  if (thrusting) {
    const len = Math.sqrt(tx * tx + ty * ty);
    tx /= len; ty /= len;
    ship.vx += tx * THRUST * dt;
    ship.vy += ty * THRUST * dt;
    ship.fuel = Math.max(0, ship.fuel - FUEL_BURN_RATE * dt);
    ship.angle = Math.atan2(ty, tx);
    spawnThrustParticles(ship, tx, ty);
  } else if (tx !== 0 || ty !== 0) {
    // Out of fuel — show angle but no thrust
    const len = Math.sqrt(tx * tx + ty * ty);
    ship.angle = Math.atan2(ty / len, tx / len);
  }

  // Gravity from each planet
  for (const p of ship.planets) {
    const dx = p.x - ship.x;
    const dy = p.y - ship.y;
    const distSq = dx * dx + dy * dy;
    const dist = Math.sqrt(distSq);

    // Collision with planet
    if (dist < p.radius * DEATH_RADIUS_FACTOR) {
      ship.alive = false;
      spawnExplosion(ship.x, ship.y);
      setTimeout(() => loadLevel(currentLevel), 1500);
      return;
    }

    const force = G * p.mass / distSq;
    ship.vx += (dx / dist) * force * dt;
    ship.vy += (dy / dist) * force * dt;
  }

  // Clamp speed
  const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
  if (speed > MAX_SPEED) {
    ship.vx = (ship.vx / speed) * MAX_SPEED;
    ship.vy = (ship.vy / speed) * MAX_SPEED;
  }

  // Drag
  ship.vx *= DRAG;
  ship.vy *= DRAG;

  // Move
  ship.x += ship.vx * dt;
  ship.y += ship.vy * dt;

  // Update angle based on velocity if not thrusting
  if (!thrusting && speed > 15) {
    ship.angle = Math.atan2(ship.vy, ship.vx);
  }

  // Trail
  trail.push({ x: ship.x, y: ship.y, age: 0 });
  if (trail.length > TRAIL_MAX) trail.shift();

  // Screen bounds — bounce softly
  const margin = 30;
  if (ship.x < -margin) { ship.x = -margin; ship.vx = Math.abs(ship.vx) * 0.5; }
  if (ship.x > W + margin) { ship.x = W + margin; ship.vx = -Math.abs(ship.vx) * 0.5; }
  if (ship.y < -margin) { ship.y = -margin; ship.vy = Math.abs(ship.vy) * 0.5; }
  if (ship.y > H + margin) { ship.y = H + margin; ship.vy = -Math.abs(ship.vy) * 0.5; }

  // Goal check
  const gDist = Math.sqrt((ship.x - ship.goal.x) ** 2 + (ship.y - ship.goal.y) ** 2);
  if (gDist < ship.goal.radius + SHIP_SIZE) {
    ship.won = true;
    spawnGoalParticles(ship.goal.x, ship.goal.y);
    setTimeout(() => {
      if (currentLevel < levels.length - 1) {
        loadLevel(currentLevel + 1);
      } else {
        showMessage('MISSION COMPLETE', 'All sectors cleared', `Total time: ${levelTime.toFixed(1)}s\nYou mastered the gravity fields.`, 'Replay', () => { loadLevel(0); });
      }
    }, 1500);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Age trail
  for (const t of trail) t.age += dt;

  // HUD
  document.getElementById('hud-time').textContent = levelTime.toFixed(1) + 's';
  document.getElementById('fuel-bar').style.width = (ship.fuel / ship.maxFuel * 100) + '%';
}

// ========== DRAW ==========
function draw() {
  ctx.fillStyle = '#040810';
  ctx.fillRect(0, 0, W, H);

  const time = performance.now() / 1000;

  // Stars
  for (const s of stars) {
    const twinkle = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.x);
    ctx.globalAlpha = s.brightness * twinkle;
    ctx.fillStyle = '#cdf';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (!ship) return;

  // Gravity field rings
  for (const p of ship.planets) {
    const influence = Math.sqrt(p.mass) * 3;
    for (let r = p.radius + 15; r < influence; r += 18) {
      const alpha = 0.08 * (1 - (r - p.radius) / influence);
      ctx.strokeStyle = p.color;
      ctx.globalAlpha = alpha * (0.6 + 0.4 * Math.sin(time * 1.5 + r * 0.05));
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Planets
  for (const p of ship.planets) {
    // Glow
    const grad = ctx.createRadialGradient(p.x, p.y, p.radius * 0.3, p.x, p.y, p.radius * 2.5);
    grad.addColorStop(0, hexToRgba(p.color, 0.25));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Body
    const bodyGrad = ctx.createRadialGradient(p.x - p.radius * 0.3, p.y - p.radius * 0.3, p.radius * 0.1, p.x, p.y, p.radius);
    bodyGrad.addColorStop(0, '#fff');
    bodyGrad.addColorStop(0.4, p.color);
    bodyGrad.addColorStop(1, hexToRgba(p.color, 0.53));
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Goal portal
  const goal = ship.goal;
  const pulseR = goal.radius + 4 * Math.sin(time * 3);

  // Goal outer glow
  const gGrad = ctx.createRadialGradient(goal.x, goal.y, pulseR * 0.2, goal.x, goal.y, pulseR * 2);
  gGrad.addColorStop(0, 'rgba(0,255,160,0.3)');
  gGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = gGrad;
  ctx.beginPath();
  ctx.arc(goal.x, goal.y, pulseR * 2, 0, Math.PI * 2);
  ctx.fill();

  // Goal ring
  ctx.strokeStyle = '#0fa';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.6 + 0.4 * Math.sin(time * 4);
  ctx.beginPath();
  ctx.arc(goal.x, goal.y, pulseR, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(goal.x, goal.y, pulseR * 0.6, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Spinning arcs around goal
  for (let i = 0; i < 3; i++) {
    const aOff = (Math.PI * 2 / 3) * i + time * 2;
    ctx.strokeStyle = '#0fa';
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(goal.x, goal.y, pulseR + 8, aOff, aOff + 0.8);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Trail
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const alpha = (i / trail.length) * 0.5 * Math.max(0, 1 - t.age * 0.5);
    if (alpha <= 0) continue;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#4af';
    ctx.beginPath();
    ctx.arc(t.x, t.y, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Ship
  if (ship.alive && !ship.won) {
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(ship.angle);

    // Ship glow
    const sGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 20);
    sGrad.addColorStop(0, 'rgba(100,200,255,0.3)');
    sGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = sGrad;
    ctx.beginPath();
    ctx.arc(0, 0, 20, 0, Math.PI * 2);
    ctx.fill();

    // Ship body (triangle)
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#4af';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(SHIP_SIZE + 2, 0);
    ctx.lineTo(-SHIP_SIZE + 2, -SHIP_SIZE * 0.65);
    ctx.lineTo(-SHIP_SIZE * 0.5 + 2, 0);
    ctx.lineTo(-SHIP_SIZE + 2, SHIP_SIZE * 0.65);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.restore();

    // Gravity indicator arrows (subtle)
    let totalGx = 0, totalGy = 0;
    for (const p of ship.planets) {
      const dx = p.x - ship.x;
      const dy = p.y - ship.y;
      const distSq = dx * dx + dy * dy;
      const dist = Math.sqrt(distSq);
      const force = G * p.mass / distSq;
      totalGx += (dx / dist) * force;
      totalGy += (dy / dist) * force;
    }
    const gMag = Math.sqrt(totalGx * totalGx + totalGy * totalGy);
    if (gMag > 10) {
      const gAngle = Math.atan2(totalGy, totalGx);
      const indicatorDist = 22;
      const ix = ship.x + Math.cos(gAngle) * indicatorDist;
      const iy = ship.y + Math.sin(gAngle) * indicatorDist;
      ctx.globalAlpha = Math.min(0.5, gMag / 800);
      ctx.strokeStyle = '#f84';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(ship.x + Math.cos(gAngle) * 16, ship.y + Math.sin(gAngle) * 16);
      ctx.lineTo(ix, iy);
      ctx.stroke();
      // Arrow head
      const aLen = 4;
      ctx.beginPath();
      ctx.moveTo(ix, iy);
      ctx.lineTo(ix - Math.cos(gAngle - 0.4) * aLen, iy - Math.sin(gAngle - 0.4) * aLen);
      ctx.moveTo(ix, iy);
      ctx.lineTo(ix - Math.cos(gAngle + 0.4) * aLen, iy - Math.sin(gAngle + 0.4) * aLen);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
}

// ========== MESSAGE OVERLAY ==========
function showMessage(title, subtitle, body, btnText, action) {
  const overlay = document.getElementById('message-overlay');
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-subtitle').textContent = subtitle;
  document.getElementById('msg-body').innerHTML = body.replace(/\n/g, '<br>');
  const btn = document.getElementById('msg-btn');
  btn.textContent = btnText;
  btn.onclick = action;
  overlay.classList.remove('hidden');
}

function hideMessage() {
  document.getElementById('message-overlay').classList.add('hidden');
}

// ========== START ==========
function startGame() {
  hideMessage();
  gameState = 'playing';
  loadLevel(0);
}

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// Initialize
generateStars();
gameState = 'menu';
ship = null;
particles = [];
trail = [];
lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
