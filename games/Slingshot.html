// Expand shorthand hex (#4af) to full (#44aaff) then append alpha
function hexToRgba(hex, alpha) {
  let r, g, b;
  if (hex.length === 4) {
    r = parseInt(hex[1] + hex[1], 16);
    g = parseInt(hex[2] + hex[2], 16);
    b = parseInt(hex[3] + hex[3], 16);
  } else {
    r = parseInt(hex.slice(1, 3), 16);
    g = parseInt(hex.slice(3, 5), 16);
    b = parseInt(hex.slice(5, 7), 16);
  }
  return `rgba(${r},${g},${b},${alpha})`;
}

// ========== STARS BACKGROUND ==========
function generateStars() {
  stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      brightness: Math.random() * 0.5 + 0.3,
      twinkleSpeed: Math.random() * 2 + 1
    });
  }
}

// ========== PARTICLES ==========
function spawnParticle(x, y, vx, vy, color, life) {
  particles.push({
    x, y, vx, vy, color, life, maxLife: life,
    size: Math.random() * 2.5 + 1
  });
}

function spawnThrustParticles(ship, dirX, dirY) {
  for (let i = 0; i < 3; i++) {
    const spread = 0.6;
    const speed = 80 + Math.random() * 60;
    spawnParticle(
      ship.x + (Math.random() - 0.5) * 6,
      ship.y + (Math.random() - 0.5) * 6,
      -dirX * speed + (Math.random() - 0.5) * spread * speed,
      -dirY * speed + (Math.random() - 0.5) * spread * speed,
      `hsl(${200 + Math.random() * 40}, 100%, ${60 + Math.random() * 30}%)`,
      0.4 + Math.random() * 0.3
    );
  }
}

function spawnExplosion(x, y) {
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 200;
    spawnParticle(x, y,
      Math.cos(angle) * speed, Math.sin(angle) * speed,
      `hsl(${Math.random() * 60 + 10}, 100%, ${50 + Math.random() * 40}%)`,
      0.5 + Math.random() * 1.0
    );
  }
}

function spawnFuelPickupParticles(x, y) {
  for (let i = 0; i < 35; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 100;
    spawnParticle(x, y,
      Math.cos(angle) * speed, Math.sin(angle) * speed,
      `hsl(${30 + Math.random() * 30}, 100%, ${55 + Math.random() * 35}%)`,
      0.5 + Math.random() * 0.7
    );
  }
}

function spawnGoalParticles(x, y) {
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 30 + Math.random() * 120;
    spawnParticle(x, y,
      Math.cos(angle) * speed, Math.sin(angle) * speed,
      `hsl(${140 + Math.random() * 40}, 100%, ${60 + Math.random() * 30}%)`,
      0.6 + Math.random() * 0.8
    );
  }
}

// ========== LEVEL SETUP ==========
function resolvePos(def, isGoal) {
  if (isGoal) {
    return { x: W + def.x, y: H / 2 + def.y * H };
  }
  return {
    x: typeof def.x === 'number' && def.x < 5 ? def.x * W : def.x,
    y: def.y === null ? H / 2 : (typeof def.y === 'number' && Math.abs(def.y) < 5 ? H / 2 + def.y * H : def.y)
  };
}

function loadLevel(idx) {
  currentLevel = idx;
  const lev = levels[idx];
  const shipPos = resolvePos(lev.ship, false);
  const goalPos = resolvePos(lev.goal, true);

  ship = {
    x: shipPos.x, y: shipPos.y,
    vx: 0, vy: 0,
    fuel: lev.fuel,
    maxFuel: lev.fuel,
    alive: true,
    won: false,
    angle: 0
  };

  // Resolve planet positions
  ship.planets = lev.planets.map(p => ({
    x: p.x * W, y: p.y * H,
    mass: p.mass, radius: p.radius, color: p.color
  }));

  ship.goal = { x: goalPos.x, y: goalPos.y, radius: GOAL_RADIUS };

  // Resolve fuel station positions
  ship.fuelStations = (lev.fuelStations || []).map(fs => ({
    x: fs.x * W, y: fs.y * H,
    collected: false
  }));

  particles = [];
  trail = [];
  levelTime = 0;

  // Reset parked state and missiles
  shipParked = true;
  missiles = [];
  missileTrails = [];
  // Don't reset showMissileTrails — keep user preference across levels

  // Update HUD
  document.getElementById('hud-level').textContent = idx + 1;
  document.getElementById('level-name').textContent = lev.name;
  document.getElementById('hud-time').textContent = '0.0s';
  document.getElementById('fuel-bar').style.width = '100%';
}

// ========== INPUT ==========
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  const key = e.key.toLowerCase();

  if (key === 'r' && gameState === 'playing') {
    loadLevel(currentLevel);
  }

  if (key === ' ' && gameState === 'playing' && shipParked) {
    e.preventDefault();
    launchShip();
  }

  if (key === 'f' && gameState === 'playing') {
    e.preventDefault();
    fireMissile();
  }

  if (key === 't' && gameState === 'playing') {
    e.preventDefault();
    showMissileTrails = !showMissileTrails;
  }

  // Missile speed: +/= to increase, - to decrease
  if ((key === '=' || key === '+') && gameState === 'playing') {
    missileSpeed = Math.min(MISSILE_SPEED_MAX, missileSpeed + MISSILE_SPEED_STEP);
  }
  if (key === '-' && gameState === 'playing') {
    missileSpeed = Math.max(MISSILE_SPEED_MIN, missileSpeed - MISSILE_SPEED_STEP);
  }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Scroll wheel to adjust missile speed
window.addEventListener('wheel', e => {
  if (gameState !== 'playing') return;
  e.preventDefault();
  if (e.deltaY < 0) {
    missileSpeed = Math.min(MISSILE_SPEED_MAX, missileSpeed + MISSILE_SPEED_STEP);
  } else {
    missileSpeed = Math.max(MISSILE_SPEED_MIN, missileSpeed - MISSILE_SPEED_STEP);
  }
}, { passive: false });

// ========== TOUCH INPUT ==========
let touchStartTime = 0;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState !== 'playing') return;
  // Use the first touch that isn't already tracked
  for (const t of e.changedTouches) {
    if (!touchActive) {
      touchActive = true;
      touchId = t.identifier;
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      touchCurrentX = t.clientX;
      touchCurrentY = t.clientY;
      touchDirX = 0;
      touchDirY = 0;
      touchStartTime = Date.now();
      break;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      touchCurrentX = t.clientX;
      touchCurrentY = t.clientY;
      let dx = touchCurrentX - touchStartX;
      let dy = touchCurrentY - touchStartY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < JOYSTICK_DEADZONE) {
        touchDirX = 0;
        touchDirY = 0;
      } else {
        // Clamp to joystick radius
        const clamped = Math.min(dist, JOYSTICK_RADIUS);
        touchDirX = (dx / dist) * (clamped / JOYSTICK_RADIUS);
        touchDirY = (dy / dist) * (clamped / JOYSTICK_RADIUS);
      }
      break;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      // If tap was quick, treat as launch if parked
      const tapDuration = Date.now() - touchStartTime;
      if (shipParked && tapDuration < 300) {
        launchShip();
      }

      touchActive = false;
      touchId = null;
      touchDirX = 0;
      touchDirY = 0;
      break;
    }
  }
});

canvas.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      touchActive = false;
      touchId = null;
      touchDirX = 0;
      touchDirY = 0;
      break;
    }
  }
});

// ========== LAUNCH & MISSILE FUNCTIONS ==========
function launchShip() {
  if (!ship || !ship.alive || ship.won || !shipParked) return;
  shipParked = false;
  // Give ship initial velocity in aimed direction
  ship.vx = Math.cos(ship.angle) * missileSpeed;
  ship.vy = Math.sin(ship.angle) * missileSpeed;
}

function fireMissile() {
  if (!ship || !ship.alive || ship.won) return;
  const color = MISSILE_COLORS[missileColorIndex % MISSILE_COLORS.length];
  missileColorIndex++;
  missiles.push({
    x: ship.x, y: ship.y,
    vx: Math.cos(ship.angle) * missileSpeed,
    vy: Math.sin(ship.angle) * missileSpeed,
    alive: true, trail: [{x: ship.x, y: ship.y}], color: color, age: 0
  });
}

function updateMissiles(dt) {
  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    if (!m.alive) continue;

    m.age += dt;

    // Gravity from each planet
    for (const p of ship.planets) {
      const dx = p.x - m.x;
      const dy = p.y - m.y;
      const distSq = dx * dx + dy * dy;
      const dist = Math.sqrt(distSq);

      // Collision with planet
      if (dist < p.radius) {
        m.alive = false;
        missileTrails.push({points: m.trail.slice(), color: m.color});
        break;
      }

      const force = G * p.mass / distSq;
      m.vx += (dx / dist) * force * dt;
      m.vy += (dy / dist) * force * dt;
    }

    if (!m.alive) continue;

    // Speed clamp
    const spd = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
    if (spd > MAX_SPEED) {
      m.vx = (m.vx / spd) * MAX_SPEED;
      m.vy = (m.vy / spd) * MAX_SPEED;
    }

    // Drag
    m.vx *= DRAG;
    m.vy *= DRAG;

    // Move
    m.x += m.vx * dt;
    m.y += m.vy * dt;

    // Trail
    m.trail.push({x: m.x, y: m.y});

    // Bounds — bounce softly (same as ship)
    const margin = 30;
    if (m.x < -margin) { m.x = -margin; m.vx = Math.abs(m.vx) * 0.5; }
    if (m.x > W + margin) { m.x = W + margin; m.vx = -Math.abs(m.vx) * 0.5; }
    if (m.y < -margin) { m.y = -margin; m.vy = Math.abs(m.vy) * 0.5; }
    if (m.y > H + margin) { m.y = H + margin; m.vy = -Math.abs(m.vy) * 0.5; }
  }

  // Clean up dead missiles
  missiles = missiles.filter(m => m.alive);
}

// ========== GAME LOOP ==========
let lastTime = 0;

function update(dt) {
  if (gameState !== 'playing' || !ship || !ship.alive || ship.won) return;

  // Update missiles always (even while parked)
  updateMissiles(dt);

  // If parked, only handle rotation
  if (shipParked) {
    let rotateDir = 0;
    if (keys['a'] || keys['arrowleft']) rotateDir -= 1;
    if (keys['d'] || keys['arrowright']) rotateDir += 1;
    // Touch rotation (use touchDirX for rotation when parked)
    if (touchActive && Math.abs(touchDirX) > 0.1) rotateDir += touchDirX;
    ship.angle += rotateDir * 3 * dt; // rotate speed
    return;
  }

  levelTime += dt;

  // Thrust input (keyboard + touch combined)
  let tx = 0, ty = 0;
  if (keys['w'] || keys['arrowup']) ty -= 1;
  if (keys['s'] || keys['arrowdown']) ty += 1;
  if (keys['a'] || keys['arrowleft']) tx -= 1;
  if (keys['d'] || keys['arrowright']) tx += 1;

  // Add touch joystick input
  if (touchActive && (Math.abs(touchDirX) > 0.01 || Math.abs(touchDirY) > 0.01)) {
    tx += touchDirX;
    ty += touchDirY;
  }

  const thrusting = (tx !== 0 || ty !== 0) && ship.fuel > 0;
  if (thrusting) {
    const len = Math.sqrt(tx * tx + ty * ty);
    tx /= len; ty /= len;
    ship.vx += tx * THRUST * dt;
    ship.vy += ty * THRUST * dt;
    ship.fuel = Math.max(0, ship.fuel - FUEL_BURN_RATE * dt);
    ship.angle = Math.atan2(ty, tx);
    spawnThrustParticles(ship, tx, ty);
  } else if (tx !== 0 || ty !== 0) {
    // Out of fuel — show angle but no thrust
    const len = Math.sqrt(tx * tx + ty * ty);
    ship.angle = Math.atan2(ty / len, tx / len);
  }

  // Gravity from each planet
  for (const p of ship.planets) {
    const dx = p.x - ship.x;
    const dy = p.y - ship.y;
    const distSq = dx * dx + dy * dy;
    const dist = Math.sqrt(distSq);

    // Collision with planet
    if (dist < p.radius * DEATH_RADIUS_FACTOR) {
      ship.alive = false;
      spawnExplosion(ship.x, ship.y);
      setTimeout(() => loadLevel(currentLevel), 1500);
      return;
    }

    const force = G * p.mass / distSq;
    ship.vx += (dx / dist) * force * dt;
    ship.vy += (dy / dist) * force * dt;
  }

  // Clamp speed
  const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
  if (speed > MAX_SPEED) {
    ship.vx = (ship.vx / speed) * MAX_SPEED;
    ship.vy = (ship.vy / speed) * MAX_SPEED;
  }

  // Drag
  ship.vx *= DRAG;
  ship.vy *= DRAG;

  // Move
  ship.x += ship.vx * dt;
  ship.y += ship.vy * dt;

  // Update angle based on velocity if not thrusting
  if (!thrusting && speed > 15) {
    ship.angle = Math.atan2(ship.vy, ship.vx);
  }

  // Trail
  trail.push({ x: ship.x, y: ship.y, age: 0 });
  if (trail.length > TRAIL_MAX) trail.shift();

  // Screen bounds — bounce softly
  const margin = 30;
  if (ship.x < -margin) { ship.x = -margin; ship.vx = Math.abs(ship.vx) * 0.5; }
  if (ship.x > W + margin) { ship.x = W + margin; ship.vx = -Math.abs(ship.vx) * 0.5; }
  if (ship.y < -margin) { ship.y = -margin; ship.vy = Math.abs(ship.vy) * 0.5; }
  if (ship.y > H + margin) { ship.y = H + margin; ship.vy = -Math.abs(ship.vy) * 0.5; }

  // Fuel station pickup check
  for (const fs of ship.fuelStations) {
    if (fs.collected) continue;
    const fsDist = Math.sqrt((ship.x - fs.x) ** 2 + (ship.y - fs.y) ** 2);
    if (fsDist < FUEL_STATION_RADIUS + SHIP_SIZE) {
      fs.collected = true;
      ship.fuel = ship.maxFuel;
      spawnFuelPickupParticles(fs.x, fs.y);
    }
  }

  // Goal check
  const gDist = Math.sqrt((ship.x - ship.goal.x) ** 2 + (ship.y - ship.goal.y) ** 2);
  if (gDist < ship.goal.radius + SHIP_SIZE) {
    ship.won = true;
    spawnGoalParticles(ship.goal.x, ship.goal.y);
    setTimeout(() => {
      if (currentLevel < levels.length - 1) {
        loadLevel(currentLevel + 1);
      } else {
        showMessage('MISSION COMPLETE', 'All sectors cleared', `Total time: ${levelTime.toFixed(1)}s\nYou mastered the gravity fields.`, 'Replay', () => { loadLevel(0); });
      }
    }, 1500);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Age trail
  for (const t of trail) t.age += dt;

  // HUD
  document.getElementById('hud-time').textContent = levelTime.toFixed(1) + 's';
  document.getElementById('fuel-bar').style.width = (ship.fuel / ship.maxFuel * 100) + '%';
}

// ========== DRAW ==========
function draw() {
  ctx.fillStyle = '#040810';
  ctx.fillRect(0, 0, W, H);

  const time = performance.now() / 1000;

  // Stars
  for (const s of stars) {
    const twinkle = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.x);
    ctx.globalAlpha = s.brightness * twinkle;
    ctx.fillStyle = '#cdf';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (!ship) return;

  // Gravity field rings
  for (const p of ship.planets) {
    const influence = Math.sqrt(p.mass) * 3;
    for (let r = p.radius + 15; r < influence; r += 18) {
      const alpha = 0.08 * (1 - (r - p.radius) / influence);
      ctx.strokeStyle = p.color;
      ctx.globalAlpha = alpha * (0.6 + 0.4 * Math.sin(time * 1.5 + r * 0.05));
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Planets
  for (const p of ship.planets) {
    // Glow
    const grad = ctx.createRadialGradient(p.x, p.y, p.radius * 0.3, p.x, p.y, p.radius * 2.5);
    grad.addColorStop(0, hexToRgba(p.color, 0.25));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Body
    const bodyGrad = ctx.createRadialGradient(p.x - p.radius * 0.3, p.y - p.radius * 0.3, p.radius * 0.1, p.x, p.y, p.radius);
    bodyGrad.addColorStop(0, '#fff');
    bodyGrad.addColorStop(0.4, p.color);
    bodyGrad.addColorStop(1, hexToRgba(p.color, 0.53));
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Goal portal
  const goal = ship.goal;
  const pulseR = goal.radius + 4 * Math.sin(time * 3);

  // Goal outer glow
  const gGrad = ctx.createRadialGradient(goal.x, goal.y, pulseR * 0.2, goal.x, goal.y, pulseR * 2);
  gGrad.addColorStop(0, 'rgba(0,255,160,0.3)');
  gGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = gGrad;
  ctx.beginPath();
  ctx.arc(goal.x, goal.y, pulseR * 2, 0, Math.PI * 2);
  ctx.fill();

  // Goal ring
  ctx.strokeStyle = '#0fa';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.6 + 0.4 * Math.sin(time * 4);
  ctx.beginPath();
  ctx.arc(goal.x, goal.y, pulseR, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(goal.x, goal.y, pulseR * 0.6, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Spinning arcs around goal
  for (let i = 0; i < 3; i++) {
    const aOff = (Math.PI * 2 / 3) * i + time * 2;
    ctx.strokeStyle = '#0fa';
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(goal.x, goal.y, pulseR + 8, aOff, aOff + 0.8);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Fuel stations
  for (const fs of ship.fuelStations) {
    if (fs.collected) {
      // Draw dimmed empty shell
      ctx.globalAlpha = 0.15;
      ctx.strokeStyle = '#f80';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(fs.x, fs.y, FUEL_STATION_RADIUS, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      continue;
    }
    const fsPulse = FUEL_STATION_RADIUS + 2 * Math.sin(time * 4);

    // Outer glow
    const fsGrad = ctx.createRadialGradient(fs.x, fs.y, fsPulse * 0.3, fs.x, fs.y, fsPulse * 2.5);
    fsGrad.addColorStop(0, 'rgba(255,170,0,0.3)');
    fsGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = fsGrad;
    ctx.beginPath();
    ctx.arc(fs.x, fs.y, fsPulse * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Core body
    const fsBody = ctx.createRadialGradient(fs.x, fs.y, fsPulse * 0.15, fs.x, fs.y, fsPulse);
    fsBody.addColorStop(0, '#fff');
    fsBody.addColorStop(0.35, '#fa0');
    fsBody.addColorStop(1, 'rgba(255,120,0,0.4)');
    ctx.fillStyle = fsBody;
    ctx.beginPath();
    ctx.arc(fs.x, fs.y, fsPulse, 0, Math.PI * 2);
    ctx.fill();

    // Fuel drop icon (diamond shape in center)
    ctx.save();
    ctx.translate(fs.x, fs.y);
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.moveTo(0, -7);
    ctx.quadraticCurveTo(6, 0, 0, 7);
    ctx.quadraticCurveTo(-6, 0, 0, -7);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();

    // Spinning arcs
    for (let i = 0; i < 2; i++) {
      const aOff = (Math.PI) * i + time * 3;
      ctx.strokeStyle = '#fa0';
      ctx.globalAlpha = 0.4;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(fs.x, fs.y, fsPulse + 5, aOff, aOff + 0.7);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Trail
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const alpha = (i / trail.length) * 0.5 * Math.max(0, 1 - t.age * 0.5);
    if (alpha <= 0) continue;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#4af';
    ctx.beginPath();
    ctx.arc(t.x, t.y, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Missile trails (persistent)
  if (showMissileTrails) {
    for (const mt of missileTrails) {
      if (mt.points.length < 2) continue;
      ctx.strokeStyle = mt.color;
      ctx.globalAlpha = 0.35;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(mt.points[0].x, mt.points[0].y);
      for (let i = 1; i < mt.points.length; i++) {
        ctx.lineTo(mt.points[i].x, mt.points[i].y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }
    // Active missile trails
    for (const m of missiles) {
      if (m.trail.length < 2) continue;
      ctx.strokeStyle = m.color;
      ctx.globalAlpha = 0.5;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(m.trail[0].x, m.trail[0].y);
      for (let i = 1; i < m.trail.length; i++) {
        ctx.lineTo(m.trail[i].x, m.trail[i].y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  ctx.globalAlpha = 1;

  // Active missiles (dots)
  for (const m of missiles) {
    ctx.fillStyle = m.color;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.arc(m.x, m.y, MISSILE_SIZE, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(m.x, m.y, MISSILE_SIZE * 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Ship
  if (ship.alive && !ship.won) {
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(ship.angle);

    // Ship glow
    const sGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 20);
    sGrad.addColorStop(0, 'rgba(100,200,255,0.3)');
    sGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = sGrad;
    ctx.beginPath();
    ctx.arc(0, 0, 20, 0, Math.PI * 2);
    ctx.fill();

    // Ship body (triangle)
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#4af';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(SHIP_SIZE + 2, 0);
    ctx.lineTo(-SHIP_SIZE + 2, -SHIP_SIZE * 0.65);
    ctx.lineTo(-SHIP_SIZE * 0.5 + 2, 0);
    ctx.lineTo(-SHIP_SIZE + 2, SHIP_SIZE * 0.65);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.restore();

    // Aim indicator when parked
    if (shipParked) {
      ctx.save();
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = '#4af';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(ship.x, ship.y);
      ctx.lineTo(ship.x + Math.cos(ship.angle) * 120, ship.y + Math.sin(ship.angle) * 120);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      // "SPACE to launch" text
      ctx.globalAlpha = 0.5 + 0.3 * Math.sin(time * 3);
      ctx.fillStyle = '#4af';
      ctx.font = '14px "Segoe UI", Arial, sans-serif';
      ctx.textAlign = 'center';
      const launchText = isTouchDevice ? 'TAP TO LAUNCH' : 'SPACE TO LAUNCH  |  F — FIRE PROBE  |  T — TRAILS  |  SCROLL / +- — SPEED';
      ctx.fillText(launchText, W / 2, H - 60);
      ctx.globalAlpha = 1;
    }

    // Gravity indicator arrows (subtle)
    let totalGx = 0, totalGy = 0;
    for (const p of ship.planets) {
      const dx = p.x - ship.x;
      const dy = p.y - ship.y;
      const distSq = dx * dx + dy * dy;
      const dist = Math.sqrt(distSq);
      const force = G * p.mass / distSq;
      totalGx += (dx / dist) * force;
      totalGy += (dy / dist) * force;
    }
    const gMag = Math.sqrt(totalGx * totalGx + totalGy * totalGy);
    if (gMag > 10) {
      const gAngle = Math.atan2(totalGy, totalGx);
      const indicatorDist = 22;
      const ix = ship.x + Math.cos(gAngle) * indicatorDist;
      const iy = ship.y + Math.sin(gAngle) * indicatorDist;
      ctx.globalAlpha = Math.min(0.5, gMag / 800);
      ctx.strokeStyle = '#f84';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(ship.x + Math.cos(gAngle) * 16, ship.y + Math.sin(gAngle) * 16);
      ctx.lineTo(ix, iy);
      ctx.stroke();
      // Arrow head
      const aLen = 4;
      ctx.beginPath();
      ctx.moveTo(ix, iy);
      ctx.lineTo(ix - Math.cos(gAngle - 0.4) * aLen, iy - Math.sin(gAngle - 0.4) * aLen);
      ctx.moveTo(ix, iy);
      ctx.lineTo(ix - Math.cos(gAngle + 0.4) * aLen, iy - Math.sin(gAngle + 0.4) * aLen);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // ========== DRAW VIRTUAL JOYSTICK ==========
  if (touchActive && gameState === 'playing') {
    // Outer ring (base)
    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = '#4af';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(touchStartX, touchStartY, JOYSTICK_RADIUS, 0, Math.PI * 2);
    ctx.stroke();

    // Inner fill (subtle)
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#4af';
    ctx.beginPath();
    ctx.arc(touchStartX, touchStartY, JOYSTICK_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Thumb knob position (clamped to radius)
    const dx = touchCurrentX - touchStartX;
    const dy = touchCurrentY - touchStartY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const clampedDist = Math.min(dist, JOYSTICK_RADIUS);
    const knobX = dist > 0 ? touchStartX + (dx / dist) * clampedDist : touchStartX;
    const knobY = dist > 0 ? touchStartY + (dy / dist) * clampedDist : touchStartY;

    // Direction line
    if (dist > JOYSTICK_DEADZONE) {
      ctx.globalAlpha = 0.25;
      ctx.strokeStyle = '#4af';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(touchStartX, touchStartY);
      ctx.lineTo(knobX, knobY);
      ctx.stroke();
    }

    // Thumb knob
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#4af';
    ctx.beginPath();
    ctx.arc(knobX, knobY, 18, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(knobX, knobY, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
  }

  // Trail toggle indicator
  if (gameState === 'playing') {
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = showMissileTrails ? '#4f4' : '#f44';
    ctx.font = '10px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('TRAILS: ' + (showMissileTrails ? 'ON' : 'OFF'), W - 20, H - 20);
    // Missile speed indicator
    ctx.fillStyle = '#fa0';
    ctx.fillText('SPEED: ' + missileSpeed, W - 20, H - 36);
    ctx.globalAlpha = 1;
  }
}

// ========== MESSAGE OVERLAY ==========
function showMessage(title, subtitle, body, btnText, action) {
  const overlay = document.getElementById('message-overlay');
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-subtitle').textContent = subtitle;
  document.getElementById('msg-body').innerHTML = body.replace(/\n/g, '<br>');
  const btn = document.getElementById('msg-btn');
  btn.textContent = btnText;
  btn.onclick = action;
  // Hide level picker on win/fail screens
  document.getElementById('level-select').style.display = 'none';
  overlay.classList.remove('hidden');
}

function hideMessage() {
  document.getElementById('message-overlay').classList.add('hidden');
}

// ========== LEVEL SELECT GRID ==========
function buildLevelGrid() {
  const grid = document.getElementById('level-grid');
  if (!grid) return;
  grid.innerHTML = '';
  levels.forEach((lev, i) => {
    const btn = document.createElement('button');
    btn.className = 'lvl-btn' + (i === selectedStartLevel ? ' active' : '');
    btn.title = lev.name;
    btn.innerHTML = `<span class="lvl-num">${i + 1}</span><span class="lvl-dot"></span>`;
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedStartLevel = i;
      grid.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('msg-subtitle').textContent = `Level ${i + 1}: ${lev.name}`;
    });
    grid.appendChild(btn);
  });
}

// ========== START ==========
function startGame() {
  hideMessage();
  gameState = 'playing';
  loadLevel(selectedStartLevel);
}

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// Initialize
generateStars();
gameState = 'menu';
ship = null;
particles = [];
trail = [];

// Read URL hash for starting level: #3 or #level=3 (1-indexed)
(function() {
  const hash = window.location.hash.replace('#', '');
  const n = parseInt(hash.replace(/[^0-9]/g, '')) - 1;
  if (!isNaN(n) && n >= 0 && n < levels.length) {
    selectedStartLevel = n;
  }
})();

buildLevelGrid();

// Show level name for pre-selected level on start screen
if (selectedStartLevel > 0) {
  document.getElementById('msg-subtitle').textContent =
    `Level ${selectedStartLevel + 1}: ${levels[selectedStartLevel].name}`;
}

// Update controls hint and restart button for touch devices
if (isTouchDevice) {
  document.getElementById('controls-hint').textContent = 'Touch & drag to thrust';
  document.getElementById('restart-btn').style.display = 'flex';
}

lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
