<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PIXEL MOTO - Excite Racer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  #game-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
  canvas { image-rendering: pixelated; image-rendering: crisp-edges; touch-action: none; }
  #mobile-controls-moto { display: none; margin-top: 12px; gap: 8px; }
  #dpad-moto { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px; gap: 4px; }
  #dpad-moto button { background: rgba(255, 107, 0, 0.7); border: 2px solid #FF6B00; border-radius: 8px; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; touch-action: none; }
  #dpad-moto button:active { background: rgba(255, 107, 0, 1); transform: scale(0.95); }
  #dpad-moto .empty { visibility: hidden; }
  .moto-action-btn { background: rgba(255, 107, 0, 0.7); border: 2px solid #FF6B00; border-radius: 8px; color: #fff; padding: 10px 14px; font-size: 12px; font-weight: bold; cursor: pointer; touch-action: none; min-width: 56px; text-align: center; }
  .moto-action-btn:active { background: rgba(255, 107, 0, 1); transform: scale(0.95); }
  @media (max-width: 600px) { #mobile-controls-moto { display: flex !important; } }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game"></canvas>
</div>
<div id="mobile-controls-moto">
  <div id="dpad-moto">
    <div class="empty"></div>
    <button onmousedown="motoKey('w',1)" onmouseup="motoKey('w',0)" ontouchstart="motoKey('w',1);event.preventDefault()" ontouchend="motoKey('w',0);event.preventDefault()" style="touch-action:none">▲</button>
    <div class="empty"></div>
    <button onmousedown="motoKey('a',1)" onmouseup="motoKey('a',0)" ontouchstart="motoKey('a',1);event.preventDefault()" ontouchend="motoKey('a',0);event.preventDefault()" style="touch-action:none">◀</button>
    <div class="empty"></div>
    <button onmousedown="motoKey('d',1)" onmouseup="motoKey('d',0)" ontouchstart="motoKey('d',1);event.preventDefault()" ontouchend="motoKey('d',0);event.preventDefault()" style="touch-action:none">▶</button>
    <div class="empty"></div>
    <button onmousedown="motoKey('s',1)" onmouseup="motoKey('s',0)" ontouchstart="motoKey('s',1);event.preventDefault()" ontouchend="motoKey('s',0);event.preventDefault()" style="touch-action:none">▼</button>
    <div class="empty"></div>
  </div>
  <button class="moto-action-btn" onmousedown="motoKey(' ',1)" onmouseup="motoKey(' ',0)" ontouchstart="motoKey(' ',1);event.preventDefault()" ontouchend="motoKey(' ',0);event.preventDefault()" style="touch-action:none">BRAKE</button>
  <button class="moto-action-btn" onmousedown="motoKey('shift',1)" onmouseup="motoKey('shift',0)" ontouchstart="motoKey('shift',1);event.preventDefault()" ontouchend="motoKey('shift',0);event.preventDefault()" style="touch-action:none">TURBO</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GW = 480, GH = 320;
canvas.width = GW; canvas.height = GH;

function fitScreen() {
  const scale = Math.min(window.innerWidth / GW, window.innerHeight / GH);
  canvas.style.width = Math.floor(GW * scale) + 'px';
  canvas.style.height = Math.floor(GH * scale) + 'px';
}
fitScreen();
window.addEventListener('resize', fitScreen);

// ===== AUDIO =====
let audioCtx = null, masterGain = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.35;
  masterGain.connect(audioCtx.destination);
}

let engOsc1 = null, engOsc2 = null, engGain = null, engFilter = null;
function startEngine() {
  if (!audioCtx || engOsc1) return;
  engOsc1 = audioCtx.createOscillator();
  engOsc2 = audioCtx.createOscillator();
  engGain = audioCtx.createGain();
  engFilter = audioCtx.createBiquadFilter();
  const dist = audioCtx.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) curve[i] = Math.tanh(((i*2)/256-1)*4);
  dist.curve = curve;
  engOsc1.type = 'sawtooth'; engOsc1.frequency.value = 55;
  engOsc2.type = 'square'; engOsc2.frequency.value = 110;
  engFilter.type = 'lowpass'; engFilter.frequency.value = 300; engFilter.Q.value = 4;
  engGain.gain.value = 0.04;
  engOsc1.connect(dist); engOsc2.connect(dist);
  dist.connect(engFilter); engFilter.connect(engGain); engGain.connect(masterGain);
  engOsc1.start(); engOsc2.start();
}

function updateEngine(speed, max) {
  if (!engOsc1) return;
  const r = speed / max;
  engOsc1.frequency.setTargetAtTime(45 + r * 90, audioCtx.currentTime, 0.04);
  engOsc2.frequency.setTargetAtTime(90 + r * 180, audioCtx.currentTime, 0.04);
  engFilter.frequency.setTargetAtTime(200 + r * 1200, audioCtx.currentTime, 0.04);
  engGain.gain.setTargetAtTime(0.02 + r * 0.05, audioCtx.currentTime, 0.04);
}

function stopEngine() {
  [engOsc1, engOsc2].forEach(o => { try { o.stop(); o.disconnect(); } catch(e){} });
  try { engGain.disconnect(); } catch(e){}
  try { engFilter.disconnect(); } catch(e){}
  engOsc1 = engOsc2 = engGain = engFilter = null;
}

function sfx(freq, freq2, dur, type, vol) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, now);
  if (freq2) o.frequency.exponentialRampToValueAtTime(freq2, now + dur);
  g.gain.setValueAtTime(vol || 0.08, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + dur);
  o.connect(g); g.connect(masterGain);
  o.start(now); o.stop(now + dur + 0.01);
}

function sfxNoise(dur, fq, q, vol) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const buf = audioCtx.createBufferSource();
  const len = Math.floor(audioCtx.sampleRate * dur);
  const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random()*2-1)*(1-i/len);
  buf.buffer = buffer;
  const f = audioCtx.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.value = fq||2000; f.Q.value = q||1;
  const g = audioCtx.createGain(); g.gain.value = vol||0.08;
  buf.connect(f); f.connect(g); g.connect(masterGain);
  buf.start(now);
}

function playJump() { sfx(200, 600, 0.12, 'square', 0.07); }
function playLand() { sfxNoise(0.08, 800, 2, 0.1); sfx(100, 40, 0.1, 'sine', 0.08); }
function playCrash() { sfxNoise(0.4, 2500, 2, 0.15); sfx(200, 30, 0.35, 'sawtooth', 0.12); }
function playOverheat() { sfx(800, 200, 0.5, 'sawtooth', 0.06); }
function playCooldown() { sfx(300, 800, 0.15, 'sine', 0.05); }
function playBoost() { sfx(300, 900, 0.2, 'sawtooth', 0.07); sfxNoise(0.15, 4000, 3, 0.06); }
function playLap() { [523,659,784,1047].forEach((f,i) => setTimeout(() => sfx(f,f*0.99,0.15,'square',0.06), i*80)); }
function playCountdown() { sfx(440, 430, 0.12, 'square', 0.07); }
function playGo() { sfx(880, 870, 0.25, 'square', 0.09); }
function playFinish() { [523,659,784,1047,1318].forEach((f,i) => setTimeout(() => sfx(f,f*0.99,0.25,'square',0.07), i*100)); }

// ===== CONSTANTS =====
const LANES = [138, 168, 198, 228]; // y positions of 4 lanes
const LANE_H = 30;
const TRACK_LEN = 8000; // pixels total track length
const LAPS_TOTAL = 3;

// ===== STATE =====
const ST = { MENU: 0, COUNTDOWN: 1, RACE: 2, CRASH: 3, FINISH: 4 };
let state = ST.MENU;
let gameTime = 0, raceTime = 0, countdownT = 0;
let bestTime = Infinity;
let score = 0;

// Player
let px, py, pSpeed, pMaxSpeed, pLane, pAirborne, pAirVy, pAirY;
let pAngle, pWheelie, pCrashT, pInvincible;
let heat, overheated, overheatCooldown;
let turboActive, turboTimer;
let lapCount, lapTimes;
let camX;

// Track objects
let ramps = [], obstacles = [], boosts = [], rivals = [];

let keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch button handler
function motoKey(key, isDown) {
  const codeMap = { 'w': 'KeyW', 'a': 'KeyA', 's': 'KeyS', 'd': 'KeyD', ' ': 'Space', 'shift': 'ShiftLeft' };
  const code = codeMap[key] || ('Key' + key.toUpperCase());
  keys[code] = isDown;
}

// ===== TRACK GENERATION =====
function buildTrack() {
  ramps = []; obstacles = []; boosts = [];

  // Generate ramps
  for (let i = 0; i < 35; i++) {
    const x = 300 + Math.floor(Math.random() * (TRACK_LEN - 600));
    const lane = Math.floor(Math.random() * 4);
    const type = Math.random() < 0.3 ? 'big' : 'small';
    ramps.push({ x, lane, type });
  }

  // Generate obstacles
  for (let i = 0; i < 25; i++) {
    const x = 400 + Math.floor(Math.random() * (TRACK_LEN - 500));
    const lane = Math.floor(Math.random() * 4);
    const type = ['mud', 'barrier', 'tire'][Math.floor(Math.random() * 3)];
    obstacles.push({ x, lane, type });
  }

  // Generate boost pads
  for (let i = 0; i < 12; i++) {
    const x = 300 + Math.floor(Math.random() * (TRACK_LEN - 400));
    const lane = Math.floor(Math.random() * 4);
    boosts.push({ x, lane, used: false });
  }

  // Generate rivals
  rivals = [];
  const rColors = ['#e44','#4a4','#44e','#ea4','#e4e','#4ee'];
  for (let i = 0; i < 6; i++) {
    rivals.push({
      x: 100 + Math.random() * 200,
      lane: Math.floor(Math.random() * 4),
      speed: 120 + Math.random() * 100,
      targetSpeed: 120 + Math.random() * 100,
      color: rColors[i],
      laneTimer: Math.random() * 3,
      lap: 0,
      wheelie: 0,
    });
  }
}

function resetPlayer() {
  px = 80; py = LANES[1]; pSpeed = 0; pMaxSpeed = 300;
  pLane = 1; pAirborne = false; pAirVy = 0; pAirY = 0;
  pAngle = 0; pWheelie = 0; pCrashT = 0; pInvincible = 0;
  heat = 0; overheated = false; overheatCooldown = 0;
  turboActive = false; turboTimer = 0;
  lapCount = 0; lapTimes = [];
  camX = 0; score = 0; raceTime = 0;
  for (const b of boosts) b.used = false;
}

function startRace() {
  initAudio();
  buildTrack();
  resetPlayer();
  state = ST.COUNTDOWN;
  countdownT = 3.5;
}

// ===== UPDATE =====
function update(dt) {
  gameTime += dt;
  if (state === ST.MENU) return;

  if (state === ST.COUNTDOWN) {
    const prev = Math.ceil(countdownT);
    countdownT -= dt;
    const cur = Math.ceil(countdownT);
    if (cur !== prev && cur > 0 && cur <= 3) playCountdown();
    if (countdownT <= 0) {
      state = ST.RACE;
      playGo();
      startEngine();
    }
    return;
  }

  if (state === ST.CRASH) {
    pCrashT -= dt;
    pSpeed *= 0.94;
    if (pCrashT <= 0) {
      state = ST.RACE;
      pInvincible = 2;
      pSpeed = 60;
      pAirborne = false; pAirY = 0; pAngle = 0;
    }
    camX += (px - GW * 0.3 - camX) * 5 * dt;
    updateRivals(dt);
    updateEngine(pSpeed, pMaxSpeed);
    return;
  }

  if (state === ST.FINISH) {
    pSpeed *= 0.98;
    px += pSpeed * dt;
    camX += (px - GW * 0.3 - camX) * 5 * dt;
    updateEngine(pSpeed, pMaxSpeed);
    return;
  }

  // === RACING ===
  raceTime += dt;

  const accel = keys['ArrowUp'] || keys['KeyW'];
  const brake = keys['ArrowDown'] || keys['KeyS'];
  const left = keys['ArrowLeft'] || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];
  const turboKey = keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyZ'];

  // Turbo / heat
  const effectiveMax = turboActive ? pMaxSpeed * 1.35 : (turboKey && !overheated ? pMaxSpeed * 1.15 : pMaxSpeed);

  if (turboKey && !overheated && !turboActive) {
    heat += dt * 40;
    if (heat >= 100) {
      heat = 100;
      overheated = true;
      overheatCooldown = 3;
      pSpeed *= 0.5;
      playOverheat();
    }
  } else {
    heat = Math.max(0, heat - dt * (overheated ? 50 : 20));
    if (overheated) {
      overheatCooldown -= dt;
      if (overheatCooldown <= 0) {
        overheated = false;
        playCooldown();
      }
    }
  }

  if (turboActive) {
    turboTimer -= dt;
    if (turboTimer <= 0) turboActive = false;
  }

  // Acceleration
  if (!pAirborne) {
    if (accel && !overheated) {
      pSpeed = Math.min(effectiveMax, pSpeed + 220 * dt);
    } else if (brake) {
      pSpeed = Math.max(0, pSpeed - 350 * dt);
    } else {
      pSpeed = Math.max(0, pSpeed - 60 * dt);
    }
  }

  // Lane switching
  if (!pAirborne) {
    if (left && !keys._prevLeft) {
      pLane = Math.max(0, pLane - 1);
    }
    if (right && !keys._prevRight) {
      pLane = Math.min(3, pLane + 1);
    }
  }
  keys._prevLeft = left;
  keys._prevRight = right;

  // Wheelie
  if (keys['KeyX'] || keys['Space']) {
    pWheelie = Math.min(1, pWheelie + dt * 4);
  } else {
    pWheelie = Math.max(0, pWheelie - dt * 3);
  }

  // Move
  px += pSpeed * dt;

  // Airborne physics
  if (pAirborne) {
    pAirVy += 600 * dt; // gravity
    pAirY += pAirVy * dt;
    if (pAirY >= 0) {
      pAirY = 0;
      pAirborne = false;
      pAirVy = 0;
      playLand();
      // Bad landing penalty
      if (Math.abs(pAngle) > 0.3) {
        pSpeed *= 0.7;
        sfxNoise(0.1, 1000, 2, 0.06);
      }
      pAngle = 0;
    }
    // Air control for angle
    if (left || keys['KeyA']) pAngle -= dt * 3;
    if (right || keys['KeyD']) pAngle += dt * 3;
    pAngle = Math.max(-0.8, Math.min(0.8, pAngle));
  } else {
    // Smooth lane transition
    const targetY = LANES[pLane];
    py += (targetY - py) * 10 * dt;
    pAngle *= 0.9;
  }

  // Invincibility
  if (pInvincible > 0) pInvincible -= dt;

  // Track wrapping (laps)
  if (px >= TRACK_LEN) {
    px -= TRACK_LEN;
    lapCount++;
    lapTimes.push(raceTime);
    if (lapCount >= LAPS_TOTAL) {
      state = ST.FINISH;
      if (raceTime < bestTime) bestTime = raceTime;
      playFinish();
      stopEngine();
      return;
    }
    playLap();
    // Reset boosts
    for (const b of boosts) b.used = false;
  }

  // Collisions with ramps
  if (!pAirborne) {
    for (const r of ramps) {
      if (r.lane !== pLane) continue;
      const rw = r.type === 'big' ? 30 : 20;
      if (px > r.x && px < r.x + rw) {
        pAirborne = true;
        const power = r.type === 'big' ? -220 : -150;
        pAirVy = power - (pSpeed * 0.2);
        pAngle = -0.2;
        playJump();
        score += 50;
      }
    }
  }

  // Collisions with obstacles
  if (pInvincible <= 0 && !pAirborne) {
    for (const o of obstacles) {
      if (o.lane !== pLane) continue;
      const ow = 20;
      if (px > o.x - 5 && px < o.x + ow) {
        if (o.type === 'mud') {
          pSpeed *= 0.6;
          sfxNoise(0.15, 500, 1, 0.06);
        } else {
          state = ST.CRASH;
          pCrashT = 1.2;
          pSpeed *= 0.1;
          playCrash();
          score = Math.max(0, score - 100);
        }
      }
    }
  }

  // Collisions with boosts
  if (!pAirborne) {
    for (const b of boosts) {
      if (b.used || b.lane !== pLane) continue;
      if (px > b.x && px < b.x + 25) {
        b.used = true;
        turboActive = true;
        turboTimer = 2;
        heat = Math.max(0, heat - 30);
        playBoost();
        score += 100;
      }
    }
  }

  // Rival collision
  if (pInvincible <= 0 && !pAirborne) {
    for (const r of rivals) {
      if (Math.floor(r.lane + 0.5) !== pLane) continue;
      const dx = Math.abs((r.x % TRACK_LEN) - px);
      if (dx < 18) {
        state = ST.CRASH;
        pCrashT = 1.2;
        pSpeed *= 0.1;
        playCrash();
      }
    }
  }

  // Camera
  camX += (px - GW * 0.3 - camX) * 5 * dt;

  // Update rivals
  updateRivals(dt);
  updateEngine(pSpeed, pMaxSpeed);
}

function updateRivals(dt) {
  for (const r of rivals) {
    // Speed variation
    r.laneTimer -= dt;
    if (r.laneTimer <= 0) {
      r.laneTimer = 1 + Math.random() * 3;
      r.targetSpeed = 100 + Math.random() * 140;
      if (Math.random() < 0.3) {
        r.lane = Math.max(0, Math.min(3, r.lane + (Math.random() < 0.5 ? -1 : 1)));
      }
    }
    r.speed += (r.targetSpeed - r.speed) * 2 * dt;
    r.x += r.speed * dt;
    r.wheelie = Math.sin(gameTime * 3 + r.x * 0.01) > 0.8 ? 1 : 0;

    if (r.x >= TRACK_LEN) {
      r.x -= TRACK_LEN;
      r.lap++;
    }

    // Dodge obstacles
    for (const o of obstacles) {
      if (Math.floor(r.lane + 0.5) === o.lane && Math.abs(r.x - o.x) < 80 && r.x < o.x) {
        r.lane = Math.max(0, Math.min(3, r.lane + (r.lane > 1 ? -1 : 1)));
        r.laneTimer = 0.5;
      }
    }
  }
}

// ===== RENDERING =====
function drawRect(x, y, w, h, col) {
  ctx.fillStyle = col;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(w), Math.ceil(h));
}

function drawText(txt, x, y, col, sz, align) {
  ctx.fillStyle = col;
  ctx.font = `bold ${sz || 10}px monospace`;
  ctx.textAlign = align || 'center';
  ctx.fillText(txt, Math.floor(x), Math.floor(y));
}

// Pixel art bike
function drawBike(sx, sy, color, wheelieAmt, airAngle, scale, crashed) {
  const s = scale || 1;
  ctx.save();
  ctx.translate(sx, sy);
  if (crashed) ctx.rotate(Math.sin(gameTime * 20) * 0.5);
  if (airAngle) ctx.rotate(airAngle);

  const w = wheelieAmt || 0;
  const spdRatio = pSpeed / pMaxSpeed;
  const wheelSpin = (gameTime * spdRatio * 40) % (Math.PI * 2);

  // === SHADOW ===
  if (!crashed && !pAirborne) {
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(2*s, 7*s, 16*s, 2.5*s, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // === BACK WHEEL ===
  const bwx = -11*s, bwy = 0 + w*3*s;
  // Tire
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(bwx+4*s, bwy+3*s, 5*s, 0, Math.PI*2); ctx.fill();
  // Tire tread pattern
  ctx.fillStyle = '#2a2a2a';
  for (let a = 0; a < 6; a++) {
    const ta = wheelSpin + a * Math.PI/3;
    const tx = bwx+4*s + Math.cos(ta)*4*s;
    const ty = bwy+3*s + Math.sin(ta)*4*s;
    drawRect(tx-1*s, ty-0.5*s, 2*s, 1*s, '#2a2a2a');
  }
  // Rim
  ctx.fillStyle = '#888';
  ctx.beginPath(); ctx.arc(bwx+4*s, bwy+3*s, 2.5*s, 0, Math.PI*2); ctx.fill();
  // Hub
  ctx.fillStyle = '#bbb';
  ctx.beginPath(); ctx.arc(bwx+4*s, bwy+3*s, 1.2*s, 0, Math.PI*2); ctx.fill();
  // Spokes
  ctx.strokeStyle = '#999'; ctx.lineWidth = 0.6*s;
  for (let a = 0; a < 4; a++) {
    const sa = wheelSpin + a * Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(bwx+4*s + Math.cos(sa)*1.2*s, bwy+3*s + Math.sin(sa)*1.2*s);
    ctx.lineTo(bwx+4*s + Math.cos(sa)*4*s, bwy+3*s + Math.sin(sa)*4*s);
    ctx.stroke();
  }

  // === FRONT WHEEL ===
  const fwx = 6*s, fwy = 0;
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(fwx+4*s, fwy+3*s, 5*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a2a2a';
  for (let a = 0; a < 6; a++) {
    const ta = wheelSpin + a * Math.PI/3;
    const tx = fwx+4*s + Math.cos(ta)*4*s;
    const ty = fwy+3*s + Math.sin(ta)*4*s;
    drawRect(tx-1*s, ty-0.5*s, 2*s, 1*s, '#2a2a2a');
  }
  ctx.fillStyle = '#888';
  ctx.beginPath(); ctx.arc(fwx+4*s, fwy+3*s, 2.5*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#bbb';
  ctx.beginPath(); ctx.arc(fwx+4*s, fwy+3*s, 1.2*s, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#999'; ctx.lineWidth = 0.6*s;
  for (let a = 0; a < 4; a++) {
    const sa = wheelSpin + a * Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(fwx+4*s + Math.cos(sa)*1.2*s, fwy+3*s + Math.sin(sa)*1.2*s);
    ctx.lineTo(fwx+4*s + Math.cos(sa)*4*s, fwy+3*s + Math.sin(sa)*4*s);
    ctx.stroke();
  }

  // === FENDER (rear) ===
  drawRect(-9*s, -3*s + w*2.5*s, 8*s, 2*s, '#444');
  drawRect(-8*s, -2*s + w*2.5*s, 6*s, 1*s, '#555');

  // === CHAIN ===
  ctx.strokeStyle = '#666'; ctx.lineWidth = 1*s;
  ctx.beginPath();
  ctx.moveTo(bwx+4*s, bwy+3*s);
  ctx.lineTo(0, 2*s + w*2*s);
  ctx.stroke();
  // Sprocket
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.arc(0, 2*s + w*2*s, 1.5*s, 0, Math.PI*2); ctx.fill();

  // === EXHAUST PIPE ===
  drawRect(-14*s, 0 + w*2*s, 7*s, 2*s, '#888');
  drawRect(-15*s, -1*s + w*2*s, 2*s, 4*s, '#777');
  drawRect(-13*s, 1*s + w*2*s, 5*s, 1*s, '#999');
  // Exhaust tip
  drawRect(-16*s, 0 + w*2*s, 2*s, 2*s, '#aaa');

  // Exhaust flames when turbo
  if (turboActive && !crashed) {
    const flicker = Math.sin(gameTime * 30);
    drawRect(-19*s, -1*s + w*2*s, 4*s, 4*s, '#f60');
    drawRect(-22*s, 0 + w*2*s, 4*s, 2*s, flicker > 0 ? '#ff0' : '#fa0');
    drawRect(-24*s, 0 + w*2*s, 2*s, 1*s, '#ff8');
    // Flame particles
    for (let i = 0; i < 3; i++) {
      const fx = -24*s - Math.random()*6*s;
      const fy = w*2*s + (Math.random()-0.5)*4*s;
      drawRect(fx, fy, 2*s, 1*s, ['#ff0','#f80','#f44'][i]);
    }
  } else if (spdRatio > 0.6 && !crashed) {
    // Small exhaust puffs at high speed
    const puffAlpha = (spdRatio - 0.6) * 0.5;
    for (let i = 0; i < 2; i++) {
      const px2 = -18*s - Math.random()*4*s;
      const py2 = w*2*s + (Math.random()-0.5)*3*s;
      drawRect(px2, py2, 2*s, 2*s, `rgba(150,150,150,${puffAlpha})`);
    }
  }

  // === ENGINE BLOCK ===
  drawRect(-5*s, -1*s + w*2*s, 10*s, 5*s, '#3a3a3a');
  drawRect(-4*s, 0 + w*2*s, 8*s, 3*s, '#4a4a4a');
  // Cylinder fins
  for (let i = 0; i < 3; i++) {
    drawRect(-4*s, (-1 + i*1.5)*s + w*2*s, 9*s, 0.7*s, '#555');
  }
  // Engine highlight
  drawRect(-3*s, 0.5*s + w*2*s, 2*s, 1*s, '#666');

  // === FRAME / BODY ===
  // Main body with fairing
  const bodyColor = color || '#d22';
  const bodyHighlight = lightenColor(bodyColor, 40);
  const bodyDark = darkenColor(bodyColor, 40);

  drawRect(-6*s, -6*s + w*s, 17*s, 6*s, bodyColor);
  drawRect(-5*s, -5*s + w*s, 15*s, 2*s, bodyHighlight);
  drawRect(-6*s, -2*s + w*s, 17*s, 2*s, bodyDark);
  // Racing stripe
  drawRect(-4*s, -4.5*s + w*s, 13*s, 1*s, '#fff');
  drawRect(-3*s, -3.5*s + w*s, 11*s, 0.5*s, '#ddd');
  // Number plate
  drawRect(2*s, -5*s + w*s, 6*s, 4*s, '#fff');
  drawRect(2.5*s, -4.5*s + w*s, 5*s, 3*s, '#eee');
  drawText('7', 5.5*s, -2*s + w*s, '#111', Math.max(5, Math.floor(7*s)), 'center');

  // === FRONT FORK ===
  ctx.strokeStyle = '#777'; ctx.lineWidth = 1.5*s;
  ctx.beginPath();
  ctx.moveTo(6*s, -4*s);
  ctx.lineTo(fwx+4*s, fwy-1*s);
  ctx.stroke();
  ctx.strokeStyle = '#999'; ctx.lineWidth = 1*s;
  ctx.beginPath();
  ctx.moveTo(7*s, -4*s);
  ctx.lineTo(fwx+5*s, fwy-1*s);
  ctx.stroke();

  // === FRONT FENDER ===
  drawRect(fwx+1*s, fwy-2*s, 6*s, 2*s, '#555');

  // === HEADLIGHT ===
  drawRect(11*s, -5*s, 2*s, 3*s, '#ff8');
  drawRect(12*s, -4*s, 1*s, 1*s, '#fff');

  // Tail light
  drawRect(-7*s, -4*s + w*s, 1*s, 2*s, '#f00');
  if (pSpeed < pMaxSpeed * 0.3) {
    drawRect(-8*s, -5*s + w*s, 2*s, 3*s, 'rgba(255,0,0,0.4)');
  }

  // === HANDLEBARS ===
  drawRect(8*s, -9*s, 3*s, 2*s, '#555');
  drawRect(7*s, -10*s, 2*s, 2*s, '#666');
  drawRect(10*s, -10*s, 2*s, 2*s, '#666');
  // Grips
  drawRect(6*s, -11*s, 2*s, 2*s, '#222');
  drawRect(10*s, -11*s, 2*s, 2*s, '#222');

  // === SEAT ===
  drawRect(-4*s, -8*s + w*s, 10*s, 2*s, '#222');
  drawRect(-3*s, -9*s + w*s, 8*s, 1*s, '#333');
  // Seat stitch detail
  drawRect(-1*s, -8*s + w*s, 1*s, 1*s, '#444');
  drawRect(2*s, -8*s + w*s, 1*s, 1*s, '#444');

  // === RIDER ===
  const riderBob = Math.sin(gameTime * spdRatio * 12) * 0.5 * s * spdRatio;
  const leanShift = w * 2 * s;

  // Boots
  drawRect(-4*s, -3*s + w*s, 4*s, 4*s, '#2a2a2a');
  drawRect(3*s, -3*s, 4*s, 4*s, '#2a2a2a');
  drawRect(-5*s, -1*s + w*s, 2*s, 2*s, '#333'); // heel
  drawRect(6*s, -1*s, 2*s, 2*s, '#333');
  // Boot buckle
  drawRect(-3*s, -2*s + w*s, 2*s, 1*s, '#888');
  drawRect(4*s, -2*s, 2*s, 1*s, '#888');

  // Legs (leather pants)
  drawRect(-3*s, -7*s + w*s, 3*s, 5*s, '#1a1a3a');
  drawRect(3*s, -7*s, 3*s, 5*s, '#1a1a3a');
  // Knee pads
  drawRect(-3*s, -5*s + w*s, 3*s, 2*s, '#2a2a4a');
  drawRect(3*s, -5*s, 3*s, 2*s, '#2a2a4a');
  // Knee pad highlight
  drawRect(-2*s, -5*s + w*s, 1*s, 1*s, '#3a3a5a');
  drawRect(4*s, -5*s, 1*s, 1*s, '#3a3a5a');

  // Torso (leather jacket)
  drawRect(-2*s, -16*s + riderBob + leanShift, 8*s, 10*s, '#2244aa');
  drawRect(-1*s, -15*s + riderBob + leanShift, 6*s, 8*s, '#2a4ebb');
  // Jacket stripe
  drawRect(-1*s, -13*s + riderBob + leanShift, 6*s, 1*s, '#fff');
  drawRect(-1*s, -12*s + riderBob + leanShift, 6*s, 0.5*s, bodyColor);
  // Collar
  drawRect(0, -16*s + riderBob + leanShift, 4*s, 1*s, '#1a3488');
  // Zipper
  drawRect(1.5*s, -15*s + riderBob + leanShift, 1*s, 7*s, '#aaa');

  // Back arm (behind body)
  drawRect(-3*s, -14*s + riderBob + leanShift, 3*s, 3*s, '#2244aa');
  drawRect(-4*s, -12*s + riderBob + w*s, 3*s, 4*s, '#2a4ebb');
  // Glove
  drawRect(-5*s, -9*s + riderBob + w*s, 3*s, 2*s, '#333');

  // Front arm
  drawRect(5*s, -14*s + riderBob, 3*s, 3*s, '#2244aa');
  drawRect(5*s, -12*s + riderBob, 3*s, 4*s, '#2a4ebb');
  // Elbow pad
  drawRect(5*s, -11*s + riderBob, 3*s, 1.5*s, '#1a3488');
  // Glove gripping handlebar
  drawRect(6*s, -9*s + riderBob, 3*s, 2*s, '#333');

  // === HELMET ===
  const hx = 0, hy = -21*s + riderBob + leanShift;
  // Helmet shell
  drawRect(hx, hy, 7*s, 6*s, '#eee');
  drawRect(hx+1*s, hy-1*s, 5*s, 2*s, '#ddd'); // top curve
  drawRect(hx-0.5*s, hy+1*s, 1*s, 3*s, '#ccc'); // side
  // Helmet stripe
  drawRect(hx+1*s, hy+0.5*s, 5*s, 1*s, bodyColor);
  // Visor
  drawRect(hx+4*s, hy+1.5*s, 3*s, 3*s, '#1a3a6a');
  drawRect(hx+5*s, hy+2*s, 2*s, 2*s, '#2a5a9a');
  // Visor shine
  drawRect(hx+5*s, hy+2*s, 1*s, 1*s, '#5a9aea');
  // Helmet shine highlight
  drawRect(hx+1*s, hy, 2*s, 1*s, '#fff');
  // Chin guard
  drawRect(hx+3*s, hy+4*s, 4*s, 1.5*s, '#ddd');

  // === SPEED LINES (when fast) ===
  if (spdRatio > 0.7 && !crashed) {
    const lineAlpha = (spdRatio - 0.7) * 1.5;
    ctx.strokeStyle = `rgba(255,255,255,${lineAlpha * 0.3})`;
    ctx.lineWidth = 0.5*s;
    for (let i = 0; i < 4; i++) {
      const lx = -20*s - Math.random()*10*s;
      const ly = -15*s + Math.random()*25*s;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx - 8*s - Math.random()*6*s, ly);
      ctx.stroke();
    }
  }

  // === DIRT SPRAY (from back wheel, when on ground and moving) ===
  if (spdRatio > 0.3 && !crashed && !pAirborne && Math.abs(w) < 0.1) {
    const sprayAlpha = (spdRatio - 0.3) * 0.4;
    for (let i = 0; i < 3; i++) {
      const dx = bwx - 2*s - Math.random()*4*s;
      const dy = bwy + 5*s + Math.random()*3*s;
      drawRect(dx, dy, 2*s, 1*s, `rgba(120,90,50,${sprayAlpha})`);
    }
  }

  ctx.restore();
}

// Color helpers
function lightenColor(hex, amt) {
  let r = parseInt(hex.slice(1,2), 16) * 17;
  let g = parseInt(hex.slice(2,3), 16) * 17;
  let b = parseInt(hex.slice(3,4), 16) * 17;
  if (hex.length === 7) {
    r = parseInt(hex.slice(1,3), 16);
    g = parseInt(hex.slice(3,5), 16);
    b = parseInt(hex.slice(5,7), 16);
  }
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}

function darkenColor(hex, amt) {
  let r = parseInt(hex.slice(1,2), 16) * 17;
  let g = parseInt(hex.slice(2,3), 16) * 17;
  let b = parseInt(hex.slice(3,4), 16) * 17;
  if (hex.length === 7) {
    r = parseInt(hex.slice(1,3), 16);
    g = parseInt(hex.slice(3,5), 16);
    b = parseInt(hex.slice(5,7), 16);
  }
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

function render() {
  // Clear
  ctx.fillStyle = '#87ceeb';
  ctx.fillRect(0, 0, GW, GH);

  if (state === ST.MENU) { renderMenu(); return; }

  const cx = Math.floor(camX);

  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 120);
  skyGrad.addColorStop(0, '#2a1a4a');
  skyGrad.addColorStop(0.5, '#4a2a6a');
  skyGrad.addColorStop(1, '#e87040');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GW, 120);

  // Stars
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 30; i++) {
    const sx = ((i*137+50) % GW + (cx*0.02) % GW + GW) % GW;
    const sy = (i*97+5) % 60;
    if (Math.sin(gameTime*2+i) > 0.3) ctx.fillRect(sx, sy, 1, 1);
  }

  // Sun/moon
  drawRect(GW - 60 + (cx * 0.01) % 30, 20, 20, 20, '#ffdd44');
  drawRect(GW - 57 + (cx * 0.01) % 30, 23, 14, 14, '#ffee88');

  // Mountains (parallax)
  const mOff = (cx * 0.05) % GW;
  ctx.fillStyle = '#3a2050';
  for (let i = -1; i < 5; i++) {
    const mx = i * 140 - (mOff % 140);
    ctx.beginPath();
    ctx.moveTo(mx, 120); ctx.lineTo(mx+50, 60); ctx.lineTo(mx+80, 85);
    ctx.lineTo(mx+110, 50); ctx.lineTo(mx+140, 120);
    ctx.fill();
  }
  // Near mountains
  const mOff2 = (cx * 0.1) % GW;
  ctx.fillStyle = '#4a3060';
  for (let i = -1; i < 6; i++) {
    const mx = i * 100 - (mOff2 % 100);
    ctx.beginPath();
    ctx.moveTo(mx, 120); ctx.lineTo(mx+30, 80); ctx.lineTo(mx+55, 95);
    ctx.lineTo(mx+80, 70); ctx.lineTo(mx+100, 120);
    ctx.fill();
  }

  // Grandstand / buildings
  const bOff = (cx * 0.15) % 200;
  for (let i = -1; i < 5; i++) {
    const bx = i * 200 - (bOff % 200);
    drawRect(bx, 90, 60, 30, '#554');
    drawRect(bx+2, 92, 56, 26, '#665');
    // Windows
    for (let w = 0; w < 5; w++) {
      drawRect(bx+5+w*11, 95, 6, 6, '#ff8');
      drawRect(bx+5+w*11, 106, 6, 6, '#ff8');
    }
    // Crowd dots
    for (let c = 0; c < 8; c++) {
      drawRect(bx+4+c*7, 85, 4, 5, ['#e44','#4e4','#44e','#ee4','#fff'][c%5]);
    }
  }

  // Ground
  drawRect(0, 120, GW, GH - 120, '#8a6030');

  // Track surface
  drawRect(0, 125, GW, LANES[3] - 125 + LANE_H + 15, '#888');

  // Lane lines & track detail
  for (let l = 0; l < 4; l++) {
    const ly = LANES[l];
    // Lane surface (alternating shade for depth)
    drawRect(0, ly - 5, GW, LANE_H, l % 2 === 0 ? '#999' : '#8a8a8a');
    // Lane separator
    if (l < 3) {
      const sepY = ly + LANE_H - 3;
      // Dashed line
      for (let dx = 0; dx < GW; dx += 16) {
        const wx = (dx + cx * 1) % GW;
        if (Math.floor(wx / 8) % 2 === 0) {
          drawRect(dx, sepY, 8, 1, '#ccc');
        }
      }
    }
  }

  // Track border lines
  drawRect(0, LANES[0] - 8, GW, 3, '#fff');
  drawRect(0, LANES[3] + LANE_H + 5, GW, 3, '#fff');
  // Red/white curbs
  for (let dx = 0; dx < GW; dx += 12) {
    const wx = (dx + cx) % GW;
    const col = Math.floor(wx / 6) % 2 === 0 ? '#e22' : '#fff';
    drawRect(dx, LANES[0] - 11, 6, 3, col);
    drawRect(dx, LANES[3] + LANE_H + 8, 6, 3, col);
  }

  // Start/finish line
  const sfX = -cx % TRACK_LEN;
  if (sfX > -30 && sfX < GW + 30) {
    for (let l = 0; l < 4; l++) {
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 3; c++) {
          const col = (r + c) % 2 === 0 ? '#fff' : '#111';
          drawRect(sfX + c * 8, LANES[l] + r * 7, 8, 7, col);
        }
      }
    }
  }

  // Draw ramps
  for (const r of ramps) {
    const rx = r.x - cx;
    if (rx < -40 || rx > GW + 40) continue;
    const ry = LANES[r.lane];
    const rw = r.type === 'big' ? 30 : 20;
    const rh = r.type === 'big' ? 14 : 9;
    // Ramp body
    ctx.fillStyle = r.type === 'big' ? '#c44' : '#cc8833';
    ctx.beginPath();
    ctx.moveTo(rx, ry + 6);
    ctx.lineTo(rx + rw, ry + 6);
    ctx.lineTo(rx + rw, ry + 6 - rh);
    ctx.fill();
    // Stripes
    drawRect(rx + rw - 4, ry + 6 - rh, 3, rh, '#fff');
    drawRect(rx + rw - 10, ry + 6 - rh + 3, 3, rh - 3, '#fff');
  }

  // Draw obstacles
  for (const o of obstacles) {
    const ox = o.x - cx;
    if (ox < -30 || ox > GW + 30) continue;
    const oy = LANES[o.lane];
    if (o.type === 'mud') {
      drawRect(ox, oy + 2, 22, 6, '#654');
      drawRect(ox + 2, oy + 3, 18, 4, '#543');
      // Splatter
      drawRect(ox - 2, oy + 4, 3, 2, '#654');
      drawRect(ox + 20, oy + 3, 3, 2, '#654');
    } else if (o.type === 'barrier') {
      drawRect(ox, oy - 6, 4, 14, '#666');
      drawRect(ox + 16, oy - 6, 4, 14, '#666');
      drawRect(ox - 1, oy - 4, 22, 6, '#fff');
      drawRect(ox + 2, oy - 3, 6, 4, '#e22');
      drawRect(ox + 12, oy - 3, 6, 4, '#e22');
    } else { // tire
      drawRect(ox + 2, oy - 2, 14, 10, '#222');
      drawRect(ox + 4, oy, 10, 6, '#333');
      drawRect(ox + 6, oy + 1, 6, 4, '#444');
    }
  }

  // Draw boost pads
  for (const b of boosts) {
    if (b.used) continue;
    const bx = b.x - cx;
    if (bx < -30 || bx > GW + 30) continue;
    const by = LANES[b.lane];
    // Chevron arrows
    const flash = Math.sin(gameTime * 6) > 0 ? '#ff0' : '#f80';
    drawRect(bx, by + 1, 25, 6, '#333');
    for (let a = 0; a < 3; a++) {
      drawRect(bx + 3 + a * 8, by + 2, 4, 4, flash);
    }
  }

  // Draw rivals
  for (const r of rivals) {
    let rx = (r.x % TRACK_LEN) - cx;
    if (rx < -TRACK_LEN/2) rx += TRACK_LEN;
    if (rx > TRACK_LEN/2) rx -= TRACK_LEN;
    if (rx < -30 || rx > GW + 30) continue;
    const ry = LANES[Math.floor(r.lane + 0.5)];
    const targetY = LANES[Math.floor(r.lane + 0.5)];
    drawBikeSmall(rx, targetY + 3, r.color, r.wheelie);
  }

  // Draw player
  if (state !== ST.CRASH || Math.floor(pCrashT * 8) % 2 === 0) {
    if (pInvincible <= 0 || Math.floor(pInvincible * 8) % 2 === 0) {
      const drawX = px - cx;
      const drawY = py + 3 + pAirY;
      drawBike(drawX, drawY, '#d22', pWheelie * 0.3, pAirborne ? pAngle : 0, 1, state === ST.CRASH);

      // Air shadow
      if (pAirborne) {
        const shadowAlpha = Math.max(0.05, 0.2 + pAirY * 0.003);
        drawRect(drawX - 10, py + 5, 22, 3, `rgba(0,0,0,${shadowAlpha})`);
      }
    }
  }

  // Crash sparks
  if (state === ST.CRASH) {
    for (let i = 0; i < 8; i++) {
      const sx = px - cx + (Math.random()-0.5)*40;
      const sy = py + (Math.random()-0.5)*20;
      drawRect(sx, sy, 2, 2, ['#ff0','#f80','#f44','#fff'][i%4]);
    }
  }

  // Dirt below track
  drawRect(0, LANES[3] + LANE_H + 11, GW, GH - LANES[3] - LANE_H - 11, '#6a4a20');
  // Grass tufts
  for (let gx = 0; gx < GW; gx += 18) {
    const gwx = (gx + cx * 0.5) % GW;
    drawRect(gx, LANES[3] + LANE_H + 12, 3, 4, '#4a6a20');
  }

  renderHUD();

  // Countdown
  if (state === ST.COUNTDOWN) {
    const num = Math.ceil(countdownT);
    if (num > 0 && num <= 3) {
      drawRect(GW/2 - 30, GH/2 - 40, 60, 50, 'rgba(0,0,0,0.7)');
      drawText(num.toString(), GW/2, GH/2, '#ff0', 32);
    } else if (countdownT <= 0) {
      drawRect(GW/2 - 30, GH/2 - 30, 60, 30, 'rgba(0,0,0,0.7)');
      drawText('GO!', GW/2, GH/2, '#0f0', 24);
    }
  }

  // Finish overlay
  if (state === ST.FINISH) {
    drawRect(GW/2 - 110, 60, 220, 110, 'rgba(0,0,0,0.85)');
    drawRect(GW/2 - 108, 62, 216, 106, 'rgba(20,20,40,0.95)');
    drawText('RACE COMPLETE!', GW/2, 82, '#ff0', 14);
    const pos = getPosition();
    drawText(`POSITION: ${pos}/${rivals.length + 1}`, GW/2, 100, '#fff', 11);
    const t = fmtTime(raceTime);
    drawText(`TIME: ${t}`, GW/2, 115, '#0f0', 11);
    drawText(`SCORE: ${score}`, GW/2, 130, '#ee0', 11);
    if (raceTime <= bestTime) drawText('NEW BEST TIME!', GW/2, 145, '#f80', 10);
    drawText('ENTER - RACE AGAIN  |  ESC - MENU', GW/2, 162, '#888', 7);
  }
}

function drawBikeSmall(x, y, color, wheelie) {
  const s = 0.85;
  const w = wheelie || 0;
  const spin = (gameTime * 20) % (Math.PI * 2);
  ctx.save();
  ctx.translate(Math.floor(x), Math.floor(y));

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(1*s, 6*s, 12*s, 2*s, 0, 0, Math.PI*2); ctx.fill();

  // Back wheel
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(-5*s, 3*s + w*2*s, 4*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.arc(-5*s, 3*s + w*2*s, 2*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(-5*s, 3*s + w*2*s, 0.8*s, 0, Math.PI*2); ctx.fill();
  // Spokes
  ctx.strokeStyle = '#888'; ctx.lineWidth = 0.5*s;
  for (let a = 0; a < 3; a++) {
    const sa = spin + a * Math.PI/1.5;
    ctx.beginPath();
    ctx.moveTo(-5*s+Math.cos(sa)*1*s, 3*s+w*2*s+Math.sin(sa)*1*s);
    ctx.lineTo(-5*s+Math.cos(sa)*3.5*s, 3*s+w*2*s+Math.sin(sa)*3.5*s);
    ctx.stroke();
  }

  // Front wheel
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(8*s, 3*s, 4*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.arc(8*s, 3*s, 2*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(8*s, 3*s, 0.8*s, 0, Math.PI*2); ctx.fill();

  // Exhaust
  drawRect(-10*s, 1*s + w*2*s, 5*s, 1.5*s, '#777');
  drawRect(-11*s, 0.5*s + w*2*s, 1.5*s, 2.5*s, '#888');

  // Engine
  drawRect(-3*s, 0 + w*1.5*s, 7*s, 3*s, '#3a3a3a');
  drawRect(-2*s, 0.5*s + w*1.5*s, 5*s, 1*s, '#555');

  // Frame / body
  const bodyDark = darkenColor(color, 30);
  drawRect(-4*s, -4*s + w*s, 14*s, 5*s, color);
  drawRect(-3*s, -3*s + w*s, 12*s, 2*s, lightenColor(color, 30));
  drawRect(-4*s, -1*s + w*s, 14*s, 1.5*s, bodyDark);
  // Racing stripe
  drawRect(-2*s, -2.5*s + w*s, 10*s, 0.8*s, '#fff');

  // Front fork
  ctx.strokeStyle = '#666'; ctx.lineWidth = 1*s;
  ctx.beginPath(); ctx.moveTo(6*s, -3*s); ctx.lineTo(8*s, 0); ctx.stroke();

  // Headlight
  drawRect(9*s, -3*s, 1.5*s, 2*s, '#ff8');

  // Handlebars
  drawRect(6*s, -7*s, 2*s, 3*s, '#555');

  // Seat
  drawRect(-2*s, -6*s + w*s, 7*s, 2*s, '#222');

  // Rider torso
  drawRect(-1*s, -13*s + w*s, 6*s, 7*s, '#345');
  drawRect(0, -12*s + w*s, 4*s, 5*s, '#3a5a7a');
  // Jacket stripe
  drawRect(0, -10.5*s + w*s, 4*s, 0.7*s, '#fff');

  // Arms
  drawRect(-2*s, -11*s + w*s, 2*s, 3*s, '#345');
  drawRect(4*s, -11*s, 2*s, 3*s, '#345');
  // Gloves
  drawRect(-3*s, -9*s + w*s, 2*s, 2*s, '#222');
  drawRect(5*s, -8*s, 2*s, 2*s, '#222');

  // Helmet
  drawRect(0, -17*s + w*s, 5*s, 4*s, '#ddd');
  drawRect(0.5*s, -18*s + w*s, 4*s, 1.5*s, '#ccc');
  // Helmet stripe
  drawRect(0.5*s, -16.5*s + w*s, 4*s, 0.8*s, color);
  // Visor
  drawRect(3*s, -16*s + w*s, 2.5*s, 2.5*s, '#1a3a6a');
  drawRect(3.5*s, -15.5*s + w*s, 1.5*s, 1.5*s, '#2a5a9a');
  // Visor shine
  drawRect(3.5*s, -15.5*s + w*s, 1*s, 0.7*s, '#5a9aea');
  // Helmet shine
  drawRect(1*s, -17*s + w*s, 1.5*s, 0.7*s, '#fff');

  // Legs
  drawRect(-2*s, -4*s + w*s, 3*s, 3*s, '#1a1a3a');
  drawRect(3*s, -4*s, 3*s, 3*s, '#1a1a3a');
  // Boots
  drawRect(-2*s, -1*s + w*s, 3*s, 2*s, '#222');
  drawRect(3*s, -1*s, 3*s, 2*s, '#222');

  ctx.restore();
}

function renderHUD() {
  // Top bar
  drawRect(0, 0, GW, 22, 'rgba(0,0,0,0.8)');

  // Speed
  drawRect(5, 4, 70, 10, '#333');
  const spdPct = pSpeed / pMaxSpeed;
  drawRect(6, 5, 68 * Math.min(1, spdPct), 8, spdPct > 0.9 ? '#f44' : spdPct > 0.6 ? '#ff0' : '#4f4');
  if (turboActive) drawRect(6, 5, 68, 8, '#f80');
  drawText(`${Math.floor(pSpeed)} km/h`, 40, 13, '#fff', 7);

  // Heat gauge
  drawRect(80, 4, 50, 10, '#333');
  drawRect(81, 5, 48 * (heat/100), 8, overheated ? '#f00' : heat > 70 ? '#f80' : '#48f');
  drawText('HEAT', 105, 13, overheated ? '#f44' : '#aaa', 7);

  // Lap
  drawText(`LAP ${Math.min(lapCount+1, LAPS_TOTAL)}/${LAPS_TOTAL}`, GW/2, 13, '#fff', 9);

  // Timer
  drawText(fmtTime(raceTime), GW/2 + 70, 13, '#0f0', 9);

  // Position
  const pos = getPosition();
  drawText(`${pos}${['st','nd','rd'][pos-1]||'th'}`, GW - 50, 13, '#ff0', 10);

  // Score
  drawText(`${score}`, GW - 15, 13, '#ee0', 8);

  // Best
  if (bestTime < Infinity) {
    drawText(`BEST ${fmtTime(bestTime)}`, GW - 50, GH - 4, '#666', 7);
  }

  // Controls hint
  if (state === ST.RACE && raceTime < 4) {
    drawText('UP=Gas  DOWN=Brake  LEFT/RIGHT=Lane  SHIFT=Turbo  SPACE=Wheelie', GW/2, GH - 4, '#aaa', 7);
  }
}

function getPosition() {
  let pos = 1;
  const myProgress = lapCount * TRACK_LEN + px;
  for (const r of rivals) {
    const rProgress = r.lap * TRACK_LEN + r.x;
    if (rProgress > myProgress) pos++;
  }
  return pos;
}

function fmtTime(t) {
  const m = Math.floor(t/60);
  const s = Math.floor(t%60);
  const ms = Math.floor((t%1)*100);
  return `${m}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
}

function renderMenu() {
  // Animated background
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GH);
  skyGrad.addColorStop(0, '#1a0a3a');
  skyGrad.addColorStop(0.4, '#4a2a6a');
  skyGrad.addColorStop(0.6, '#e87040');
  skyGrad.addColorStop(1, '#6a4020');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 40; i++) {
    const sx = (i*137+50) % GW;
    const sy = (i*97+5) % (GH*0.3);
    if (Math.sin(gameTime*2+i) > 0.2) ctx.fillRect(sx, sy, 1, 1);
  }

  // Scrolling ground
  drawRect(0, GH * 0.6, GW, GH * 0.4, '#888');
  for (let dx = 0; dx < GW; dx += 12) {
    const wx = (dx + gameTime * 80) % GW;
    if (Math.floor(wx / 6) % 2 === 0) drawRect(dx, GH * 0.6, 6, 2, '#e22');
  }
  // Lane lines
  for (let dx = 0; dx < GW; dx += 24) {
    const wx = (dx + gameTime * 200) % GW;
    drawRect(wx % GW, GH * 0.72, 12, 2, '#ccc');
    drawRect(wx % GW, GH * 0.82, 12, 2, '#ccc');
  }

  // Title
  drawRect(GW/2 - 130, 40, 260, 55, 'rgba(0,0,0,0.8)');
  drawRect(GW/2 - 128, 42, 256, 51, 'rgba(20,10,40,0.9)');
  drawText('PIXEL MOTO', GW/2, 68, '#f80', 22);
  drawText('EXCITE RACER', GW/2, 84, '#fa4', 11);

  // Animated bike
  const bikeX = GW/2 + Math.sin(gameTime * 2) * 60;
  const bikeW = Math.sin(gameTime * 2) > 0.7 ? 0.3 : 0;
  drawBike(bikeX, GH * 0.75, '#d22', bikeW, 0, 1.2, false);
  // Exhaust trail
  for (let i = 1; i < 6; i++) {
    const alpha = 0.3 - i * 0.05;
    drawRect(bikeX - 18 - i*8, GH*0.75 - 1 + Math.sin(gameTime*4+i)*2, 4, 3, `rgba(100,100,100,${alpha})`);
  }

  // Menu
  drawRect(GW/2 - 100, 110, 200, 22, 'rgba(0,0,0,0.7)');
  if (Math.sin(gameTime * 3) > 0) drawText('PRESS ENTER TO RACE', GW/2, 125, '#ff0', 10);

  drawRect(GW/2 - 110, 145, 220, 75, 'rgba(0,0,0,0.7)');
  drawText('CONTROLS', GW/2, 160, '#fff', 10);
  ctx.textAlign = 'left'; ctx.font = 'bold 8px monospace'; ctx.fillStyle = '#aaa';
  ctx.fillText('UP / W        Accelerate', GW/2 - 90, 175);
  ctx.fillText('DOWN / S      Brake', GW/2 - 90, 187);
  ctx.fillText('LEFT / RIGHT  Switch lane', GW/2 - 90, 199);
  ctx.fillText('SHIFT / Z     Turbo (watch heat!)', GW/2 - 90, 211);

  if (bestTime < Infinity) {
    drawText(`BEST: ${fmtTime(bestTime)}`, GW/2, 235, '#0f0', 9);
  }
}

// ===== MAIN LOOP =====
let lastTime = 0;
function loop(time) {
  requestAnimationFrame(loop);
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  if (keys['Enter']) {
    keys['Enter'] = false;
    if (state === ST.MENU || state === ST.FINISH) startRace();
  }
  if (keys['Escape']) {
    keys['Escape'] = false;
    if (state !== ST.MENU) { state = ST.MENU; stopEngine(); }
  }

  update(dt);
  render();
}

// Swipe gesture support
let motoSwipeX = 0, motoSwipeY = 0;
canvas.addEventListener('touchstart', (e) => {
    motoSwipeX = e.touches[0].clientX;
    motoSwipeY = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - motoSwipeX;
    const dy = e.changedTouches[0].clientY - motoSwipeY;
    if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
        if (Math.abs(dx) > Math.abs(dy)) {
            motoKey(dx > 0 ? 'd' : 'a', 1);
            setTimeout(() => motoKey(dx > 0 ? 'd' : 'a', 0), 100);
        } else {
            motoKey(dy > 0 ? 's' : 'w', 1);
            setTimeout(() => motoKey(dy > 0 ? 's' : 'w', 0), 100);
        }
    }
}, { passive: false });

requestAnimationFrame(loop);
</script>
