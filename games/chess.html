<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <title>Chess - Silicon Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3d5a80 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #f0f0f0;
        }

        .game-container {
            position: relative;
            width: 960px;
            height: 640px;
            background: #34495e;
            border: 4px solid #2c3e50;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            overflow: hidden;
        }

        .left-panel {
            width: 200px;
            background: linear-gradient(90deg, #2c3e50, #34495e);
            padding: 20px;
            border-right: 2px solid #1a252f;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: auto;
        }

        .board-container {
            width: 560px;
            height: 560px;
            position: relative;
            flex-shrink: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .right-panel {
            width: 200px;
            background: linear-gradient(90deg, #34495e, #2c3e50);
            padding: 20px;
            border-left: 2px solid #1a252f;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 14px;
            font-weight: bold;
            color: #f39c12;
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid #f39c12;
            padding-bottom: 5px;
        }

        .status {
            font-size: 12px;
            line-height: 1.6;
            color: #ecf0f1;
            margin-bottom: 15px;
        }

        .status-label {
            color: #3498db;
            font-weight: bold;
        }

        .button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .button:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.disabled {
            background: #7f8c8d;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .menu-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-size: 24px;
            text-align: center;
        }

        .menu-screen h1 {
            font-size: 48px;
            color: #f39c12;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .menu-screen p {
            font-size: 16px;
            color: #ecf0f1;
            margin-bottom: 40px;
        }

        .game-over-screen {
            display: none;
        }

        .game-over-screen h2 {
            font-size: 48px;
            color: #f39c12;
            margin-bottom: 20px;
        }

        .game-over-screen p {
            font-size: 18px;
            color: #ecf0f1;
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .high-score-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 8px;
            border: 3px solid #f39c12;
            color: #ecf0f1;
            text-align: center;
            z-index: 2000;
            min-width: 300px;
            display: none;
        }

        .high-score-overlay h3 {
            color: #f39c12;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .high-score-overlay .score-list {
            text-align: left;
            margin: 20px 0;
            font-family: monospace;
            font-size: 14px;
        }

        .high-score-overlay .score-item {
            margin: 8px 0;
            padding: 5px;
            background: #222;
            border-radius: 3px;
        }

        .high-score-overlay button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 30px;
            margin-top: 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .high-score-overlay button:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Left Panel -->
        <div class="left-panel">
            <div>
                <div class="panel-title">Game Info</div>
                <div class="status">
                    <div><span class="status-label">Turn:</span> <span id="turn-display">White</span></div>
                    <div><span class="status-label">Status:</span> <span id="status-display">Playing</span></div>
                    <div id="check-indicator" style="color: #e74c3c; display: none; margin-top: 5px;">⚠ CHECK!</div>
                </div>
            </div>
            <div>
                <button class="button" id="new-game-btn">New Game</button>
                <button class="button" id="undo-btn">Undo Move</button>
                <button class="button" id="high-score-btn">High Scores</button>
            </div>
        </div>

        <!-- Board Container -->
        <div class="board-container">
            <canvas id="chess-canvas" width="560" height="560"></canvas>
            <div class="menu-screen" id="menu-screen">
                <h1>♔ CHESS ♚</h1>
                <p>Click to Start</p>
                <p style="font-size: 12px; margin-top: 20px;">White vs Computer (AI)</p>
            </div>
            <div class="game-over-screen" id="game-over-screen">
                <h2 id="game-over-title">Game Over</h2>
                <p id="game-over-message"></p>
                <button class="button" id="play-again-btn" style="margin-top: 20px;">Play Again</button>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="panel-title">Move History</div>
            <div id="move-history" style="font-size: 11px; line-height: 1.8; color: #bdc3c7;">
                <p style="color: #95a5a6;">No moves yet</p>
            </div>
        </div>
    </div>

    <div class="high-score-overlay" id="high-score-overlay">
        <h3>High Scores</h3>
        <div class="score-list" id="score-list">
            <div class="score-item">No scores yet</div>
        </div>
        <button id="close-high-scores-btn">Close</button>
    </div>

    <script>
        const BOARD_SIZE = 8;
        const SQUARE_SIZE = 70;
        const CANVAS_WIDTH = 560;
        const CANVAS_HEIGHT = 560;

        const PIECE_VALUES = {
            'P': 100, 'N': 320, 'B': 330, 'R': 500, 'Q': 900, 'K': 20000,
            'p': 100, 'n': 320, 'b': 330, 'r': 500, 'q': 900, 'k': 20000
        };

        const UNICODE_PIECES = {
            'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙',
            'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟'
        };

        let board = [];
        let gameState = 'menu';
        let selectedSquare = null;
        let validMoves = [];
        let turn = 'white';
        let moveHistory = [];
        let gameHistory = [];
        let audioContext = null;
        let canUndoMove = false;
        let inProgress = false;

        const canvas = document.getElementById('chess-canvas');
        const ctx = canvas.getContext('2d');

        function initBoard() {
            board = [
                ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
                ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
                [null, null, null, null, null, null, null, null],
                [null, null, null, null, null, null, null, null],
                [null, null, null, null, null, null, null, null],
                [null, null, null, null, null, null, null, null],
                ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
                ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
            ];
            turn = 'white';
            moveHistory = [];
            gameHistory = [];
            selectedSquare = null;
            validMoves = [];
            canUndoMove = false;
            inProgress = false;
        }

        function startGame() {
            initBoard();
            gameState = 'playing';
            updateDisplay();
            draw();
        }

        function newGame() {
            if (gameState === 'playing' || gameState === 'gameOver') {
                startGame();
                document.getElementById('menu-screen').classList.add('hidden');
                document.getElementById('game-over-screen').classList.add('hidden');
            }
        }

        function draw() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            drawBoard();
            drawPieces();
            if (selectedSquare) {
                highlightSquare(selectedSquare.row, selectedSquare.col, '#f39c12');
                validMoves.forEach(move => {
                    highlightSquare(move.row, move.col, '#3498db');
                });
            }
        }

        function drawBoard() {
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const x = col * SQUARE_SIZE;
                    const y = row * SQUARE_SIZE;
                    const isLight = (row + col) % 2 === 0;

                    if (isLight) {
                        ctx.fillStyle = '#d4a574';
                    } else {
                        ctx.fillStyle = '#8b6f47';
                    }
                    ctx.fillRect(x, y, SQUARE_SIZE, SQUARE_SIZE);

                    ctx.strokeStyle = isLight ? '#c99060' : '#6b4f2f';
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(x, y, SQUARE_SIZE, SQUARE_SIZE);

                    ctx.fillStyle = isLight ? '#6b4f2f' : '#c99060';
                    ctx.font = '11px Arial';
                    ctx.textAlign = 'right';
                    ctx.textBaseline = 'top';

                    if (col === 7) {
                        ctx.fillText(8 - row, x - 4, y + 2);
                    }
                    if (row === 7) {
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.fillText(String.fromCharCode(97 + col), x + SQUARE_SIZE / 2, y + SQUARE_SIZE - 2);
                    }
                }
            }
        }

        function drawPieces() {
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const piece = board[row][col];
                    if (piece) {
                        const x = col * SQUARE_SIZE + SQUARE_SIZE / 2;
                        const y = row * SQUARE_SIZE + SQUARE_SIZE / 2;
                        ctx.fillStyle = piece === piece.toUpperCase() ? '#fff' : '#000';
                        ctx.fillText(UNICODE_PIECES[piece], x, y);
                    }
                }
            }
        }

        function highlightSquare(row, col, color) {
            const x = col * SQUARE_SIZE;
            const y = row * SQUARE_SIZE;
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.3;
            ctx.fillRect(x, y, SQUARE_SIZE, SQUARE_SIZE);
            ctx.globalAlpha = 1;
        }

        function getValidMoves(row, col) {
            const piece = board[row][col];
            if (!piece) return [];

            const isWhite = piece === piece.toUpperCase();
            if ((turn === 'white' && !isWhite) || (turn === 'black' && isWhite)) return [];

            const moves = [];
            const pieceLower = piece.toLowerCase();

            if (pieceLower === 'p') moves.push(...getPawnMoves(row, col, isWhite));
            else if (pieceLower === 'n') moves.push(...getKnightMoves(row, col, isWhite));
            else if (pieceLower === 'b') moves.push(...getBishopMoves(row, col, isWhite));
            else if (pieceLower === 'r') moves.push(...getRookMoves(row, col, isWhite));
            else if (pieceLower === 'q') moves.push(...getQueenMoves(row, col, isWhite));
            else if (pieceLower === 'k') moves.push(...getKingMoves(row, col, isWhite));

            return moves.filter(move => {
                const oldPiece = board[move.row][move.col];
                board[move.row][move.col] = piece;
                board[row][col] = null;
                const inCheck = isKingInCheck(isWhite);
                board[row][col] = piece;
                board[move.row][move.col] = oldPiece;
                return !inCheck;
            });
        }

        function getPawnMoves(row, col, isWhite) {
            const moves = [];
            const direction = isWhite ? -1 : 1;
            const startRow = isWhite ? 6 : 1;

            const nextRow = row + direction;
            if (nextRow >= 0 && nextRow < BOARD_SIZE && !board[nextRow][col]) {
                moves.push({ row: nextRow, col });
                if (row === startRow && !board[nextRow + direction][col]) {
                    moves.push({ row: nextRow + direction, col });
                }
            }

            for (let dc of [-1, 1]) {
                const nr = row + direction;
                const nc = col + dc;
                if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE) {
                    const target = board[nr][nc];
                    if (target && ((isWhite && target === target.toLowerCase()) || (!isWhite && target === target.toUpperCase()))) {
                        moves.push({ row: nr, col: nc });
                    }
                }
            }

            return moves;
        }

        function getKnightMoves(row, col, isWhite) {
            const moves = [];
            const offsets = [
                [-2, -1], [-2, 1], [-1, -2], [-1, 2],
                [1, -2], [1, 2], [2, -1], [2, 1]
            ];

            for (let [dr, dc] of offsets) {
                const nr = row + dr;
                const nc = col + dc;
                if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE) {
                    const target = board[nr][nc];
                    if (!target || (isWhite && target === target.toLowerCase()) || (!isWhite && target === target.toUpperCase())) {
                        moves.push({ row: nr, col: nc });
                    }
                }
            }
            return moves;
        }

        function getBishopMoves(row, col, isWhite) {
            const moves = [];
            const directions = [[-1, -1], [-1, 1], [1, -1], [1, 1]];

            for (let [dr, dc] of directions) {
                for (let i = 1; i < BOARD_SIZE; i++) {
                    const nr = row + dr * i;
                    const nc = col + dc * i;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;

                    const target = board[nr][nc];
                    if (!target) {
                        moves.push({ row: nr, col: nc });
                    } else {
                        if ((isWhite && target === target.toLowerCase()) || (!isWhite && target === target.toUpperCase())) {
                            moves.push({ row: nr, col: nc });
                        }
                        break;
                    }
                }
            }
            return moves;
        }

        function getRookMoves(row, col, isWhite) {
            const moves = [];
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];

            for (let [dr, dc] of directions) {
                for (let i = 1; i < BOARD_SIZE; i++) {
                    const nr = row + dr * i;
                    const nc = col + dc * i;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;

                    const target = board[nr][nc];
                    if (!target) {
                        moves.push({ row: nr, col: nc });
                    } else {
                        if ((isWhite && target === target.toLowerCase()) || (!isWhite && target === target.toUpperCase())) {
                            moves.push({ row: nr, col: nc });
                        }
                        break;
                    }
                }
            }
            return moves;
        }

        function getQueenMoves(row, col, isWhite) {
            return [...getBishopMoves(row, col, isWhite), ...getRookMoves(row, col, isWhite)];
        }

        function getKingMoves(row, col, isWhite) {
            const moves = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = row + dr;
                    const nc = col + dc;
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE) {
                        const target = board[nr][nc];
                        if (!target || (isWhite && target === target.toLowerCase()) || (!isWhite && target === target.toUpperCase())) {
                            moves.push({ row: nr, col: nc });
                        }
                    }
                }
            }

            if ((isWhite && row === 7 && col === 4) || (!isWhite && row === 0 && col === 4)) {
                if (board[row][7] && board[row][7] === (isWhite ? 'R' : 'r') && !board[row][5] && !board[row][6]) {
                    moves.push({ row, col: 6 });
                }
                if (board[row][0] && board[row][0] === (isWhite ? 'R' : 'r') && !board[row][1] && !board[row][2] && !board[row][3]) {
                    moves.push({ row, col: 2 });
                }
            }

            return moves;
        }

        function isKingInCheck(isWhite) {
            let kingPos = null;
            const kingPiece = isWhite ? 'K' : 'k';

            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === kingPiece) {
                        kingPos = { row, col };
                        break;
                    }
                }
                if (kingPos) break;
            }

            if (!kingPos) return false;

            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const piece = board[row][col];
                    if (piece && ((isWhite && piece === piece.toLowerCase()) || (!isWhite && piece === piece.toUpperCase()))) {
                        const moves = [];
                        const pieceLower = piece.toLowerCase();

                        if (pieceLower === 'p') moves.push(...getPawnMoves(row, col, !isWhite));
                        else if (pieceLower === 'n') moves.push(...getKnightMoves(row, col, !isWhite));
                        else if (pieceLower === 'b') moves.push(...getBishopMoves(row, col, !isWhite));
                        else if (pieceLower === 'r') moves.push(...getRookMoves(row, col, !isWhite));
                        else if (pieceLower === 'q') moves.push(...getQueenMoves(row, col, !isWhite));
                        else if (pieceLower === 'k') moves.push(...getKingMoves(row, col, !isWhite));

                        if (moves.some(m => m.row === kingPos.row && m.col === kingPos.col)) return true;
                    }
                }
            }

            return false;
        }

        function makeMove(fromRow, fromCol, toRow, toCol) {
            const piece = board[fromRow][fromCol];
            const captured = board[toRow][toCol];

            if (piece.toLowerCase() === 'k' && Math.abs(toCol - fromCol) === 2) {
                board[toRow][toCol] = piece;
                board[fromRow][fromCol] = null;

                if (toCol > fromCol) {
                    board[toRow][5] = board[toRow][7];
                    board[toRow][7] = null;
                } else {
                    board[toRow][3] = board[toRow][0];
                    board[toRow][0] = null;
                }
            } else {
                board[toRow][toCol] = piece;
                board[fromRow][fromCol] = null;

                if (piece === 'P' && toRow === 0) {
                    board[toRow][toCol] = 'Q';
                } else if (piece === 'p' && toRow === 7) {
                    board[toRow][toCol] = 'q';
                }
            }

            moveHistory.push({
                from: { row: fromRow, col: fromCol },
                to: { row: toRow, col: toCol },
                piece,
                captured
            });

            gameHistory.push(JSON.stringify(board.map(r => [...r])));
            canUndoMove = true;
            playMoveSound();
            turn = turn === 'white' ? 'black' : 'white';
            updateDisplay();
        }

        function undoMove() {
            if (moveHistory.length === 0) return;

            const lastMove = moveHistory.pop();
            gameHistory.pop();

            board[lastMove.from.row][lastMove.from.col] = lastMove.piece;
            board[lastMove.to.row][lastMove.to.col] = lastMove.captured;

            if (lastMove.piece.toLowerCase() === 'k' && Math.abs(lastMove.to.col - lastMove.from.col) === 2) {
                if (lastMove.to.col > lastMove.from.col) {
                    board[lastMove.from.row][7] = board[lastMove.from.row][5];
                    board[lastMove.from.row][5] = null;
                } else {
                    board[lastMove.from.row][0] = board[lastMove.from.row][3];
                    board[lastMove.from.row][3] = null;
                }
            }

            turn = turn === 'white' ? 'black' : 'white';
            selectedSquare = null;
            validMoves = [];
            inProgress = false;
            updateDisplay();
            draw();
        }

        function playMoveSound() {
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    return;
                }
            }

            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.value = 600;
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        }

        function updateDisplay() {
            document.getElementById('turn-display').textContent = turn === 'white' ? 'White' : 'Black';

            const inCheck = isKingInCheck(turn === 'white');
            const checkIndicator = document.getElementById('check-indicator');

            if (inCheck) {
                checkIndicator.style.display = 'block';
            } else {
                checkIndicator.style.display = 'none';
            }

            let hasValidMove = false;
            for (let row = 0; row < BOARD_SIZE && !hasValidMove; row++) {
                for (let col = 0; col < BOARD_SIZE && !hasValidMove; col++) {
                    if (board[row][col]) {
                        const moves = getValidMoves(row, col);
                        if (moves.length > 0) hasValidMove = true;
                    }
                }
            }

            if (!hasValidMove) {
                if (inCheck) {
                    endGame(turn === 'white' ? 'Black' : 'White', 'Checkmate');
                } else {
                    endGame('Draw', 'Stalemate');
                }
            }

            const historyDiv = document.getElementById('move-history');
            if (moveHistory.length === 0) {
                historyDiv.innerHTML = '<p style="color: #95a5a6;">No moves yet</p>';
            } else {
                let html = '';
                for (let i = 0; i < moveHistory.length; i += 2) {
                    const moveNum = Math.floor(i / 2) + 1;
                    const cols = 'abcdefgh';
                    const whiteMove = moveHistory[i];
                    const fromCol = cols[whiteMove.from.col];
                    const fromRow = 8 - whiteMove.from.row;
                    const toCol = cols[whiteMove.to.col];
                    const toRow = 8 - whiteMove.to.row;
                    html += `<div>${moveNum}. ${fromCol}${fromRow}-${toCol}${toRow}`;

                    if (i + 1 < moveHistory.length) {
                        const blackMove = moveHistory[i + 1];
                        const bFromCol = cols[blackMove.from.col];
                        const bFromRow = 8 - blackMove.from.row;
                        const bToCol = cols[blackMove.to.col];
                        const bToRow = 8 - blackMove.to.row;
                        html += ` ${bFromCol}${bFromRow}-${bToCol}${bToRow}`;
                    }
                    html += '</div>';
                }
                historyDiv.innerHTML = html;
            }

            draw();
        }

        function endGame(winner, reason) {
            gameState = 'gameOver';
            const message = winner === 'Draw' ? `${reason}` : `${winner} Wins!\n${reason}`;
            document.getElementById('game-over-message').textContent = message;
            document.getElementById('game-over-title').textContent = winner === 'Draw' ? 'Draw' : `${winner} Wins!`;
            document.getElementById('game-over-screen').classList.remove('hidden');

            const score = moveHistory.length;
            const scores = JSON.parse(localStorage.getItem('sg_hs_chess') || '[]');
            scores.push({ date: new Date().toLocaleString(), moves: score, result: `${winner} wins` });
            scores.sort((a, b) => b.moves - a.moves);
            localStorage.setItem('sg_hs_chess', JSON.stringify(scores.slice(0, 10)));
        }

        function showHighScores() {
            const scores = JSON.parse(localStorage.getItem('sg_hs_chess') || '[]');
            const scoreList = document.getElementById('score-list');

            if (scores.length === 0) {
                scoreList.innerHTML = '<div class="score-item">No games played yet</div>';
            } else {
                scoreList.innerHTML = scores.map((s, i) =>
                    `<div class="score-item">${i + 1}. ${s.moves} moves - ${s.result}</div>`
                ).join('');
            }

            document.getElementById('high-score-overlay').style.display = 'flex';
        }

        function closeHighScores() {
            document.getElementById('high-score-overlay').style.display = 'none';
        }

        function minimax(depth, isMaximizing, alpha, beta) {
            if (depth === 0) return evaluateBoard();

            if (isMaximizing) {
                let maxEval = -Infinity;
                for (let row = 0; row < BOARD_SIZE; row++) {
                    for (let col = 0; col < BOARD_SIZE; col++) {
                        const piece = board[row][col];
                        if (piece && piece === piece.toUpperCase()) {
                            const moves = getValidMoves(row, col);
                            for (let move of moves) {
                                const captured = board[move.row][move.col];
                                board[move.row][move.col] = piece;
                                board[row][col] = null;

                                const eval_ = minimax(depth - 1, false, alpha, beta);
                                board[row][col] = piece;
                                board[move.row][move.col] = captured;

                                maxEval = Math.max(maxEval, eval_);
                                alpha = Math.max(alpha, eval_);
                                if (beta <= alpha) return maxEval;
                            }
                        }
                    }
                }
                return maxEval === -Infinity ? evaluateBoard() : maxEval;
            } else {
                let minEval = Infinity;
                for (let row = 0; row < BOARD_SIZE; row++) {
                    for (let col = 0; col < BOARD_SIZE; col++) {
                        const piece = board[row][col];
                        if (piece && piece === piece.toLowerCase()) {
                            const moves = getValidMoves(row, col);
                            for (let move of moves) {
                                const captured = board[move.row][move.col];
                                board[move.row][move.col] = piece;
                                board[row][col] = null;

                                const eval_ = minimax(depth - 1, true, alpha, beta);
                                board[row][col] = piece;
                                board[move.row][move.col] = captured;

                                minEval = Math.min(minEval, eval_);
                                beta = Math.min(beta, eval_);
                                if (beta <= alpha) return minEval;
                            }
                        }
                    }
                }
                return minEval === Infinity ? evaluateBoard() : minEval;
            }
        }

        function evaluateBoard() {
            let score = 0;
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const piece = board[row][col];
                    if (piece) {
                        const value = PIECE_VALUES[piece];
                        score += piece === piece.toUpperCase() ? value : -value;
                    }
                }
            }
            return score;
        }

        function getAIMove() {
            let bestMove = null;
            let bestEval = -Infinity;

            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const piece = board[row][col];
                    if (piece && piece === piece.toLowerCase()) {
                        const moves = getValidMoves(row, col);
                        for (let move of moves) {
                            const captured = board[move.row][move.col];
                            board[move.row][move.col] = piece;
                            board[row][col] = null;

                            const eval_ = minimax(3, true, -Infinity, Infinity);
                            board[row][col] = piece;
                            board[move.row][move.col] = captured;

                            if (eval_ > bestEval) {
                                bestEval = eval_;
                                bestMove = { from: { row, col }, to: move };
                            }
                        }
                    }
                }
            }

            return bestMove;
        }

        canvas.addEventListener('click', (e) => {
            if (gameState === 'menu') {
                startGame();
                document.getElementById('menu-screen').classList.add('hidden');
                return;
            }

            if (gameState === 'gameOver' || turn === 'black' || inProgress) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const col = Math.floor(x / SQUARE_SIZE);
            const row = Math.floor(y / SQUARE_SIZE);

            if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) {
                selectedSquare = null;
                validMoves = [];
                draw();
                return;
            }

            if (validMoves.some(m => m.row === row && m.col === col)) {
                makeMove(selectedSquare.row, selectedSquare.col, row, col);
                selectedSquare = null;
                validMoves = [];

                if (gameState === 'playing') {
                    inProgress = true;
                    setTimeout(() => {
                        const aiMove = getAIMove();
                        if (aiMove) {
                            makeMove(aiMove.from.row, aiMove.from.col, aiMove.to.row, aiMove.to.col);
                        }
                        inProgress = false;
                    }, 500);
                }
                return;
            }

            const piece = board[row][col];
            if (piece && ((turn === 'white' && piece === piece.toUpperCase()) || (turn === 'black' && piece === piece.toLowerCase()))) {
                selectedSquare = { row, col };
                validMoves = getValidMoves(row, col);
                draw();
            }
        });

        document.getElementById('new-game-btn').addEventListener('click', newGame);
        document.getElementById('undo-btn').addEventListener('click', undoMove);
        document.getElementById('high-score-btn').addEventListener('click', showHighScores);
        document.getElementById('close-high-scores-btn').addEventListener('click', closeHighScores);
        document.getElementById('play-again-btn').addEventListener('click', newGame);

        initBoard();
        draw();
    </script>
</body>
</html>
