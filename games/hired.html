<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIRED — Idle Tycoon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e; color: #e0e0e0; font-family: 'Press Start 2P', monospace;
    overflow: hidden; height: 100vh; width: 100vw;
    image-rendering: pixelated;
  }

  #game-container {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh; width: 100vw;
  }

  /* === TOP HUD === */
  #hud {
    background: #0f0f23; border-bottom: 3px solid #333;
    padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
    z-index: 10;
  }
  #hud .title { font-size: 16px; color: #ffd700; text-shadow: 2px 2px #aa8800; letter-spacing: 3px; }
  #hud .money { font-size: 14px; color: #4f4; text-shadow: 1px 1px #080; }
  #hud .info { font-size: 9px; color: #8af; display: flex; gap: 20px; }
  #hud .info span { display: flex; flex-direction: column; gap: 2px; }
  #hud .info .label { font-size: 7px; color: #68a; }

  /* === MAIN AREA === */
  #main {
    display: grid; grid-template-columns: 1fr 320px;
    overflow: hidden;
  }

  /* === BUILDING CANVAS === */
  #building-area {
    position: relative; overflow: hidden;
    background: linear-gradient(180deg, #0a0a1e 0%, #1a1a3e 40%, #2a2a3e 70%, #3a3a2e 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    cursor: pointer;
    user-select: none; -webkit-user-select: none;
  }
  #building-area:active { filter: brightness(1.1); }

  #click-area {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 5; cursor: pointer;
  }

  canvas#building-canvas {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    z-index: 1;
  }

  /* Click feedback */
  .click-pop {
    position: absolute; z-index: 20; pointer-events: none;
    font-family: 'Press Start 2P', monospace; font-size: 14px;
    color: #4f4; text-shadow: 1px 1px #080;
    animation: popUp 0.8s ease-out forwards;
  }
  @keyframes popUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }

  /* Ground */
  #ground {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
    background: #3a5a2a; border-top: 4px solid #4a7a3a; z-index: 2;
  }

  /* Stars */
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.3; } 100% { opacity: 1; }
  }

  /* === SIDE PANEL === */
  #side-panel {
    background: #12122a; border-left: 3px solid #333;
    overflow-y: auto; padding: 0;
    scrollbar-width: thin; scrollbar-color: #333 #12122a;
  }
  #side-panel::-webkit-scrollbar { width: 6px; }
  #side-panel::-webkit-scrollbar-track { background: #12122a; }
  #side-panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

  .panel-section {
    border-bottom: 2px solid #222;
  }
  .panel-header {
    font-size: 9px; letter-spacing: 2px; color: #ffd700;
    padding: 12px 14px 8px; text-transform: uppercase;
    background: rgba(255,215,0,0.05);
  }

  .hire-btn, .upgrade-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 10px 14px; border: none;
    background: transparent; color: #e0e0e0;
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    cursor: pointer; text-align: left; border-bottom: 1px solid #1a1a30;
    transition: background 0.15s;
  }
  .hire-btn:hover, .upgrade-btn:hover { background: rgba(255,255,255,0.05); }
  .hire-btn:disabled, .upgrade-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .hire-btn:disabled:hover, .upgrade-btn:disabled:hover { background: transparent; }

  .btn-icon {
    width: 36px; height: 36px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.1);
  }
  .btn-info { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .btn-name { font-size: 8px; color: #fff; }
  .btn-detail { font-size: 7px; color: #8af; }
  .btn-cost { font-size: 8px; color: #4f4; white-space: nowrap; }
  .btn-count { font-size: 7px; color: #fa0; }

  /* === BOTTOM BAR === */
  #bottom-bar {
    background: #0f0f23; border-top: 3px solid #333;
    padding: 8px 20px; display: flex; justify-content: space-between; align-items: center;
    font-size: 7px; color: #556;
  }
  #milestone { color: #fa0; font-size: 8px; }

  /* === NOTIFICATION === */
  #notification {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.9); border: 3px solid #ffd700;
    padding: 30px 40px; text-align: center; z-index: 100;
    display: none; border-radius: 4px;
  }
  #notification h2 { font-size: 14px; color: #ffd700; margin-bottom: 10px; }
  #notification p { font-size: 9px; color: #aaa; margin-bottom: 16px; line-height: 1.8; }
  #notification button {
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    background: #ffd700; color: #000; border: none; padding: 10px 24px;
    cursor: pointer; border-radius: 2px;
  }
  #notification button:hover { background: #ffea00; }

  /* Employees walking area */
  .employee-sprite {
    position: absolute; z-index: 3; bottom: 12px;
    width: 16px; height: 24px;
    image-rendering: pixelated;
  }
</style>
</head>
<body>

<div id="game-container">
  <!-- HUD -->
  <div id="hud">
    <div class="title">HIRED</div>
    <div class="money" id="money-display">$0</div>
    <div class="info">
      <span><span class="label">Per Click</span><span id="per-click">$1</span></span>
      <span><span class="label">Per Sec</span><span id="per-sec">$0</span></span>
      <span><span class="label">Multiplier</span><span id="multiplier-display" style="color:#fa4">x1</span></span>
      <span><span class="label">Employees</span><span id="emp-count">0</span></span>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- Building View -->
    <div id="building-area">
      <div id="click-area"></div>
      <canvas id="building-canvas" width="400" height="500"></canvas>
      <div id="ground"></div>
    </div>

    <!-- Side Panel -->
    <div id="side-panel">
      <!-- Employees Section -->
      <div class="panel-section" id="hire-section">
        <div class="panel-header">Hire Employees</div>
        <div id="hire-list"></div>
      </div>
      <!-- Upgrades Section -->
      <div class="panel-section" id="upgrade-section">
        <div class="panel-header">Upgrade Building</div>
        <div id="upgrade-list"></div>
      </div>
      <!-- Click Upgrades -->
      <div class="panel-section" id="click-upgrade-section">
        <div class="panel-header">Click Power</div>
        <div id="click-upgrade-list"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div id="bottom-bar">
    <span id="milestone">Welcome to HIRED!</span>
    <span id="playtime">0:00</span>
  </div>
</div>

<!-- Notification Popup -->
<div id="notification">
  <h2 id="notif-title"></h2>
  <p id="notif-body"></p>
  <button onclick="closeNotification()">OK</button>
</div>

<script>
// ==================== GAME DATA ====================

// unlockTier = minimum building tier index required to hire this employee
const EMPLOYEE_TYPES = [
  { id: 'intern',    name: 'Intern',    icon: '👤', color: '#4a6',    baseCost: 10,          costMult: 1.15, baseIncome: 1,      desc: '+$1/s each',    unlockTier: 0 },
  { id: 'worker',    name: 'Worker',    icon: '👷', color: '#48f',    baseCost: 100,         costMult: 1.15, baseIncome: 5,      desc: '+$5/s each',    unlockTier: 1 },
  { id: 'analyst',   name: 'Analyst',   icon: '📊', color: '#a4f',    baseCost: 1100,        costMult: 1.15, baseIncome: 25,     desc: '+$25/s each',   unlockTier: 2 },
  { id: 'designer',  name: 'Designer',  icon: '🎨', color: '#f4a',    baseCost: 12000,       costMult: 1.15, baseIncome: 120,    desc: '+$120/s each',  unlockTier: 2 },
  { id: 'engineer',  name: 'Engineer',  icon: '⚙️', color: '#fa4',    baseCost: 130000,      costMult: 1.15, baseIncome: 600,    desc: '+$600/s each',  unlockTier: 3 },
  { id: 'manager',   name: 'Manager',   icon: '💼', color: '#4af',    baseCost: 1400000,     costMult: 1.15, baseIncome: 3000,   desc: '+$3K/s each',   unlockTier: 4 },
  { id: 'director',  name: 'Director',  icon: '🏛️', color: '#ff4',    baseCost: 20000000,    costMult: 1.15, baseIncome: 15000,  desc: '+$15K/s each',  unlockTier: 5 },
  { id: 'vp',        name: 'VP',        icon: '⭐', color: '#f84',    baseCost: 330000000,   costMult: 1.15, baseIncome: 80000,  desc: '+$80K/s each',  unlockTier: 6 },
  { id: 'ceo',       name: 'CEO',       icon: '👑', color: '#ffd700', baseCost: 5000000000,  costMult: 1.15, baseIncome: 400000, desc: '+$400K/s each', unlockTier: 7 },
];

// incomeMultiplier: multiplies ALL passive income (stacks multiplicatively)
const BUILDING_TIERS = [
  { name: 'Garage',          cost: 0,             floors: 1,  color: '#665544', roofColor: '#887766', windowColor: '#445566', incomeMultiplier: 1.0,  bonus: 'Starting out' },
  { name: 'Small Office',    cost: 500,           floors: 2,  color: '#556677', roofColor: '#778899', windowColor: '#aaccee', incomeMultiplier: 1.25, bonus: '+25% income', unlocks: 'Worker' },
  { name: 'Office Building', cost: 5000,          floors: 3,  color: '#667788', roofColor: '#8899aa', windowColor: '#bbddff', incomeMultiplier: 1.6,  bonus: '+60% income', unlocks: 'Analyst & Designer' },
  { name: 'Tall Office',     cost: 50000,         floors: 5,  color: '#556688', roofColor: '#7788aa', windowColor: '#99ccff', incomeMultiplier: 2.2,  bonus: '2.2x income', unlocks: 'Engineer' },
  { name: 'Business Tower',  cost: 500000,        floors: 8,  color: '#4477aa', roofColor: '#5588bb', windowColor: '#aaddff', incomeMultiplier: 3.0,  bonus: '3x income',   unlocks: 'Manager' },
  { name: 'Corporate HQ',    cost: 5000000,       floors: 12, color: '#336699', roofColor: '#4477aa', windowColor: '#88ccff', incomeMultiplier: 4.5,  bonus: '4.5x income', unlocks: 'Director' },
  { name: 'Skyscraper',      cost: 50000000,      floors: 18, color: '#3366aa', roofColor: '#4488cc', windowColor: '#99ddff', incomeMultiplier: 7.0,  bonus: '7x income',   unlocks: 'VP' },
  { name: 'Mega Tower',      cost: 500000000,     floors: 25, color: '#2255aa', roofColor: '#3377cc', windowColor: '#aaeeff', incomeMultiplier: 11.0, bonus: '11x income',  unlocks: 'CEO' },
  { name: 'Global HQ',       cost: 5000000000,    floors: 35, color: '#2244aa', roofColor: '#3366cc', windowColor: '#bbf0ff', incomeMultiplier: 18.0, bonus: '18x income' },
  { name: 'Space Elevator',  cost: 100000000000,  floors: 50, color: '#1133aa', roofColor: '#2255dd', windowColor: '#ccf4ff', incomeMultiplier: 30.0, bonus: '30x income' },
];

const CLICK_UPGRADES = [
  { id: 'click1', name: 'Better Mouse',     cost: 100,       clickAdd: 1,    desc: '+$1/click' },
  { id: 'click2', name: 'Double Click',     cost: 1000,      clickAdd: 3,    desc: '+$3/click' },
  { id: 'click3', name: 'Power Click',      cost: 10000,     clickAdd: 10,   desc: '+$10/click' },
  { id: 'click4', name: 'Mega Click',       cost: 100000,    clickAdd: 50,   desc: '+$50/click' },
  { id: 'click5', name: 'Ultra Click',      cost: 1000000,   clickAdd: 250,  desc: '+$250/click' },
  { id: 'click6', name: 'Giga Click',       cost: 10000000,  clickAdd: 1200, desc: '+$1.2K/click' },
  { id: 'click7', name: 'Omega Click',      cost: 100000000, clickAdd: 6000, desc: '+$6K/click' },
  { id: 'click8', name: 'Quantum Click',    cost: 1000000000,clickAdd: 30000,desc: '+$30K/click' },
];

const MILESTONES = [
  { money: 100,         text: 'First $100! Keep clicking!' },
  { money: 1000,        text: 'A grand! Time to hire.' },
  { money: 10000,       text: '$10K — Business is booming!' },
  { money: 100000,      text: '$100K — Going corporate!' },
  { money: 1000000,     text: 'MILLIONAIRE! 💰' },
  { money: 10000000,    text: '$10M — Empire builder!' },
  { money: 100000000,   text: '$100M — Fortune 500 here we come!' },
  { money: 1000000000,  text: 'BILLIONAIRE! 🏆' },
  { money: 100000000000,text: '$100B — World domination!' },
];

// ==================== GAME STATE ====================

let state = {
  money: 0,
  totalEarned: 0,
  clickPower: 1,
  employees: {},
  buildingTier: 0,
  clickUpgradesBought: {},
  startTime: Date.now(),
  lastMilestone: -1,
};

// Init employee counts
EMPLOYEE_TYPES.forEach(e => state.employees[e.id] = 0);

// ==================== HELPERS ====================

function formatMoney(n) {
  if (n < 1000) return '$' + Math.floor(n);
  if (n < 1000000) return '$' + (n / 1000).toFixed(1) + 'K';
  if (n < 1000000000) return '$' + (n / 1000000).toFixed(1) + 'M';
  if (n < 1000000000000) return '$' + (n / 1000000000).toFixed(1) + 'B';
  return '$' + (n / 1000000000000).toFixed(1) + 'T';
}

function getHireCost(empType) {
  const count = state.employees[empType.id];
  return Math.floor(empType.baseCost * Math.pow(empType.costMult, count));
}

function getBuildingMultiplier() {
  return BUILDING_TIERS[state.buildingTier].incomeMultiplier;
}

function getTotalIncome() {
  let total = 0;
  EMPLOYEE_TYPES.forEach(e => {
    total += state.employees[e.id] * e.baseIncome;
  });
  return total * getBuildingMultiplier();
}

function isEmployeeUnlocked(emp) {
  return state.buildingTier >= emp.unlockTier;
}

function getTotalEmployees() {
  let total = 0;
  EMPLOYEE_TYPES.forEach(e => total += state.employees[e.id]);
  return total;
}

// ==================== CLICK HANDLING ====================

const clickArea = document.getElementById('click-area');
const buildingArea = document.getElementById('building-area');

clickArea.addEventListener('click', (e) => {
  state.money += state.clickPower;
  state.totalEarned += state.clickPower;

  // Spawn floating text
  const pop = document.createElement('div');
  pop.className = 'click-pop';
  pop.textContent = '+' + formatMoney(state.clickPower);
  pop.style.left = (e.clientX - buildingArea.getBoundingClientRect().left - 20) + 'px';
  pop.style.top = (e.clientY - buildingArea.getBoundingClientRect().top - 10) + 'px';
  buildingArea.appendChild(pop);
  setTimeout(() => pop.remove(), 800);

  updateUI();
});

// Touch support
clickArea.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  state.money += state.clickPower;
  state.totalEarned += state.clickPower;

  const pop = document.createElement('div');
  pop.className = 'click-pop';
  pop.textContent = '+' + formatMoney(state.clickPower);
  pop.style.left = (touch.clientX - buildingArea.getBoundingClientRect().left - 20) + 'px';
  pop.style.top = (touch.clientY - buildingArea.getBoundingClientRect().top - 10) + 'px';
  buildingArea.appendChild(pop);
  setTimeout(() => pop.remove(), 800);

  updateUI();
}, { passive: false });

// ==================== UI BUILDING ====================

function buildHireButtons() {
  const list = document.getElementById('hire-list');
  list.innerHTML = '';
  EMPLOYEE_TYPES.forEach(emp => {
    const unlocked = isEmployeeUnlocked(emp);
    const btn = document.createElement('button');
    btn.className = 'hire-btn';
    btn.id = 'hire-' + emp.id;
    if (unlocked) btn.onclick = () => hireEmployee(emp);

    if (!unlocked) {
      const reqTier = BUILDING_TIERS[emp.unlockTier];
      btn.innerHTML = `
        <div class="btn-icon" style="background:#22222244;border-color:#44444488;filter:grayscale(1)">🔒</div>
        <div class="btn-info">
          <div class="btn-name" style="color:#556">${emp.name}</div>
          <div class="btn-detail" style="color:#445">Requires: ${reqTier.name}</div>
        </div>
        <div class="btn-cost" style="color:#445">${emp.desc}</div>
      `;
      btn.disabled = true;
    } else {
      btn.innerHTML = `
        <div class="btn-icon" style="background:${emp.color}22;border-color:${emp.color}44">${emp.icon}</div>
        <div class="btn-info">
          <div class="btn-name">${emp.name} <span class="btn-count" id="count-${emp.id}">x${state.employees[emp.id]}</span></div>
          <div class="btn-detail">${emp.desc}</div>
        </div>
        <div class="btn-cost" id="cost-${emp.id}">${formatMoney(getHireCost(emp))}</div>
      `;
    }
    list.appendChild(btn);
  });
}

function buildUpgradeButtons() {
  const list = document.getElementById('upgrade-list');
  list.innerHTML = '';

  // Show current building info at top
  const cur = BUILDING_TIERS[state.buildingTier];
  const curDiv = document.createElement('div');
  curDiv.style.cssText = 'padding:10px 14px;font-size:7px;color:#fa0;border-bottom:1px solid #1a1a30;line-height:1.8';
  curDiv.innerHTML = `▶ ${cur.name} &nbsp;|&nbsp; ${cur.bonus} &nbsp;|&nbsp; ${cur.floors} floors`;
  list.appendChild(curDiv);

  BUILDING_TIERS.forEach((tier, i) => {
    if (i <= state.buildingTier) return;
    const btn = document.createElement('button');
    btn.className = 'upgrade-btn';
    btn.id = 'upgrade-' + i;
    btn.onclick = () => upgradeBuildingTo(i);
    const unlockLine = tier.unlocks ? `<div class="btn-detail" style="color:#8f8">🔓 Unlocks: ${tier.unlocks}</div>` : '';
    btn.innerHTML = `
      <div class="btn-icon" style="background:${tier.color}44;border-color:${tier.color}88">🏢</div>
      <div class="btn-info">
        <div class="btn-name">${tier.name}</div>
        <div class="btn-detail" style="color:#fa4">📈 ${tier.bonus}</div>
        ${unlockLine}
      </div>
      <div class="btn-cost">${formatMoney(tier.cost)}</div>
    `;
    list.appendChild(btn);
  });
  if (list.querySelectorAll('button').length === 0) {
    list.innerHTML += '<div style="padding:14px;font-size:8px;color:#556;">MAX LEVEL!</div>';
  }
}

function buildClickUpgradeButtons() {
  const list = document.getElementById('click-upgrade-list');
  list.innerHTML = '';
  CLICK_UPGRADES.forEach(cu => {
    if (state.clickUpgradesBought[cu.id]) return;
    const btn = document.createElement('button');
    btn.className = 'upgrade-btn';
    btn.id = 'clickup-' + cu.id;
    btn.onclick = () => buyClickUpgrade(cu);
    btn.innerHTML = `
      <div class="btn-icon" style="background:#fa044;border-color:#fa088">🖱️</div>
      <div class="btn-info">
        <div class="btn-name">${cu.name}</div>
        <div class="btn-detail">${cu.desc}</div>
      </div>
      <div class="btn-cost">${formatMoney(cu.cost)}</div>
    `;
    list.appendChild(btn);
  });
  if (list.children.length === 0) {
    list.innerHTML = '<div style="padding:14px;font-size:8px;color:#556;">All bought!</div>';
  }
}

// ==================== ACTIONS ====================

function hireEmployee(emp) {
  if (!isEmployeeUnlocked(emp)) return;
  const cost = getHireCost(emp);
  if (state.money < cost) return;
  state.money -= cost;
  state.employees[emp.id]++;
  updateUI();
  buildHireButtons();
  spawnEmployeeSprite(emp);
}

function upgradeBuildingTo(tierIndex) {
  const tier = BUILDING_TIERS[tierIndex];
  if (state.money < tier.cost) return;
  state.money -= tier.cost;
  state.buildingTier = tierIndex;
  updateUI();
  buildUpgradeButtons();
  buildHireButtons(); // re-render in case new employees unlocked
  drawBuilding();
  const unlockMsg = tier.unlocks ? `\nUnlocked: ${tier.unlocks}!` : '';
  showNotification('Building Upgraded!', `${tier.name}\n${tier.bonus}${unlockMsg}\n${tier.floors} floors of corporate glory.`);
}

function buyClickUpgrade(cu) {
  if (state.money < cu.cost) return;
  state.money -= cu.cost;
  state.clickPower += cu.clickAdd;
  state.clickUpgradesBought[cu.id] = true;
  updateUI();
  buildClickUpgradeButtons();
}

// ==================== NOTIFICATIONS ====================

function showNotification(title, body) {
  document.getElementById('notif-title').textContent = title;
  document.getElementById('notif-body').textContent = body;
  document.getElementById('notification').style.display = 'block';
}

function closeNotification() {
  document.getElementById('notification').style.display = 'none';
}

// ==================== UI UPDATE ====================

function updateUI() {
  const income = getTotalIncome();

  const mult = getBuildingMultiplier();
  document.getElementById('money-display').textContent = formatMoney(state.money);
  document.getElementById('per-click').textContent = formatMoney(state.clickPower);
  document.getElementById('per-sec').textContent = formatMoney(income) + '/s';
  document.getElementById('multiplier-display').textContent = 'x' + mult;
  document.getElementById('emp-count').textContent = getTotalEmployees();

  // Update hire button states & costs
  EMPLOYEE_TYPES.forEach(emp => {
    const btn = document.getElementById('hire-' + emp.id);
    if (!btn) return;
    if (!isEmployeeUnlocked(emp)) return; // locked buttons stay disabled
    const costEl = document.getElementById('cost-' + emp.id);
    const countEl = document.getElementById('count-' + emp.id);
    const cost = getHireCost(emp);
    btn.disabled = state.money < cost;
    if (costEl) costEl.textContent = formatMoney(cost);
    if (countEl) countEl.textContent = 'x' + state.employees[emp.id];
  });

  // Update upgrade button states
  BUILDING_TIERS.forEach((tier, i) => {
    if (i <= state.buildingTier) return;
    const btn = document.getElementById('upgrade-' + i);
    if (btn) btn.disabled = state.money < tier.cost;
  });

  // Update click upgrade button states
  CLICK_UPGRADES.forEach(cu => {
    if (state.clickUpgradesBought[cu.id]) return;
    const btn = document.getElementById('clickup-' + cu.id);
    if (btn) btn.disabled = state.money < cu.cost;
  });

  // Milestones
  checkMilestones();
}

function checkMilestones() {
  for (let i = MILESTONES.length - 1; i >= 0; i--) {
    if (state.totalEarned >= MILESTONES[i].money && i > state.lastMilestone) {
      state.lastMilestone = i;
      document.getElementById('milestone').textContent = MILESTONES[i].text;
      break;
    }
  }
}

function updatePlaytime() {
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const min = Math.floor(elapsed / 60);
  const sec = elapsed % 60;
  const hr = Math.floor(min / 60);
  if (hr > 0) {
    document.getElementById('playtime').textContent = `${hr}:${String(min % 60).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  } else {
    document.getElementById('playtime').textContent = `${min}:${String(sec).padStart(2,'0')}`;
  }
}

// ==================== PIXEL ART BUILDING ====================

const bCanvas = document.getElementById('building-canvas');
const bCtx = bCanvas.getContext('2d');

function drawBuilding() {
  const tier = BUILDING_TIERS[state.buildingTier];
  const cw = 400;
  const floors = tier.floors;

  // Scale canvas height based on floors
  const floorH = 28;
  const roofH = 20;
  const baseH = 16;
  const totalH = floors * floorH + roofH + baseH + 40;
  bCanvas.height = Math.max(totalH, 200);
  bCanvas.width = cw;

  bCtx.clearRect(0, 0, cw, bCanvas.height);

  const buildingW = Math.min(120 + floors * 6, 280);
  const bx = (cw - buildingW) / 2;
  const by = bCanvas.height - baseH;

  // Base / entrance
  bCtx.fillStyle = '#333';
  bCtx.fillRect(bx - 4, by, buildingW + 8, baseH);

  // Door
  const doorW = 20;
  const doorH = baseH - 2;
  bCtx.fillStyle = '#665533';
  bCtx.fillRect(bx + buildingW / 2 - doorW / 2, by + 2, doorW, doorH);
  bCtx.fillStyle = '#ffdd88';
  bCtx.fillRect(bx + buildingW / 2 - doorW / 2 + 2, by + 4, doorW - 4, doorH - 4);

  // Floors
  for (let f = 0; f < floors; f++) {
    const fy = by - (f + 1) * floorH;

    // Wall
    bCtx.fillStyle = tier.color;
    bCtx.fillRect(bx, fy, buildingW, floorH);

    // Floor line
    bCtx.fillStyle = '#00000033';
    bCtx.fillRect(bx, fy + floorH - 2, buildingW, 2);

    // Side edge highlights
    bCtx.fillStyle = '#ffffff11';
    bCtx.fillRect(bx, fy, 2, floorH);
    bCtx.fillStyle = '#00000022';
    bCtx.fillRect(bx + buildingW - 2, fy, 2, floorH);

    // Windows
    const winW = 12;
    const winH = 14;
    const winGap = 8;
    const winRowW = winW + winGap;
    const numWins = Math.floor((buildingW - 20) / winRowW);
    const winStartX = bx + (buildingW - numWins * winRowW + winGap) / 2;

    for (let w = 0; w < numWins; w++) {
      const wx = winStartX + w * winRowW;
      const wy = fy + (floorH - winH) / 2;

      // Window frame
      bCtx.fillStyle = '#222';
      bCtx.fillRect(wx - 1, wy - 1, winW + 2, winH + 2);

      // Window glass — some lit, some dark
      const isLit = (Math.sin(f * 13.7 + w * 7.3 + state.buildingTier * 3.1) > -0.3);
      if (isLit) {
        bCtx.fillStyle = tier.windowColor;
        bCtx.fillRect(wx, wy, winW, winH);
        // Warm glow
        bCtx.fillStyle = '#ffee8822';
        bCtx.fillRect(wx, wy, winW, winH);
      } else {
        bCtx.fillStyle = '#223344';
        bCtx.fillRect(wx, wy, winW, winH);
      }

      // Window cross
      bCtx.fillStyle = '#222';
      bCtx.fillRect(wx + winW / 2 - 0.5, wy, 1, winH);
      bCtx.fillRect(wx, wy + winH / 2 - 0.5, winW, 1);
    }
  }

  // Roof
  const roofY = by - floors * floorH - roofH;
  bCtx.fillStyle = tier.roofColor;
  bCtx.fillRect(bx - 6, roofY, buildingW + 12, roofH);

  // Roof edge
  bCtx.fillStyle = '#ffffff22';
  bCtx.fillRect(bx - 6, roofY, buildingW + 12, 3);

  // Antenna (for taller buildings)
  if (floors >= 5) {
    const ax = bx + buildingW / 2;
    bCtx.fillStyle = '#888';
    bCtx.fillRect(ax - 1, roofY - 20, 2, 20);
    // Blinking light
    const blink = Math.sin(Date.now() / 500) > 0;
    bCtx.fillStyle = blink ? '#f44' : '#400';
    bCtx.fillRect(ax - 2, roofY - 22, 4, 4);
  }

  // Building name
  bCtx.fillStyle = '#fff';
  bCtx.font = '10px "Press Start 2P"';
  bCtx.textAlign = 'center';
  bCtx.fillText(tier.name, cw / 2, roofY - 8);
}

// ==================== EMPLOYEE SPRITES ====================

const employeeSprites = [];
const spriteColors = ['#4a6', '#48f', '#a4f', '#f4a', '#fa4', '#4af', '#ff4', '#f84', '#ffd700'];

function spawnEmployeeSprite(emp) {
  const area = document.getElementById('building-area');
  const areaW = area.clientWidth;
  const empIdx = EMPLOYEE_TYPES.findIndex(e => e.id === emp.id);
  const color = spriteColors[empIdx % spriteColors.length];

  const sprite = {
    x: Math.random() * (areaW - 40) + 20,
    dir: Math.random() > 0.5 ? 1 : -1,
    speed: 15 + Math.random() * 25,
    color: color,
    bounce: 0,
    el: null
  };

  // Create canvas element for pixel person
  const canvas = document.createElement('canvas');
  canvas.width = 16;
  canvas.height = 24;
  canvas.className = 'employee-sprite';
  canvas.style.left = sprite.x + 'px';

  const sCtx = canvas.getContext('2d');
  drawPixelPerson(sCtx, color, emp.icon);

  area.appendChild(canvas);
  sprite.el = canvas;
  employeeSprites.push(sprite);

  // Cap visible sprites
  while (employeeSprites.length > 30) {
    const old = employeeSprites.shift();
    if (old.el) old.el.remove();
  }
}

function drawPixelPerson(ctx, color, icon) {
  // Head
  ctx.fillStyle = '#fdb';
  ctx.fillRect(5, 0, 6, 6);

  // Hair
  ctx.fillStyle = '#543';
  ctx.fillRect(5, 0, 6, 2);

  // Body
  ctx.fillStyle = color;
  ctx.fillRect(4, 6, 8, 10);

  // Arms
  ctx.fillStyle = color;
  ctx.fillRect(2, 7, 2, 7);
  ctx.fillRect(12, 7, 2, 7);

  // Legs
  ctx.fillStyle = '#335';
  ctx.fillRect(5, 16, 3, 8);
  ctx.fillRect(9, 16, 3, 8);

  // Shoes
  ctx.fillStyle = '#222';
  ctx.fillRect(4, 22, 4, 2);
  ctx.fillRect(8, 22, 4, 2);

  // Eyes
  ctx.fillStyle = '#222';
  ctx.fillRect(6, 3, 1, 1);
  ctx.fillRect(9, 3, 1, 1);
}

function updateSprites(dt) {
  const area = document.getElementById('building-area');
  const areaW = area.clientWidth;

  employeeSprites.forEach(s => {
    s.x += s.dir * s.speed * dt;
    s.bounce += dt * 6;

    // Bounce at edges
    if (s.x < 10) { s.x = 10; s.dir = 1; }
    if (s.x > areaW - 26) { s.x = areaW - 26; s.dir = -1; }

    if (s.el) {
      s.el.style.left = s.x + 'px';
      s.el.style.bottom = (12 + Math.abs(Math.sin(s.bounce)) * 3) + 'px';
      s.el.style.transform = s.dir < 0 ? 'scaleX(-1)' : '';
    }

    // Random direction change
    if (Math.random() < 0.003) s.dir *= -1;
  });
}

// ==================== STARS BACKGROUND ====================

function generateStars() {
  const area = document.getElementById('building-area');
  for (let i = 0; i < 50; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 50 + '%';
    const size = Math.random() * 2 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.animationDelay = Math.random() * 2 + 's';
    star.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    area.appendChild(star);
  }
}

// ==================== GAME LOOP ====================

let lastTime = performance.now();

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;

  // Passive income
  const income = getTotalIncome();
  if (income > 0) {
    const earned = income * dt;
    state.money += earned;
    state.totalEarned += earned;
  }

  // Update sprites
  updateSprites(dt);

  // Redraw building for antenna blink
  if (BUILDING_TIERS[state.buildingTier].floors >= 5) {
    drawBuilding();
  }

  updateUI();
  updatePlaytime();

  requestAnimationFrame(gameLoop);
}

// ==================== SAVE / LOAD ====================

function saveGame() {
  try {
    const saveData = JSON.stringify(state);
    // Use a cookie-like approach since localStorage may not be available
    window._hiredSave = saveData;
  } catch(e) {}
}

function loadGame() {
  try {
    if (window._hiredSave) {
      const data = JSON.parse(window._hiredSave);
      Object.assign(state, data);
      return true;
    }
  } catch(e) {}
  return false;
}

// Auto-save every 30s
setInterval(saveGame, 30000);

// ==================== INIT ====================

function init() {
  generateStars();
  buildHireButtons();
  buildUpgradeButtons();
  buildClickUpgradeButtons();
  drawBuilding();
  updateUI();

  requestAnimationFrame(gameLoop);
}

init();
</script>
