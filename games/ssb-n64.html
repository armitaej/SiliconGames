function rgb(hex) {
    hex = hex.replace('#', '');
    return [parseInt(hex.slice(0, 2), 16), parseInt(hex.slice(2, 4), 16), parseInt(hex.slice(4, 6), 16)];
}

function blend(c, amt = 0.5) {
    return [
        Math.min(255, Math.floor(c[0] + (255 - c[0]) * amt)),
        Math.min(255, Math.floor(c[1] + (255 - c[1]) * amt)),
        Math.min(255, Math.floor(c[2] + (255 - c[2]) * amt))
    ];
}

function darken(c, amt = 0.4) {
    return [
        Math.max(0, Math.floor(c[0] * (1 - amt))),
        Math.max(0, Math.floor(c[1] * (1 - amt))),
        Math.max(0, Math.floor(c[2] * (1 - amt)))
    ];
}

function makeSound(freq = 440, duration = 0.1) {
    return { freq, duration };
}

const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration = 0.1, volume = 0.2) {
    try {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(volume, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + duration);
    } catch (e) {}
}

// ═════════════════════════════════════════════════════════════════════════════
//  PARTICLE SYSTEM
// ═════════════════════════════════════════════════════════════════════════════

function spawnParticles(x, y, color, count = 8, speed = 4) {
    const c = typeof color === 'string' ? rgb(color) : color;
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const s = Math.random() * speed + 1;
        const life = Math.floor(Math.random() * 25) + 20;
        particles.push({
            x, y,
            vx: Math.cos(angle) * s,
            vy: Math.sin(angle) * s - 2,
            life, maxLife: life,
            color: c,
            size: Math.random() * 3 + 2
        });
    }
}

function spawnHitEffect(x, y, color) {
    spawnParticles(x, y, color, 8, 5);
    spawnParticles(x, y, [255, 255, 255], 4, 3);
}

function updateParticles() {
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.95;
        p.vy += 0.08;
        p.life--;
        return p.life > 0;
    });
}

function drawParticles(ctx) {
    particles.forEach(p => {
        const alpha = p.life / p.maxLife;
        ctx.fillStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${alpha * 0.8})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawRect(ctx, color, cx, feetY, w, h) {
    ctx.fillStyle = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
    ctx.fillRect(cx - w / 2, feetY - h, w, h);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(cx - w / 2, feetY - h, w, h);
}

function drawCircle(ctx, color, cx, cy, r) {
    ctx.fillStyle = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();
}

function drawEye(ctx, cx, cy) {
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(cx, cy, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx + 1, cy - 1, 1, 0, Math.PI * 2);
    ctx.fill();
}

function drawSwing(state, animFrame, scale = 6) {
    return state === 'walk' ? Math.sin(animFrame * 0.5) * scale : 0;
}

function drawHumanoidLegs(ctx, cx, cy, pantColor, shoeColor, swing, lw = 8, lh = 16, sw = 9, sh = 7) {
    // Left leg
    drawRect(ctx, pantColor, cx - lw / 2 - 1, cy - sh + swing, lw, lh - sh);
    drawRect(ctx, shoeColor, cx - lw / 2 - 2, cy + swing, sw, sh);
    // Right leg
    drawRect(ctx, pantColor, cx + lw / 2 + 1, cy - sh - swing, lw, lh - sh);
    drawRect(ctx, shoeColor, cx + lw / 2, cy - swing, sw, sh);
}

function drawHumanoidArms(ctx, cx, cyShoulder, color, isAtk, swing, armW = 7, armH = 8) {
    if (isAtk) {
        drawRect(ctx, color, cx + 10, cyShoulder + armH, armW + 4, armH);
    } else {
        drawRect(ctx, color, cx - 12, cyShoulder + swing, armW, armH);
        drawRect(ctx, color, cx + 5, cyShoulder - swing, armW, armH);
    }
}

//  PROJECTILES

class Projectile {
    constructor(ownerNum, x, y, vx, vy, spc) {
        this.owner = ownerNum;
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = typeof spc.color === 'string' ? rgb(spc.color) : spc.color;
        this.dmg = spc.dmg;
        this.kb = spc.kb;
        this.angle = spc.angle;
        this.bounce = spc.bounce || false;
        this.returns = spc.returns || false;
        this.groundRoll = spc.ground_roll || false;
        this.arc = spc.arc || false;
        this.active = true;
        this.life = 180;
        this.size = 8;
    }

    update(p1f, p2f) {
        if (!this.active) return;
        this.life--;
        if (this.life <= 0) { this.active = false; return; }
        if (this.arc) this.vy += 0.3;
        this.x += this.vx;
        this.y += this.vy;

        const mainPlat = STAGE.plats[0];
        if (this.y >= mainPlat.y && this.x >= mainPlat.x && this.x <= mainPlat.x + mainPlat.w) {
            if (this.bounce) this.vy = -Math.abs(this.vy) * 0.5;
            else if (this.groundRoll) this.vy = 0;
            else { this.active = false; return; }
        }

        if (this.returns) {
            const owner = this.owner === 1 ? p1f : p2f;
            const dx = owner.x - this.x;
            if (this.vx > 0 && dx < -50) this.vx = -Math.abs(this.vx);
            else if (this.vx < 0 && dx > 50) this.vx = Math.abs(this.vx);
        }

        for (const f of [p1f, p2f]) {
            if (f.playerNum === this.owner) continue;
            if (['dead', 'spawn'].includes(f.state)) continue;
            const dx = Math.abs(f.x - this.x);
            const dy = Math.abs((f.y - f.cfg.h / 2) - this.y);
            if (dx < f.cfg.w / 2 + this.size && dy < f.cfg.h / 2 + this.size) {
                applyHitData(f, this.x, this.dmg, this.kb, this.angle);
                this.active = false;
                break;
            }
        }
    }

    draw(ctx) {
        if (!this.active) return;
        ctx.fillStyle = `rgb(${this.color[0]}, ${this.color[1]}, ${this.color[2]})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

function applyHitData(defender, attackerX, dmg, kbVal, angleDeg) {
    if (defender.invincible > 0) return;
    if (defender.sleeping > 0) defender.sleeping = 0;

    const kb = kbVal * (1 + defender.damage * 0.012) * (100 / defender.cfg.weight);
    const angleRad = (angleDeg * Math.PI) / 180;
    const direction = attackerX < defender.x ? 1 : -1;

    defender.vx = Math.cos(angleRad) * kb * direction;
    defender.vy = -Math.abs(Math.sin(angleRad) * kb);
    if (Math.abs(defender.vy) < 2) defender.vy = -2;

    defender.damage += dmg;
    defender.state = 'hitstun';
    defender.stateTimer = Math.floor(8 + kb * 2.5);
    defender.onGround = false;
    defender.invincible = 8;

    SND_HIT();
    spawnHitEffect(defender.x, defender.y - defender.cfg.h / 2, defender.cfg.c1);
    screenShake = Math.min(screenShake + 5, 10);
}

class Fighter {
    constructor(charIdx, spawnPos, playerNum) {
        this.cfg = CHARS[charIdx];
        this.charIdx = charIdx;
        this.playerNum = playerNum;
        this.x = spawnPos[0];
        this.y = spawnPos[1];
        this.vx = 0;
        this.vy = 0;
        this.facing = playerNum === 1 ? 1 : -1;
        this.damage = 0;
        this.stocks = STOCKS;
        this.onGround = false;
        this.airJumpsLeft = this.cfg.aJumps;
        this.state = 'spawn';
        this.stateTimer = 60;
        this.invincible = 60;
        this.attackType = null;
        this.attackTimer = 0;
        this.hitboxActive = false;
        this.hitCooldown = 0;
        this.specialCooldown = 0;
        this.chargeTime = 0;
        this.charging = false;
        this.continuousSpecial = false;
        this.breathTimer = 0;
        this.animFrame = 0;
        this.animTimer = 0;
        this.respawnTimer = 0;
        this.counterActive = false;
        this.counterTimer = 0;
        this.sleeping = 0;
        this.prevJump = false;
        this.prevAtk = false;
        this.prevSpc = false;
        this._cpuState = 'approach';
        this._cpuTimer = 0;
        this._cpuJumpTimer = 0;
        this._cpuSpecialTimer = 0;
    }

    update(other, inp) {
        const cfg = this.cfg;

        this.hitCooldown = Math.max(0, this.hitCooldown - 1);
        this.specialCooldown = Math.max(0, this.specialCooldown - 1);
        this.invincible = Math.max(0, this.invincible - 1);
        if (this.sleeping > 0) this.sleeping--;

        if (this.state === 'dead') {
            this.stateTimer--;
            if (this.stateTimer <= 0 && this.stocks > 0) {
                this._respawn();
            }
            return;
        }

        if (this.state === 'spawn') {
            this.stateTimer--;
            this._applyPhysics();
            this._platformCollision();
            if (this.stateTimer <= 0) this.state = 'idle';
            this._animUpdate();
            return;
        }

        if (this.sleeping > 0) {
            this._applyPhysics();
            this._platformCollision();
            return;
        }

        if (this.state === 'hitstun') {
            this.stateTimer--;
            if (this.stateTimer <= 0) this.state = 'idle';
            this._applyPhysics();
            this._platformCollision();
            this._checkBlast(other);
            this._animUpdate();
            return;
        }

        if (cfg.hover) {
            this.vy = 0;
            this.onGround = false;
            if (inp.left && !inp.right) {
                this.vx = Math.max(this.vx - cfg.speed * 0.5, -cfg.speed);
                this.facing = -1;
            } else if (inp.right && !inp.left) {
                this.vx = Math.min(this.vx + cfg.speed * 0.5, cfg.speed);
                this.facing = 1;
            } else {
                this.vx *= 0.8;
            }
            if (inp.down) this.y = Math.min(ARENA_H - 80, this.y + 3);
            else if (inp.up) this.y = Math.max(80, this.y - 3);
            this.x += this.vx;
            this.x = Math.max(50, Math.min(GW - 50, this.x));
            this._handleAttacks(other, inp);
            this._animUpdate();
            return;
        }

        if (this.state !== 'attack') {
            if (inp.left && !inp.right) {
                this.vx = Math.max(this.vx - cfg.speed * 0.6, -cfg.speed);
                this.facing = -1;
                if (!['jump', 'fall'].includes(this.state)) this.state = 'walk';
            } else if (inp.right && !inp.left) {
                this.vx = Math.min(this.vx + cfg.speed * 0.6, cfg.speed);
                this.facing = 1;
                if (!['jump', 'fall'].includes(this.state)) this.state = 'walk';
            } else {
                if (this.state === 'walk') this.state = 'idle';
            }
        }

        if (inp.jump && !inp.prevJump) {
            if (this.onGround) {
                this.vy = -cfg.jp;
                this.onGround = false;
                this.state = 'jump';
                this.airJumpsLeft = cfg.aJumps;
                SND_JUMP();
                spawnParticles(this.x, this.y, cfg.c1, 4, 2);
            } else if (this.airJumpsLeft > 0) {
                this.vy = -(cfg.jp * 0.82);
                this.airJumpsLeft--;
                this.state = 'jump';
                SND_JUMP();
                spawnParticles(this.x, this.y, cfg.c1, 4, 2);
            }
        }

        if (inp.down && !this.onGround && this.vy > 0) {
            this.vy = Math.min(this.vy + 3, MAX_FALL);
        }

        this._handleAttacks(other, inp);
        this._applyPhysics();
        this._platformCollision();
        this._checkBlast(other);
        this._animUpdate();

        this.prevJump = inp.jump;
        this.prevAtk = inp.atk;
        this.prevSpc = inp.spc;
    }

    _handleAttacks(other, inp) {
        const cfg = this.cfg;

        if (this.attackTimer > 0) {
            this.attackTimer--;
            if (this.attackTimer <= 0) {
                this.hitboxActive = false;
                this.state = 'idle';
                this.attackType = null;
                this.charging = false;
            } else if (this.hitboxActive && this.hitCooldown <= 0) {
                const hb = this._getHitbox();
                if (hb) {
                    const oh = other.cfg;
                    const ox1 = other.x - oh.w / 2;
                    const oy1 = other.y - oh.h;
                    const ox2 = other.x + oh.w / 2;
                    const oy2 = other.y;

                    if (hb[0] < ox2 && hb[2] > ox1 && hb[1] < oy2 && hb[3] > oy1) {
                        if (!['dead', 'spawn'].includes(other.state) && other.invincible <= 0) {
                            if (this.counterActive) {
                                applyHitData(other, this.x, 18, 14, 65);
                                this.counterActive = false;
                                this.counterTimer = 0;
                            } else {
                                const atkData = cfg[this.attackType];
                                if (atkData) {
                                    applyHitData(other, this.x, atkData.d, atkData.kb, atkData.a);
                                }
                            }
                            this.hitCooldown = 20;
                        }
                    }
                }
            }
        } else {
            if (this.charging) {
                if (inp.spc) {
                    this.chargeTime = Math.min(this.chargeTime + 1, SPECIALS[cfg.special].max_charge || 60);
                } else {
                    const spc = SPECIALS[cfg.special];
                    const pct = this.chargeTime / (spc.max_charge || 60);
                    const dmg = Math.floor(spc.dmg * (0.5 + pct * 0.5));
                    const kb = spc.kb * (0.5 + pct * 0.5);
                    applyHitData(other, this.x, dmg, kb, spc.angle);
                    this.charging = false;
                    this.chargeTime = 0;
                    this.specialCooldown = 60;
                    SND_SPECIAL();
                }
                return;
            }

            if (inp.atk && !inp.prevAtk && this.state !== 'attack') {
                if (inp.up) this._triggerAttack('uatk');
                else if (inp.down && !this.onGround) this._triggerAttack('datk');
                else if (!this.onGround) this._triggerAttack('aerial');
                else this._triggerAttack('jab');
            }

            if (inp.spc && !inp.prevSpc && this.specialCooldown <= 0 && this.state !== 'attack') {
                this._triggerSpecial(other);
            }
        }

        if (this.counterTimer > 0) {
            this.counterTimer--;
            if (this.counterTimer <= 0) {
                this.counterActive = false;
            }
        }

        if (this.continuousSpecial && this.breathTimer > 0) {
            this.breathTimer--;
            if (this.breathTimer <= 0) {
                this.continuousSpecial = false;
                this.state = 'idle';
            } else {
                const spc = SPECIALS[cfg.special];
                const fx = this.x + this.facing * 60;
                const fy = this.y - cfg.h / 2;
                if (Math.abs(other.x - fx) < spc.range / 2 && Math.abs(other.y - fy) < 40) {
                    if (other.invincible <= 0) {
                        applyHitData(other, this.x, spc.dmg, spc.kb, spc.angle);
                    }
                }
            }
        }
    }

    _triggerAttack(atkType) {
        const cfg = this.cfg;
        const data = cfg[atkType];
        if (!data) return;
        this.state = 'attack';
        this.attackType = atkType;
        this.attackTimer = 20;
        this.hitboxActive = true;
        this.hitCooldown = 0;
        spawnParticles(this.x, this.y - cfg.h / 2, cfg.c1, 4, 3);
    }

    _triggerSpecial(other) {
        const cfg = this.cfg;
        const spcName = cfg.special;
        const spc = SPECIALS[spcName];
        this.specialCooldown = 90;
        SND_SPECIAL();

        if (spc.type === 'proj') {
            const vx = spc.speed * this.facing;
            const vy = spc.init_vy || 0;
            const p = new Projectile(this.playerNum, this.x + this.facing * 20, this.y - cfg.h / 2, vx, vy, spc);
            projectiles.push(p);
        } else if (spc.type === 'charge') {
            this.charging = true;
            this.chargeTime = 0;
            this.state = 'attack';
            this.attackTimer = 999;
        } else if (spc.type === 'area') {
            const dist = Math.sqrt((other.x - this.x) ** 2 + (other.y - this.y) ** 2);
            if (dist < spc.radius) {
                if (spc.sleep) {
                    other.sleeping = 180;
                    spawnParticles(other.x, other.y - other.cfg.h / 2, spc.color, 12, 3);
                } else {
                    applyHitData(other, this.x, spc.dmg, spc.kb, spc.angle);
                }
            }
            spawnParticles(this.x, this.y - cfg.h / 2, spc.color, 16, 5);
        } else if (spc.type === 'spin') {
            this.state = 'attack';
            this.attackType = 'jab';
            this.attackTimer = 50;
            this.hitboxActive = true;
            spawnParticles(this.x, this.y - cfg.h / 2, spc.color, 12, 5);
        } else if (spc.type === 'counter') {
            this.counterActive = true;
            this.counterTimer = 40;
            this.invincible = 40;
            spawnParticles(this.x, this.y - cfg.h / 2, spc.color, 8, 3);
        } else if (spc.type === 'continuous') {
            this.continuousSpecial = true;
            this.breathTimer = 45;
            this.state = 'attack';
            this.attackType = 'jab';
        }
    }

    _getHitbox() {
        const cfg = this.cfg;
        if (!this.hitboxActive) return null;
        const ext = ['uatk', 'datk'].includes(this.attackType) ? 20 : 26;
        if (this.attackType === 'uatk') {
            return [this.x - cfg.w / 2, this.y - cfg.h - ext, this.x + cfg.w / 2, this.y - cfg.h];
        } else if (this.attackType === 'datk') {
            return [this.x - cfg.w / 2, this.y, this.x + cfg.w / 2, this.y + ext];
        } else {
            const ox = this.facing * (cfg.w / 2 + ext);
            return [this.x + ox - ext / 2, this.y - cfg.h, this.x + ox + ext / 2, this.y];
        }
    }

    _applyPhysics() {
        if (this.cfg.hover) return;
        const grav = GRAV * this.cfg.fall;
        this.vy = Math.min(this.vy + grav, MAX_FALL);
        this.y += this.vy;
        this.x += this.vx;
        if (this.onGround) this.vx *= FRIC;
        else this.vx *= AIRFRIC;
        if (Math.abs(this.vx) < 0.2) this.vx = 0;
        this.x = Math.max(-200, Math.min(GW + 200, this.x));
    }

    _platformCollision() {
        if (this.cfg.hover) return;
        this.onGround = false;
        for (const plat of STAGE.plats) {
            const fw2 = this.cfg.w / 2;
            if (this.x + fw2 > plat.x && this.x - fw2 < plat.x + plat.w) {
                const prevY = this.y - this.vy;
                if (this.vy >= 0 && prevY <= plat.y && this.y >= plat.y) {
                    if (!plat.main && this.vy > 8) continue;
                    this.y = plat.y;
                    this.vy = 0;
                    this.onGround = true;
                    this.airJumpsLeft = this.cfg.aJumps;
                    if (['jump', 'fall'].includes(this.state)) {
                        this.state = 'idle';
                        SND_LAND();
                    }
                    break;
                }
            }
        }
        if (!this.onGround && this.vy > 0) {
            if (!['attack', 'hitstun'].includes(this.state)) this.state = 'fall';
        }
    }

    _checkBlast(other) {
        const bz = STAGE;
        if (this.x < bz.blast_l || this.x > bz.blast_r || this.y < bz.blast_t || this.y > bz.blast_b) {
            this._kill();
        }
    }

    _kill() {
        spawnParticles(this.x, this.y, this.cfg.c1, 20, 8);
        spawnParticles(this.x, this.y, [255, 220, 50], 15, 6);
        SND_KO();
        this.stocks--;
        this.state = 'dead';
        this.stateTimer = 90;
        this.x = -1000;
        this.y = -1000;
        this.vx = 0;
        this.vy = 0;
        this.damage = 0;
        this.invincible = 0;
    }

    _respawn() {
        const pos = this.playerNum === 1 ? STAGE.spawn_p1 : STAGE.spawn_p2;
        this.x = pos[0];
        this.y = pos[1];
        this.vx = 0;
        this.vy = 0;
        this.state = 'spawn';
        this.stateTimer = 60;
        this.invincible = 120;
        this.airJumpsLeft = this.cfg.aJumps;
        this.charging = false;
        this.continuousSpecial = false;
    }

    _animUpdate() {
        if (this.state === 'walk') {
            this.animTimer++;
            if (this.animTimer > 5) {
                this.animTimer = 0;
                this.animFrame++;
            }
        } else {
            this.animFrame = 0;
            this.animTimer = 0;
        }
    }

    getCpuInput(other) {
        const inp = {
            left: false, right: false, up: false, down: false,
            jump: false, atk: false, spc: false,
            prevJump: this.prevJump, prevAtk: this.prevAtk, prevSpc: this.prevSpc
        };
        const cfg = this.cfg;
        const dx = other.x - this.x;
        const dy = (other.y - other.cfg.h / 2) - (this.y - cfg.h / 2);
        const dist = Math.sqrt(dx * dx + dy * dy);

        this._cpuTimer--;
        this._cpuJumpTimer--;
        this._cpuSpecialTimer--;

        const mp = STAGE.plats[0];
        const off = this.x < mp.x - 60 || this.x > mp.x + mp.w + 60;
        if (off || this.y < STAGE.blast_t + 120) {
            const cx = mp.x + mp.w / 2;
            if (this.x < cx) inp.right = true;
            else inp.left = true;
            if (!this.onGround && this._cpuJumpTimer <= 0) {
                inp.jump = true;
                this._cpuJumpTimer = 20;
            }
            this._updateCpuPrev(inp);
            return inp;
        }

        if (this._cpuState === 'approach' || this._cpuTimer <= 0) {
            if (dist < 80) {
                this._cpuState = 'attack';
                this._cpuTimer = 30;
            } else if (dist > 300 && this.damage < 60) {
                this._cpuState = 'approach';
                this._cpuTimer = 60;
            } else {
                this._cpuState = 'approach';
                this._cpuTimer = 40;
            }
        }

        if (this._cpuState === 'approach') {
            if (dx > 10) inp.right = true;
            else if (dx < -10) inp.left = true;
            if (dy < -80 && this.onGround && this._cpuJumpTimer <= 0) {
                inp.jump = true;
                this._cpuJumpTimer = 25;
            } else if (!this.onGround && Math.abs(dx) > 20 && this._cpuJumpTimer <= 0) {
                if (dy < -60) {
                    inp.jump = true;
                    this._cpuJumpTimer = 20;
                }
            }
        } else if (this._cpuState === 'attack') {
            if (dx > 5) inp.right = true;
            else if (dx < -5) inp.left = true;
            if (dist < 120) {
                if (this._cpuSpecialTimer <= 0 && Math.random() < 0.02) {
                    inp.spc = true;
                    this._cpuSpecialTimer = 90;
                } else if (Math.random() < 0.15) {
                    inp.atk = true;
                    if (Math.abs(dy) > 50) inp.up = dy < 0;
                }
            }
            if (dist < 60 && Math.random() < 0.03 && this._cpuJumpTimer <= 0) {
                inp.jump = true;
                this._cpuJumpTimer = 20;
            }
        }

        this._updateCpuPrev(inp);
        return inp;
    }

    _updateCpuPrev(inp) {
        this.prevJump = inp.jump;
        this.prevAtk = inp.atk;
        this.prevSpc = inp.spc;
    }

    draw(ctx) {
        if (this.state === 'dead') return;
        if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) return;

        const cfg = this.cfg;
        const isAtk = this.state === 'attack';
        drawCharacter(ctx, cfg, this.x, this.y, this.facing, this.animFrame, isAtk, this.state);

        if (this.sleeping > 0) {
            ctx.font = 'bold 18px Arial';
            ctx.fillStyle = '#9664c8';
            ctx.textAlign = 'center';
            ctx.fillText('💤', this.x, this.y - cfg.h - 20);
        }

        if (this.invincible > 0 && this.state === 'hitstun') {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(this.x - cfg.w / 2, this.y - cfg.h, cfg.w, cfg.h);
        }
    }
}

// ═════════════════════════════════════════════════════════════════════════════
//  GAME CLASS
// ═════════════════════════════════════════════════════════════════════════════

const P1_KEYS = { left: 'a', right: 'd', up: 'w', down: 's', atk: 'z', spc: 'x' };
const P2_KEYS = { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', down: 'ArrowDown', atk: 'k', spc: 'l' };

class Game {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.state = 'title';
        this.p1CharIdx = 0;
        this.p2CharIdx = 1;
        this.p1Cursor = 0;
        this.p2Cursor = 1;
        this.p2Mode = 'p2';
        this.winner = null;
        this.vsTimer = 0;
        this.p1f = null;
        this.p2f = null;
        this.keysPressed = {};
        this.justPressed = new Set();
        this.starData = Array.from({ length: 80 }, () => [
            Math.random() * GW,
            Math.random() * GH,
            Math.random() * 2 + 0.5
        ]);
    }

    handleInput() {
        this.justPressed.clear();
    }

    drawTitle() {
        // Background gradient
        for (let i = 0; i < GH; i++) {
            const t = i / GH;
            const r = Math.floor(10 + t * 20);
            const g = Math.floor(10 + t * 10);
            const b = Math.floor(26 + t * 40);
            this.ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            this.ctx.fillRect(0, i, GW, 1);
        }

        // Stars
        this.starData.forEach(([sx, sy, sz]) => {
            const r = Math.max(1, Math.floor(sz));
            const a = Math.min(255, Math.floor(sz * 80));
            this.ctx.fillStyle = `rgba(255, 255, 255, ${a / 255})`;
            this.ctx.beginPath();
            this.ctx.arc(sx, sy, r, 0, Math.PI * 2);
            this.ctx.fill();
        });

        // Title
        this.drawText('SUPER SMASH BROS', GW / 2, 140, 'rgb(255, 230, 30)', 52, 'center', true);
        this.drawText('N64  EDITION', GW / 2, 195, 'rgb(220, 50, 50)', 32, 'center');
        this.drawText('18 FIGHTERS — ORIGINAL + NEW CHALLENGERS', GW / 2, 240, 'rgb(170, 170, 170)', 13, 'center');

        // Character showcase
        const showcase = [0, 7, 9, 12, 13, 14];
        showcase.forEach((ci, i) => {
            const bx = 70 + i * 128;
            const by = 360;
            drawCharacter(this.ctx, CHARS[ci], bx, by, i % 2 === 0 ? 1 : -1, frameCount / 6, false, 'walk', 0.9);
            this.drawText(CHARS[ci].name.toUpperCase(), bx, by + 10, `rgb(${CHARS[ci].c1.slice(1).match(/.{2}/g).map(x => parseInt(x, 16)).join(',')})`, 10, 'center');
        });

        if (Math.floor(frameCount / 24) % 2 === 0) {
            this.drawText('PRESS ANY KEY TO START', GW / 2, GH - 60, 'rgb(255, 230, 30)', 20, 'center');
        }
        this.drawText('P1: WASD + Z(atk) + X(spc)    P2: ARROWS + K(atk) + L(spc)', GW / 2, GH - 28, 'rgb(80, 80, 80)', 10, 'center');
    }

    drawCharSelect() {
        for (let i = 0; i < GH; i++) {
            const t = i / GH;
            const r = Math.floor(10 + t * 20);
            const g = Math.floor(10 + t * 10);
            const b = Math.floor(26 + t * 40);
            this.ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            this.ctx.fillRect(0, i, GW, 1);
        }

        this.drawText('SELECT YOUR FIGHTER', GW / 2, 42, 'rgb(255, 230, 30)', 32, 'center');
        this.drawText('P1: WASD+Z pick    P2: Arrows+K pick    E: toggle CPU    Enter: fight', GW / 2, 66, 'rgb(140, 140, 140)', 10, 'center');

        const CS_COLS = 6, CS_ROWS = 3, CS_CW = 144, CS_CH = 92, CS_OX = 12, CS_OY = 88;

        CHARS.forEach((ch, i) => {
            const col = i % CS_COLS;
            const row = Math.floor(i / CS_COLS);
            const cx = CS_OX + col * CS_CW;
            const cy = CS_OY + row * CS_CH;
            const isP1 = i === this.p1Cursor;
            const isP2 = i === this.p2Cursor;

            const c1 = rgb(ch.c1);
            this.ctx.fillStyle = `rgba(${c1[0]}, ${c1[1]}, ${c1[2]}, 0.12)`;
            this.ctx.fillRect(cx, cy, CS_CW - 4, CS_CH - 4);

            const bc = (isP1 && isP2) ? 'rgb(255, 87, 34)' : isP1 ? 'rgb(255, 87, 34)' : isP2 ? 'rgb(21, 101, 192)' : 'rgb(50, 50, 50)';
            const lw = (isP1 || isP2) ? 3 : 1;
            this.ctx.strokeStyle = bc;
            this.ctx.lineWidth = lw;
            this.ctx.strokeRect(cx, cy, CS_CW - 4, CS_CH - 4);

            drawCharacter(this.ctx, ch, cx + 22, cy + CS_CH - 8, 1, 0, false, 'idle', 0.42);

            this.drawText(ch.name.toUpperCase(), cx + 44, cy + 14, 'rgb(255, 255, 255)', 10);
            this.drawText(ch.desc.slice(0, 18), cx + 44, cy + 26, 'rgb(140, 140, 140)', 10);

            this.ctx.fillStyle = 'rgb(40, 40, 40)';
            this.ctx.fillRect(cx + 44, cy + 36, 80, 4);
            this.ctx.fillStyle = 'rgb(41, 182, 246)';
            this.ctx.fillRect(cx + 44, cy + 36, Math.floor(ch.speed / 7 * 80), 4);
            this.drawText('SPD', cx + 44, cy + 48, 'rgb(80, 80, 80)', 10);

            this.ctx.fillStyle = 'rgb(40, 40, 40)';
            this.ctx.fillRect(cx + 44, cy + 52, 80, 4);
            this.ctx.fillStyle = 'rgb(239, 83, 80)';
            this.ctx.fillRect(cx + 44, cy + 52, Math.floor(ch.weight / 160 * 80), 4);
            this.drawText('WT', cx + 44, cy + 64, 'rgb(80, 80, 80)', 10);

            if (isP1) this.drawText('P1', cx + 3, cy + 10, 'rgb(255, 87, 34)', 10);
            if (isP2) this.drawText(this.p2Mode === 'cpu' ? 'CPU' : 'P2', cx + (isP1 ? 16 : 3), cy + 10, 'rgb(21, 101, 192)', 10);
        });

        const p1c = CHARS[this.p1CharIdx];
        const p2c = CHARS[this.p2CharIdx];

        this.ctx.fillStyle = `rgba(${rgb(p1c.c1)[0]}, ${rgb(p1c.c1)[1]}, ${rgb(p1c.c1)[2]}, 0.08)`;
        this.ctx.fillRect(4, ARENA_H - 92, 160, 92);
        this.ctx.strokeStyle = 'rgb(255, 87, 34)';
        this.ctx.lineWidth = 2;
        this.ctx.strokeRect(4, ARENA_H - 92, 160, 92);
        drawCharacter(this.ctx, p1c, 50, ARENA_H - 10, 1, frameCount / 8, false, 'idle', 1.0);
        this.drawText('P1: ' + p1c.name, 10, ARENA_H - 96, 'rgb(255, 87, 34)', 10);

        this.ctx.fillStyle = `rgba(${rgb(p2c.c1)[0]}, ${rgb(p2c.c1)[1]}, ${rgb(p2c.c1)[2]}, 0.08)`;
        this.ctx.fillRect(GW - 164, ARENA_H - 92, 160, 92);
        this.ctx.strokeStyle = 'rgb(21, 101, 192)';
        this.ctx.lineWidth = 2;
        this.ctx.strokeRect(GW - 164, ARENA_H - 92, 160, 92);
        drawCharacter(this.ctx, p2c, GW - 114, ARENA_H - 10, -1, frameCount / 8, false, 'idle', 1.0);
        this.drawText((this.p2Mode === 'cpu' ? 'CPU: ' : 'P2: ') + p2c.name, GW - 162, ARENA_H - 96, 'rgb(21, 101, 192)', 10);

        this.drawText('Press ENTER to start!', GW / 2, GH - 16, 'rgb(255, 230, 30)', 20, 'center');
    }

    handleCharSelect() {
        if (this.keysPressed['a']) { this.p1Cursor = Math.max(0, this.p1Cursor - 1); SND_MENU(); }
        if (this.keysPressed['d']) { this.p1Cursor = Math.min(CHARS.length - 1, this.p1Cursor + 1); SND_MENU(); }
        if (this.keysPressed['w']) { this.p1Cursor = Math.max(0, this.p1Cursor - 6); SND_MENU(); }
        if (this.keysPressed['s']) { this.p1Cursor = Math.min(CHARS.length - 1, this.p1Cursor + 6); SND_MENU(); }
        if (this.keysPressed['z']) { this.p1CharIdx = this.p1Cursor; SND_MENU(); }

        if (this.keysPressed['ArrowLeft']) { this.p2Cursor = Math.max(0, this.p2Cursor - 1); SND_MENU(); }
        if (this.keysPressed['ArrowRight']) { this.p2Cursor = Math.min(CHARS.length - 1, this.p2Cursor + 1); SND_MENU(); }
        if (this.keysPressed['ArrowUp']) { this.p2Cursor = Math.max(0, this.p2Cursor - 6); SND_MENU(); }
        if (this.keysPressed['ArrowDown']) { this.p2Cursor = Math.min(CHARS.length - 1, this.p2Cursor + 6); SND_MENU(); }
        if (this.keysPressed['k']) { this.p2CharIdx = this.p2Cursor; SND_MENU(); }

        if (this.justPressed.has('e')) {
            this.p2Mode = this.p2Mode === 'p2' ? 'cpu' : 'p2';
            SND_MENU();
        }
        if (this.justPressed.has('Enter')) {
            this.p1CharIdx = this.p1Cursor;
            this.p2CharIdx = this.p2Cursor;
            this.vsTimer = 0;
            this.state = 'vs';
        }
    }

    drawVs() {
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0, 0, GW, GH);

        const c1 = rgb(CHARS[this.p1CharIdx].c1);
        const c2 = rgb(CHARS[this.p2CharIdx].c1);

        this.ctx.fillStyle = `rgba(${c1[0]}, ${c1[1]}, ${c1[2]}, 0.3)`;
        this.ctx.fillRect(0, 0, GW / 2, GH);
        this.ctx.fillStyle = `rgba(${c2[0]}, ${c2[1]}, ${c2[2]}, 0.3)`;
        this.ctx.fillRect(GW / 2, 0, GW / 2, GH);

        drawCharacter(this.ctx, CHARS[this.p1CharIdx], GW / 4, GH / 2 + 60, 1, 0, false, 'idle', 2.2);
        drawCharacter(this.ctx, CHARS[this.p2CharIdx], (GW * 3) / 4, GH / 2 + 60, -1, 0, false, 'idle', 2.2);

        this.drawText('P1', GW / 4, 70, 'rgb(255, 255, 255)', 32, 'center');
        this.drawText(CHARS[this.p1CharIdx].name, GW / 4, 108, `rgb(${c1.join(',')})`, 32, 'center');
        this.drawText(this.p2Mode === 'cpu' ? 'CPU' : 'P2', (GW * 3) / 4, 70, 'rgb(255, 255, 255)', 32, 'center');
        this.drawText(CHARS[this.p2CharIdx].name, (GW * 3) / 4, 108, `rgb(${c2.join(',')})`, 32, 'center');

        this.drawText('VS', GW / 2, GH / 2 + 20, 'rgb(255, 230, 30)', 52, 'center', true);

        const cnt = Math.max(0, 3 - Math.floor(this.vsTimer / 40));
        if (cnt > 0) {
            this.drawText(String(cnt), GW / 2, GH - 90, 'rgb(255, 255, 255)', 52, 'center');
        } else {
            this.drawText('FIGHT!', GW / 2, GH - 90, 'rgb(220, 50, 50)', 52, 'center', true);
        }
    }

    drawStage() {
        for (let i = 0; i < ARENA_H; i++) {
            const t = i / ARENA_H;
            const r = Math.floor(20 + t * 10);
            const g = Math.floor(20 + t * 20);
            const b = Math.floor(60 + t * 60);
            this.ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            this.ctx.fillRect(0, i, GW, 1);
        }

        for (let i = 0; i < 5; i++) {
            const cx = (i * 193 + frameCount / 3) % 1000 - 50;
            const cy = 40 + i * 35;
            this.ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            this.ctx.beginPath();
            this.ctx.ellipse(cx + 40, cy + 15, 40, 15, 0, 0, Math.PI * 2);
            this.ctx.fill();
        }

        STAGE.plats.forEach(plat => {
            const { x, y, w, h, main } = plat;
            if (main) {
                this.ctx.fillStyle = 'rgb(60, 140, 60)';
                this.ctx.fillRect(x, y, w, h);
                this.ctx.fillStyle = 'rgb(80, 180, 80)';
                this.ctx.fillRect(x, y, w, 6);
                this.ctx.strokeStyle = 'rgb(40, 100, 40)';
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(x, y, w, h);
            } else {
                this.ctx.fillStyle = 'rgb(120, 80, 40)';
                this.ctx.fillRect(x, y, w, h);
                this.ctx.fillStyle = 'rgb(160, 110, 60)';
                this.ctx.fillRect(x, y, w, 5);
                this.ctx.strokeStyle = 'rgb(80, 50, 20)';
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(x, y, w, h);
            }
        });
    }

    drawHUD() {
        this.ctx.fillStyle = 'rgb(15, 15, 15)';
        this.ctx.fillRect(0, ARENA_H, GW, GH - ARENA_H);
        this.ctx.strokeStyle = 'rgb(60, 60, 60)';
        this.ctx.lineWidth = 2;
        this.ctx.beginPath();
        this.ctx.moveTo(0, ARENA_H);
        this.ctx.lineTo(GW, ARENA_H);
        this.ctx.stroke();

        this.drawPlayerHUD(this.p1f, 30, ARENA_H + 10, 'P1');
        this.drawPlayerHUD(this.p2f, GW - 30 - 180, ARENA_H + 10, this.p2Mode === 'cpu' ? 'CPU' : 'P2');
    }

    drawPlayerHUD(f, x, y, label) {
        if (!f) return;
        const c = rgb(f.cfg.c1);
        drawCharacter(this.ctx, f.cfg, x + 30, y + 60, 1, 0, false, 'idle', 0.7);
        this.drawText(label, x + 70, y + 6, 'rgb(150, 150, 150)', 10);
        this.drawText(f.cfg.name, x + 70, y + 18, `rgb(${c.join(',')})`, 20);
        const pct = Math.min(999, Math.floor(f.damage));
        const col = pct < 50 ? 'rgb(50, 200, 50)' : pct < 120 ? 'rgb(230, 180, 30)' : 'rgb(230, 50, 30)';
        this.drawText(pct + '%', x + 70, y + 35, col, 32);
        for (let i = 0; i < f.stocks; i++) {
            this.ctx.fillStyle = `rgb(${c.join(',')})`;
            this.ctx.beginPath();
            this.ctx.arc(x + 70 + i * 16, y + 66, 5, 0, Math.PI * 2);
            this.ctx.fill();
            this.ctx.strokeStyle = '#000';
            this.ctx.lineWidth = 1;
            this.ctx.stroke();
        }
    }

    drawResults() {
        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.78)';
        this.ctx.fillRect(0, 0, GW, GH);
        this.drawText('GAME  SET!', GW / 2, 80, 'rgb(255, 230, 30)', 52, 'center', true);

        if (this.winner) {
            drawCharacter(this.ctx, this.winner.cfg, GW / 2, GH / 2 + 20, 1, frameCount / 8, false, 'idle', 2.5);
            const wc = rgb(this.winner.cfg.c1);
            this.drawText(this.winner.cfg.name + ' WINS!', GW / 2, GH / 2 + 140, `rgb(${wc.join(',')})`, 32, 'center');
            const wlabel = this.winner.playerNum === 1 ? 'P1' : (this.p2Mode === 'cpu' ? 'CPU' : 'P2');
            this.drawText('(' + wlabel + ')', GW / 2, GH / 2 + 168, 'rgb(150, 150, 150)', 20, 'center');
        }

        if (Math.floor(frameCount / 24) % 2 === 0) {
            this.drawText('ENTER: play again    ESC: char select', GW / 2, GH - 30, 'rgb(200, 200, 200)', 20, 'center');
        }
    }

    drawText(text, x, y, color, size = 20, align = 'left', shadow = false) {
        this.ctx.font = `bold ${size}px Courier`;
        this.ctx.fillStyle = color;
        this.ctx.textAlign = align;
        this.ctx.textBaseline = 'top';
        if (shadow) {
            this.ctx.fillStyle = '#000';
            this.ctx.fillText(text, x + 2, y + 2);
            this.ctx.fillStyle = color;
        }
        this.ctx.fillText(text, x, y);
    }

    startFight() {
        particles = [];
        projectiles = [];
        screenShake = 0;
        this.p1f = new Fighter(this.p1CharIdx, STAGE.spawn_p1, 1);
        this.p2f = new Fighter(this.p2CharIdx, STAGE.spawn_p2, 2);
        this.winner = null;
        this.state = 'fight';
    }

    checkWinner() {
        const p1d = this.p1f.stocks <= 0 && this.p1f.state === 'dead' && this.p1f.stateTimer <= 0;
        const p2d = this.p2f.stocks <= 0 && this.p2f.state === 'dead' && this.p2f.stateTimer <= 0;

        if (p1d && !p2d) {
            this.winner = this.p2f;
            this.state = 'results';
        } else if (p2d && !p1d) {
            this.winner = this.p1f;
            this.state = 'results';
        } else if (p1d && p2d) {
            this.winner = this.p1f.damage < this.p2f.damage ? this.p1f : this.p2f;
            this.state = 'results';
        }
    }

    updateFight() {
        const p1Inp = this.getPlayerInput(1);
        this.p1f.update(this.p2f, p1Inp);

        if (this.p2Mode === 'cpu') {
            const cpuInp = this.p2f.getCpuInput(this.p1f);
            this.p2f.update(this.p1f, cpuInp);
        } else {
            const p2Inp = this.getPlayerInput(2);
            this.p2f.update(this.p1f, p2Inp);
        }

        projectiles.forEach(p => p.update(this.p1f, this.p2f));
        projectiles = projectiles.filter(p => p.active);

        updateParticles();

        if (screenShake > 0) screenShake = Math.max(0, screenShake - 0.5);

        this.checkWinner();
    }

    getPlayerInput(playerNum) {
        const keyMap = playerNum === 1 ? P1_KEYS : P2_KEYS;
        const fighter = playerNum === 1 ? this.p1f : this.p2f;
        return {
            left: this.keysPressed[keyMap.left],
            right: this.keysPressed[keyMap.right],
            up: this.keysPressed[keyMap.up],
            down: this.keysPressed[keyMap.down],
            jump: this.keysPressed[keyMap.up],
            atk: this.keysPressed[keyMap.atk],
            spc: this.keysPressed[keyMap.spc],
            prevJump: fighter.prevJump,
            prevAtk: fighter.prevAtk,
            prevSpc: fighter.prevSpc
        };
    }

    drawFight() {
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0, 0, GW, GH);

        let sx = 0, sy = 0;
        if (screenShake > 0) {
            sx = (Math.random() - 0.5) * screenShake * 2;
            sy = (Math.random() - 0.5) * screenShake * 2;
        }

        if (sx !== 0 || sy !== 0) {
            this.ctx.save();
            this.ctx.translate(sx, sy);
        }

        this.drawStage();
        projectiles.forEach(p => p.draw(this.ctx));
        this.p1f.draw(this.ctx);
        this.p2f.draw(this.ctx);
        drawParticles(this.ctx);

        if (sx !== 0 || sy !== 0) {
            this.ctx.restore();
        }

        this.drawHUD();
    }

    run() {
        const gameLoop = () => {
            this.handleInput();

            // Handle key events from this frame
            const keysToProcess = Array.from(this.justPressed);
            keysToProcess.forEach(key => {
                if (this.state === 'results') {
                    if (key === 'Enter') {
                        this.state = 'charselect';
                        this.justPressed.delete(key);
                    } else if (key === 'Escape') {
                        this.state = 'charselect';
                        this.justPressed.delete(key);
                    }
                }
            });

            if (this.state === 'title') {
                this.drawTitle();
                if (this.justPressed.size > 0) {
                    this.state = 'charselect';
                }
            } else if (this.state === 'charselect') {
                this.handleCharSelect();
                this.drawCharSelect();
            } else if (this.state === 'vs') {
                this.vsTimer++;
                this.drawVs();
                if (this.vsTimer >= 150) {
                    this.startFight();
                }
            } else if (this.state === 'fight') {
                this.updateFight();
                this.drawFight();
            } else if (this.state === 'results') {
                this.drawStage();
                if (this.p1f) this.p1f.draw(this.ctx);
                if (this.p2f) this.p2f.draw(this.ctx);
                this.drawResults();
            }

            frameCount++;
            requestAnimationFrame(gameLoop);
        };

        gameLoop();
    }
}

// ═════════════════════════════════════════════════════════════════════════════
//  INPUT HANDLING
// ═════════════════════════════════════════════════════════════════════════════

const canvas = document.getElementById('game');
const game = new Game(canvas);

const getKeyName = (code) => {
    const map = {
        'KeyA': 'a', 'KeyD': 'd', 'KeyW': 'w', 'KeyS': 's',
        'KeyZ': 'z', 'KeyX': 'x', 'KeyE': 'e',
        'KeyK': 'k', 'KeyL': 'l',
        'ArrowLeft': 'ArrowLeft', 'ArrowRight': 'ArrowRight', 'ArrowUp': 'ArrowUp', 'ArrowDown': 'ArrowDown',
        'Enter': 'Enter', 'Escape': 'Escape'
    };
    return map[code] || code.toLowerCase();
};

window.addEventListener('keydown', (e) => {
    const key = getKeyName(e.code);
    game.keysPressed[key] = true;
    game.justPressed.add(key);
});

window.addEventListener('keyup', (e) => {
    const key = getKeyName(e.code);
    game.keysPressed[key] = false;
});

game.run();
</script>
