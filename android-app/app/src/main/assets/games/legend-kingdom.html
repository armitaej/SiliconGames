        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, duration, type = 'sine') {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = frequency;
            osc.type = type;
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + duration);
        }

        function playAttackSound() { playSound(440, 0.1, 'square'); }
        function playHitSound() { playSound(220, 0.15, 'square'); }
        function playDamageSound() { playSound(100, 0.2, 'sine'); }
        function playItemSound() { playSound(880, 0.1, 'sine'); }

        // ============================================================================
        // TILE PARSING & ROOM MANAGEMENT
        // ============================================================================
        function getCurrentRoomData() {
            if (gameState.currentDungeon === -1) {
                return DUNGEONS.OVERWORLD;
            } else if (gameState.currentDungeon === 0) {
                return DUNGEONS.FOREST_TEMPLE.rooms[gameState.currentRoom];
            } else if (gameState.currentDungeon === 1) {
                return DUNGEONS.SHADOW_CAVERN.rooms[gameState.currentRoom];
            } else if (gameState.currentDungeon === 2) {
                return DUNGEONS.DRAGON_KEEP.rooms[gameState.currentRoom];
            }
            return null;
        }

        function loadRoom() {
            enemies = [];
            items = [];
            projectiles = [];
            const roomData = getCurrentRoomData();
            if (!roomData) return;

            for (let y = 0; y < roomData.map.length; y++) {
                for (let x = 0; x < roomData.map[y].length; x++) {
                    const tile = roomData.map[y][x];
                    const centerX = x * TILE_SIZE + TILE_SIZE / 2;
                    const centerY = y * TILE_SIZE + TILE_SIZE / 2;

                    if (tile === TILE_TYPES.ENEMY_SPAWN) {
                        const enemyType = Math.random() > 0.5 ? 'slime' : 'skeleton';
                        if (gameState.currentDungeon === 1) {
                            const t = Math.random();
                            if (t > 0.6) enemies.push(createEnemy('bat', centerX, centerY));
                            else if (t > 0.3) enemies.push(createEnemy('darkKnight', centerX, centerY));
                            else enemies.push(createEnemy('skeleton', centerX, centerY));
                        } else if (gameState.currentDungeon === 2) {
                            const t = Math.random();
                            if (t > 0.5) enemies.push(createEnemy('darkKnight', centerX, centerY));
                            else enemies.push(createEnemy('skeleton', centerX, centerY));
                        } else {
                            enemies.push(createEnemy(enemyType, centerX, centerY));
                        }
                    } else if (tile === TILE_TYPES.BOSS_SPAWN) {
                        const bossType = gameState.currentDungeon === 0 ? 'treant' : gameState.currentDungeon === 1 ? 'shadowLord' : 'dragon';
                        enemies.push(createBoss(bossType, centerX, centerY));
                    } else if (tile === TILE_TYPES.ITEM_SPAWN) {
                        const itemType = Math.random() > 0.7 ? 'heart' : 'coin';
                        items.push({ x: centerX, y: centerY, type: itemType, radius: 8 });
                    } else if (tile === TILE_TYPES.CHEST) {
                        let chestItemType = 'heart';
                        let chestItemValue = null;
                        if (gameState.currentDungeon === 0 && gameState.currentRoom === 1) {
                            chestItemType = 'speedBoots';
                        } else if (gameState.currentDungeon === 0 && gameState.currentRoom === 2) {
                            chestItemType = 'arrows';
                            chestItemValue = 5;
                        } else if (gameState.currentDungeon === 1 && gameState.currentRoom === 0) {
                            chestItemType = 'defenseRing';
                        } else if (gameState.currentDungeon === 1 && gameState.currentRoom === 2) {
                            chestItemType = 'bombs';
                            chestItemValue = 5;
                        } else if (gameState.currentDungeon === 2 && gameState.currentRoom === 0) {
                            chestItemType = 'attackAmulet';
                        } else if (gameState.currentDungeon === 2 && gameState.currentRoom === 2) {
                            chestItemType = 'arrows';
                            chestItemValue = 5;
                        }
                        items.push({ x: centerX, y: centerY, type: 'chest', chestItem: chestItemType, chestValue: chestItemValue, radius: 8 });
                    }
                }
            }
        }

        function isWall(x, y) {
            const roomData = getCurrentRoomData();
            if (!roomData) return true;
            const tileX = Math.floor(x / TILE_SIZE);
            const tileY = Math.floor(y / TILE_SIZE);
            if (tileX < 0 || tileX >= roomData.map[0].length || tileY < 0 || tileY >= roomData.map.length) return true;
            return roomData.map[tileY][tileX] === TILE_TYPES.WALL;
        }

        function isDoor(x, y) {
            const roomData = getCurrentRoomData();
            if (!roomData) return null;
            const tileX = Math.floor(x / TILE_SIZE);
            const tileY = Math.floor(y / TILE_SIZE);
            if (tileX < 0 || tileX >= roomData.map[0].length || tileY < 0 || tileY >= roomData.map.length) return null;
            if (roomData.map[tileY][tileX] === TILE_TYPES.DOOR) {
                if (roomData.doors) {
                    return roomData.doors.find(d => d.tileX === tileX && d.tileY === tileY);
                }
            }
            return null;
        }

        function createEnemy(type, x, y) {
            const enemies_config = {
                slime: { width: 20, height: 20, hp: 20, speed: 1.5, damage: 10, color: '#88dd00', detectionRange: 150, attackRange: 25, attackCooldown: 60 },
                skeleton: { width: 22, height: 22, hp: 35, speed: 2, damage: 15, color: '#aaa', detectionRange: 160, attackRange: 25, attackCooldown: 50 },
                bat: { width: 18, height: 18, hp: 15, speed: 2.5, damage: 12, color: '#cc00ff', detectionRange: 180, attackRange: 20, attackCooldown: 40 },
                darkKnight: { width: 24, height: 24, hp: 50, speed: 2, damage: 20, color: '#003366', detectionRange: 170, attackRange: 25, attackCooldown: 70 }
            };
            const config = enemies_config[type];
            return {
                x, y,
                ...config,
                type,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                maxHp: config.hp,
                attackTimer: 0,
                wanderTimer: 0,
                chasing: false,
                flashTimer: 0,
                stunTimer: 0
            };
        }

            const boss_config = {
                treant: { width: 40, height: 40, hp: 150, speed: 1, damage: 25, color: '#00aa00', detectionRange: 300, attackRange: 40, attackCooldown: 80, moveTimer: 0, pauseTimer: 0 },

            const config = boss_config[type];
            return {
                x, y,
                ...config,
                type,
                maxHp: config.hp,
                attackTimer: 0,
                flashTimer: 0,
                isBoss: true
            };

                } else if (sx > CANVAS_WIDTH * 0.75 && sy > CANVAS_HEIGHT * 0.6) {
                    if (sy < CANVAS_HEIGHT * 0.8) touchAttack = true;
                    else touchShield = true;
                } else if (sx > CANVAS_WIDTH * 0.7 && sx < CANVAS_WIDTH * 0.85 && sy > CANVAS_HEIGHT * 0.65 && sy < CANVAS_HEIGHT * 0.8) {
                    touchCycle = true;
                } else if (sx > CANVAS_WIDTH * 0.7 && sx < CANVAS_WIDTH * 0.85 && sy > CANVAS_HEIGHT * 0.8 && sy < CANVAS_HEIGHT * 0.95) {
                    touchUse = true;
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                const rect = canvas.getBoundingClientRect();
                const sx = (t.clientX - rect.left) / rect.width * CANVAS_WIDTH;
                const sy = (t.clientY - rect.top) / rect.height * CANVAS_HEIGHT;
                if (touchDpad.active && sx < CANVAS_WIDTH * 0.5) {
                    touchDpad.dx = sx - touchDpad.cx;
                    touchDpad.dy = sy - touchDpad.cy;
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            touchDpad.active = false; touchDpad.dx = 0; touchDpad.dy = 0;
            touchAttack = false; touchShield = false;
            if (touchCycle) {
                keys['KeyC'] = true;
                touchCycle = false;
            }
            if (touchUse) {
                keys['KeyV'] = true;
                touchUse = false;
            }
        }, { passive: false });

        // ============================================================================
        // UPDATE FUNCTIONS
        // ============================================================================
        function updatePlayer() {
            if (gameState.transitioning) return;

            let dx = 0, dy = 0;

            if (keys['ArrowUp'] || keys['KeyW']) { dy -= player.speed; player.facing = 'up'; }
            if (keys['ArrowDown'] || keys['KeyS']) { dy += player.speed; player.facing = 'down'; }
            if (keys['ArrowLeft'] || keys['KeyA']) { dx -= player.speed; player.facing = 'left'; }
            if (keys['ArrowRight'] || keys['KeyD']) { dx += player.speed; player.facing = 'right'; }
            // Touch d-pad
            if (touchDpad.active) {
                const deadzone = 15;
                if (Math.abs(touchDpad.dx) > deadzone || Math.abs(touchDpad.dy) > deadzone) {
                    const len = Math.hypot(touchDpad.dx, touchDpad.dy);
                    dx += (touchDpad.dx / len) * player.speed;
                    dy += (touchDpad.dy / len) * player.speed;
                    if (Math.abs(touchDpad.dx) > Math.abs(touchDpad.dy)) player.facing = touchDpad.dx > 0 ? 'right' : 'left';
                    else player.facing = touchDpad.dy > 0 ? 'down' : 'up';
                }
            }

            player.x += dx;
            player.y += dy;

            if (isWall(player.x, player.y)) {
                player.x -= dx;
                player.y -= dy;
            }

            const doorTile = isDoor(player.x, player.y);
            if (doorTile) {
                transitionRoom(doorTile);
            }

            if ((keys['KeyZ'] || touchAttack) && player.attackCooldown <= 0) {
                performAttack();
                player.attackCooldown = 24;
            }

            player.shieldActive = keys['KeyX'] || touchShield;

            // Cycle through inventory items with C key
            if (keys['KeyC']) {
                keys['KeyC'] = false;
                const inventoryItems = ['bow', 'boomerang', 'speedBoots', 'defenseRing', 'attackAmulet', 'bombs', 'arrows'];
                let currentIndex = player.selectedItem ? inventoryItems.indexOf(player.selectedItem) : -1;
                let found = false;
                for (let i = 0; i < inventoryItems.length; i++) {
                    const nextIdx = (currentIndex + 1 + i) % inventoryItems.length;
                    const item = inventoryItems[nextIdx];
                    if (player.inventory[item] === true || player.inventory[item] > 0) {
                        player.selectedItem = item;
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    player.selectedItem = null;
                }
            }

            // Use selected item with V key
            if (keys['KeyV'] && player.selectedItem) {
                keys['KeyV'] = false;
                const item = player.selectedItem;
                if (item === 'bow' && player.inventory.arrows > 0) {
                    let vx = 0, vy = 0;
                    if (player.facing === 'right') vx = 6;
                    else if (player.facing === 'left') vx = -6;
                    else if (player.facing === 'up') vy = -6;
                    else if (player.facing === 'down') vy = 6;
                    projectiles.push({ x: player.x, y: player.y, vx, vy, type: 'arrow', damage: player.attackPower, life: 50 });
                    player.inventory.arrows--;
                    playAttackSound();
                } else if (item === 'boomerang' && player.attackCooldown <= 0) {
                    let vx = 0, vy = 0;
                    if (player.facing === 'right') vx = 6;
                    else if (player.facing === 'left') vx = -6;
                    else if (player.facing === 'up') vy = -6;
                    else if (player.facing === 'down') vy = 6;
                    projectiles.push({ x: player.x, y: player.y, vx, vy, type: 'boomerang', damage: 15, life: 60, maxDistance: 150, distance: 0, returning: false, startX: player.x, startY: player.y });
                    player.attackCooldown = 40;
                    playAttackSound();
                } else if (item === 'bombs' && player.inventory.bombs > 0 && player.attackCooldown <= 0) {
                    projectiles.push({ x: player.x, y: player.y, vx: 0, vy: 0, type: 'bomb', damage: 60, life: 45, explosionRadius: 64 });
                    player.inventory.bombs--;
                    player.attackCooldown = 20;
                    playAttackSound();
                }
            }

            // Magic Blast - unlocked at level 6, B key
            if ((keys['KeyB'] || touchMagic) && player.level >= 6 && player.magicCooldown <= 0) {
                let mvx = 0, mvy = 0;
                if (player.facing === 'up') mvy = -6;
                else if (player.facing === 'down') mvy = 6;
                else if (player.facing === 'left') mvx = -6;
                else if (player.facing === 'right') mvx = 6;
                projectiles.push({
                    x: player.x, y: player.y,
                    vx: mvx, vy: mvy,
                    type: 'magic',
                    damage: Math.floor(player.attackPower * 1.5),
                    life: 60,
                    owner: 'player'
                });
                player.magicCooldown = 45;
                playSound(380, 0.15, 'sawtooth');
                setTimeout(() => playSound(760, 0.1, 'sine'), 50);
                // Muzzle flash particles
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: player.x + mvx * 3, y: player.y + mvy * 3,
                        vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
                        text: '\u2727', life: 15
                    });
                }
            }
            if (player.magicCooldown > 0) player.magicCooldown--;

            player.attackCooldown--;
            if (player.invincible) {
                player.invincibilityTimer--;
                if (player.invincibilityTimer <= 0) {
                    player.invincible = false;
                }
            }

            // Check item collection
            items = items.filter(item => {
                const dist = Math.hypot(item.x - player.x, item.y - player.y);
                if (dist < 30) {
                    playItemSound();
                    if (item.type === 'heart') {
                        player.hp = Math.min(player.maxHp, player.hp + 30);
                        player.score += 5;
                    } else if (item.type === 'coin') {
                        player.coins++;
                        player.score += 10;
                    } else if (item.type === 'chest') {
                        const itemName = item.chestItem;
                        if (itemName === 'bow' || itemName === 'boomerang' || itemName === 'speedBoots' || itemName === 'defenseRing' || itemName === 'attackAmulet') {
                            if (itemName === 'speedBoots') {
                                player.speed += 1;
                            } else if (itemName === 'defenseRing') {
                                player.defense += 5;
                            } else if (itemName === 'attackAmulet') {
                                player.attackPower += 10;
                            } else {
                                player.inventory[itemName] = true;
                                if (itemName === 'bow') {
                                    player.inventory.arrows = 15;
                                }
                            }
                            player.score += 50;
                            particles.push({ x: item.x, y: item.y - 20, vx: 0, vy: -2, text: 'Item Found!', life: 60 });
                        } else if (itemName === 'bombs' || itemName === 'arrows') {
                            player.inventory[itemName] += (item.chestValue || 0);
                            player.score += 25;
                            particles.push({ x: item.x, y: item.y - 20, vx: 0, vy: -2, text: item.chestValue + ' ' + itemName, life: 60 });
                        }
                    }
                    return false;
                }
                return true;
            });
        }

        let levelUpFlash = 0;

        function levelUp() {
            player.level++;
            player.speed += 0.3;
            player.maxHp += 15;
            player.hp = player.maxHp;
            player.attackPower += 5;
            player.defense += 2;
            player.xp -= player.xpToNext;
            player.xpToNext += 50;

            // Big sound fanfare
            playSound(440, 0.15, 'sine');
            setTimeout(() => playSound(554, 0.15, 'sine'), 100);
            setTimeout(() => playSound(660, 0.15, 'sine'), 200);
            setTimeout(() => playSound(880, 0.3, 'sine'), 300);

            // Screen flash
            levelUpFlash = 40;

            // Big "LEVEL UP" text
            particles.push({ x: player.x, y: player.y - 50, vx: 0, vy: -1.5, text: '\u2605 LEVEL ' + player.level + ' \u2605', life: 120, big: true });
            // Stat change particles
            particles.push({ x: player.x - 40, y: player.y - 20, vx: -0.5, vy: -2, text: 'ATK +5', life: 80 });
            particles.push({ x: player.x + 40, y: player.y - 20, vx: 0.5, vy: -2, text: 'DEF +2', life: 80 });
            particles.push({ x: player.x, y: player.y - 10, vx: 0, vy: -2.5, text: 'HP +15', life: 80 });
            // Ring of sparkles
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                particles.push({ x: player.x, y: player.y, vx: Math.cos(angle) * 2, vy: Math.sin(angle) * 2, text: '\u2726', life: 40 });
            }

            // Level 6 unlock notification
            if (player.level === 6) {
                setTimeout(() => {
                    particles.push({ x: player.x, y: player.y - 70, vx: 0, vy: -1, text: '\u26A1 MAGIC BLAST UNLOCKED! (B key) \u26A1', life: 150, big: true });
                    playSound(523, 0.2, 'square');
                    setTimeout(() => playSound(784, 0.3, 'square'), 150);
                }, 500);
            }
        }

        function awardXp(amount) {
            player.xp += amount;
            particles.push({ x: player.x, y: player.y - 40, vx: 0, vy: -3, text: '+' + amount + 'XP', life: 60 });
            while (player.xp >= player.xpToNext) {
                levelUp();
            }
        }

        function performAttack() {
            playAttackSound();
            const range = 44;

            // Facing direction in radians (atan2 convention: right=0, down=PI/2, left=PI, up=-PI/2)
            let facingAngle = 0;
            if (player.facing === 'right') facingAngle = 0;
            else if (player.facing === 'down') facingAngle = Math.PI / 2;
            else if (player.facing === 'left') facingAngle = Math.PI;
            else if (player.facing === 'up') facingAngle = -Math.PI / 2;

            enemies.forEach(enemy => {
                const dx = enemy.x - player.x;
                const dy = enemy.y - player.y;
                const dist = Math.hypot(dx, dy);
                if (dist < range) {
                    // Angle from player to enemy
                    const angleToEnemy = Math.atan2(dy, dx);
                    // Angular difference (handles wrapping correctly)
                    let diff = angleToEnemy - facingAngle;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    // Hit if within 90 degree arc (45 degrees each side of facing)
                    if (Math.abs(diff) < Math.PI / 2) {
                        damageEnemy(enemy, player.attackPower);
                    }
                }
            });
        }

        function damageEnemy(enemy, damage) {
            playHitSound();
            enemy.hp -= damage;
            enemy.flashTimer = 8;
            particles.push({ x: enemy.x, y: enemy.y - 20, vx: 0, vy: -2, text: damage, life: 30 });

            if (enemy.hp <= 0) {
                const points = enemy.isBoss ? 500 : enemy.type === 'slime' ? 25 : enemy.type === 'skeleton' ? 50 : enemy.type === 'bat' ? 35 : 75;
                player.score += points;
                playBossSound();
                const itemType = Math.random() > 0.6 ? 'heart' : 'coin';
                items.push({ x: enemy.x, y: enemy.y, type: itemType, radius: 8 });

                // Award XP based on enemy type
                let xpReward = 10;
                if (enemy.isBoss) xpReward = 200;
                else if (enemy.type === 'slime') xpReward = 15;
                else if (enemy.type === 'skeleton') xpReward = 25;
                else if (enemy.type === 'bat') xpReward = 20;
                else if (enemy.type === 'darkKnight') xpReward = 40;
                awardXp(xpReward);

                if (enemy.isBoss) {
                    gameState.bossesDefeated.add(gameState.currentDungeon);
                    player.score += 1000; // dungeon clear bonus
                    particles.push({ x: enemy.x, y: enemy.y - 40, vx: 0, vy: -1, text: 'BOSS DEFEATED! +1000', life: 90 });

                    // Boss drops special items
                    if (enemy.type === 'treant') {
                        items.push({ x: enemy.x, y: enemy.y - 30, type: 'chest', chestItem: 'bow', chestValue: 15, radius: 8 });
                    } else if (enemy.type === 'shadowLord') {
                        items.push({ x: enemy.x, y: enemy.y - 30, type: 'chest', chestItem: 'boomerang', chestValue: null, radius: 8 });
                    } else if (enemy.type === 'dragon') {
                        items.push({ x: enemy.x, y: enemy.y - 30, type: 'chest', chestItem: 'bombs', chestValue: 5, radius: 8 });
                    }

                    if (gameState.bossesDefeated.size >= 3) {
                        gameState.screen = 'victory';
                        setTimeout(() => showHS(player.score), 1500);
                    }
                }
                enemies = enemies.filter(e => e !== enemy);
            }
        }

        function updateEnemies() {
            enemies.forEach(enemy => {
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.hypot(dx, dy);

                // Update stun timer
                if (enemy.stunTimer) {
                    enemy.stunTimer--;
                    if (enemy.stunTimer <= 0) {
                        enemy.vx = 0;
                        enemy.vy = 0;
                    }
                } else {
                    if (dist < enemy.detectionRange) {
                        enemy.chasing = true;
                        const speed = enemy.speed;
                        enemy.vx = (dx / dist) * speed;
                        enemy.vy = (dy / dist) * speed;
                    } else {
                        enemy.chasing = false;
                        enemy.wanderTimer--;
                        if (enemy.wanderTimer <= 0) {
                            enemy.vx = (Math.random() - 0.5) * enemy.speed;
                            enemy.vy = (Math.random() - 0.5) * enemy.speed;
                            enemy.wanderTimer = 60 + Math.random() * 60;
                        }
                    }
                }

                if (enemy.isBoss) {
                    if (enemy.type === 'shadowLord') {
                        enemy.teleportCooldown--;
                        if (enemy.teleportCooldown <= 0 && dist < enemy.detectionRange && Math.random() > 0.7) {
                            enemy.x = 100 + Math.random() * (CANVAS_WIDTH - 200);
                            enemy.y = 100 + Math.random() * (CANVAS_HEIGHT - 200);
                            enemy.teleportCooldown = 120;
                        }
                    }
                    if (enemy.type === 'dragon') {
                        enemy.breathTimer--;
                        if (enemy.breathTimer <= 0 && dist < enemy.detectionRange && Math.random() > 0.8) {
                            for (let i = 0; i < 3; i++) {
                                const angle = (Math.atan2(dy, dx) + (i - 1) * 0.3);
                                projectiles.push({
                                    x: enemy.x,
                                    y: enemy.y,
                                    vx: Math.cos(angle) * 4,
                                    vy: Math.sin(angle) * 4,
                                    damage: 20,
                                    type: 'fire'
                                });
                            }
                            enemy.breathTimer = 180;
                        }
                    }
                }

                enemy.x += enemy.vx;
                enemy.y += enemy.vy;

                if (isWall(enemy.x, enemy.y)) {
                    enemy.x -= enemy.vx;
                    enemy.y -= enemy.vy;
                    enemy.vx = (Math.random() - 0.5) * enemy.speed;
                    enemy.vy = (Math.random() - 0.5) * enemy.speed;
                }

                // Prevent enemy-player overlap: push enemy away
                const pdx = player.x - enemy.x;
                const pdy = player.y - enemy.y;
                const pdist = Math.hypot(pdx, pdy);
                const minDist = (player.width + (enemy.width || 16)) / 2 + 4;
                if (pdist < minDist && pdist > 0) {
                    const pushX = (pdx / pdist) * (minDist - pdist);
                    const pushY = (pdy / pdist) * (minDist - pdist);
                    enemy.x -= pushX;
                    enemy.y -= pushY;
                }
                if (pdist < enemy.attackRange) {
                    enemy.attackTimer--;
                    if (enemy.attackTimer <= 0) {
                        if (!player.shieldActive || player.shieldActive && Math.random() > 0.75) {
                            const damage = player.shieldActive ? Math.ceil(enemy.damage * 0.25) : enemy.damage;
                            player.hp -= damage;
                            playDamageSound();
                            player.invincible = true;
                            player.invincibilityTimer = 60;
                            particles.push({ x: player.x, y: player.y - 20, vx: 0, vy: -2, text: damage, life: 30 });
                        }
                        enemy.attackTimer = enemy.attackCooldown;
                    }
                }

                if (enemy.flashTimer > 0) enemy.flashTimer--;
            });
        }

        function updateProjectiles() {
            projectiles = projectiles.filter(proj => {
                // Handle bomb explosions
                if (proj.type === 'bomb') {
                    proj.life--;
                    if (proj.life <= 0) {
                        // Explode - damage all nearby enemies
                        enemies.forEach(enemy => {
                            const dist = Math.hypot(enemy.x - proj.x, enemy.y - proj.y);
                            if (dist < proj.explosionRadius) {
                                damageEnemy(enemy, proj.damage);
                            }
                        });
                        particles.push({ x: proj.x, y: proj.y, vx: 0, vy: 0, text: 'BOOM', life: 30 });
                        return false;
                    }
                    return true;
                }

                // Handle boomerang mechanics
                if (proj.type === 'boomerang') {
                    if (!proj.returning) {
                        proj.distance += Math.hypot(proj.vx, proj.vy);
                        if (proj.distance >= proj.maxDistance) {
                            proj.returning = true;
                        }
                    }
                    if (proj.returning) {
                        const angle = Math.atan2(player.y - proj.y, player.x - proj.x);
                        proj.vx = Math.cos(angle) * 6;
                        proj.vy = Math.sin(angle) * 6;
                        if (Math.hypot(player.x - proj.x, player.y - proj.y) < 25) {
                            return false;
                        }
                    } else {
                        proj.x += proj.vx;
                        proj.y += proj.vy;
                        // Check boomerang hits on enemies
                        enemies.forEach(enemy => {
                            const dist = Math.hypot(enemy.x - proj.x, enemy.y - proj.y);
                            if (dist < 20) {
                                damageEnemy(enemy, proj.damage);
                                enemy.stunTimer = 60;
                                proj.returning = true;
                            }
                        });
                    }
                    if (proj.x < 0 || proj.x > CANVAS_WIDTH || proj.y < 0 || proj.y > CANVAS_HEIGHT) {
                        return false;
                    }
                    return true;
                }

                // Handle arrows and other projectiles
                proj.x += proj.vx;
                proj.y += proj.vy;

                if (proj.life !== undefined) proj.life--;
                if (proj.life <= 0 && (proj.type === 'arrow' || proj.type === 'magic')) return false;

                if (proj.x < 0 || proj.x > CANVAS_WIDTH || proj.y < 0 || proj.y > CANVAS_HEIGHT) {
                    return false;
                }

                // Check hits on enemies (arrows and magic blasts)
                if (proj.type === 'arrow' || proj.type === 'magic') {
                    const hitRadius = proj.type === 'magic' ? 20 : 15;
                    enemies.forEach(enemy => {
                        const dist = Math.hypot(enemy.x - proj.x, enemy.y - proj.y);
                        if (dist < hitRadius) {
                            damageEnemy(enemy, proj.damage);
                            proj.life = 0;
                            if (proj.type === 'magic') {
                                // Magic explosion particles
                                for (let i = 0; i < 6; i++) {
                                    particles.push({
                                        x: proj.x, y: proj.y,
                                        vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3,
                                        text: '\u2726', life: 20
                                    });
                                }
                            }
                        }
                    });
                }

                // Damage player on projectile hit (fire from dragon, etc.)
                const pdx = player.x - proj.x;
                const pdy = player.y - proj.y;
                if (Math.hypot(pdx, pdy) < 25 && proj.type !== 'arrow' && proj.type !== 'boomerang' && proj.type !== 'magic') {
                    const baseDamage = proj.damage || 10;
                    const actualDamage = Math.max(1, baseDamage - player.defense);
                    player.hp -= actualDamage;
                    player.invincible = true;
                    player.invincibilityTimer = 60;
                    playDamageSound();
                    return false;
                }

                return true;
            });
        }

        function transitionRoom(doorData) {
            if (gameState.transitioning) return;
            gameState.transitioning = true;
            gameState.transitionProgress = 0;

            setTimeout(() => {
                if (doorData.targetDungeon === -1) {
                    gameState.currentDungeon = -1;
                    gameState.currentRoom = 0;
                    player.x = doorData.spawnX;
                    player.y = doorData.spawnY;
                } else {
                    gameState.currentDungeon = doorData.targetDungeon;
                    gameState.currentRoom = doorData.targetRoom;
                    player.x = doorData.spawnX;
                    player.y = doorData.spawnY;
                }
                gameState.exploredRooms.add(`${gameState.currentDungeon}-${gameState.currentRoom}`);
                loadRoom();
                gameState.transitionProgress = 0.5;
            }, 250);

            setTimeout(() => {
                gameState.transitioning = false;
            }, 500);
        }

        // ============================================================================
        // RENDERING
        // ============================================================================

        function drawTile(x, y, tileType) {
            const sx = x * TILE_SIZE;
            const sy = y * TILE_SIZE;

            if (tileType === TILE_TYPES.FLOOR) {
                if (gameState.currentDungeon === -1) {
                    ctx.fillStyle = '#2d5a1e';
                } else {
                    ctx.fillStyle = '#444';
                }
                ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
            } else if (tileType === TILE_TYPES.WALL) {
                if (gameState.currentDungeon === -1) {
                    ctx.fillStyle = '#0a3d0a';
                } else {
                    ctx.fillStyle = '#222';
                }
                ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
                if (gameState.currentDungeon !== -1) {
                    ctx.strokeStyle = '#111';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(sx, sy, TILE_SIZE, TILE_SIZE);
                }
            } else if (tileType === TILE_TYPES.DOOR) {
                if (gameState.currentDungeon === -1 && dungeonEntranceImg.complete && dungeonEntranceImg.naturalWidth > 0) {
                    // Draw grass background first, then dungeon entrance image on overworld
                    ctx.fillStyle = '#2d5a1e';
                    ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
                    ctx.drawImage(dungeonEntranceImg, sx, sy, TILE_SIZE, TILE_SIZE);
                } else {
                    ctx.fillStyle = '#886622';
                    ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
                    ctx.strokeStyle = '#ffdd00';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(sx + 2, sy + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                }
            } else if (tileType === TILE_TYPES.CHEST || tileType === TILE_TYPES.ENEMY_SPAWN || tileType === TILE_TYPES.ITEM_SPAWN || tileType === TILE_TYPES.BOSS_SPAWN) {
                // Spawn tiles and chest tiles render as floor
                if (gameState.currentDungeon === -1) {
                    ctx.fillStyle = '#2d5a1e';
                } else {
                    ctx.fillStyle = '#444';
                }
                ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
            }
        }

        function drawRoom() {
            const roomData = getCurrentRoomData();
            if (!roomData) return;

            for (let y = 0; y < roomData.map.length; y++) {
                for (let x = 0; x < roomData.map[y].length; x++) {
                    drawTile(x, y, roomData.map[y][x]);
                }
            }

            // Draw dungeon darkness overlay
            if (gameState.currentDungeon !== -1) {
                const grad = ctx.createRadialGradient(player.x, player.y, 80, player.x, player.y, 300);
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(1, 'rgba(0,0,0,0.7)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            }
        }

        function drawPlayer() {
            if (player.invincible && Math.floor(gameState.frameCount / 10) % 2) return;

            const isAttacking = player.attackCooldown > 12;
            const sprite = isAttacking ? spriteImgSword : spriteImgLook;
            const rot = FACING_ROTATION[player.facing] || 0;
            const spriteSize = 40;

            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(rot);
            if (sprite.complete && sprite.naturalWidth > 0) {
                ctx.drawImage(sprite, -spriteSize / 2, -spriteSize / 2, spriteSize, spriteSize);
            } else {
                // Fallback if sprites haven't loaded
                ctx.fillStyle = '#00cc00';
                ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
                ctx.fillStyle = '#fff';
                ctx.fillRect(-3, -8, 6, 6);
            }
            ctx.restore();

            if (player.shieldActive) {
                ctx.strokeStyle = '#00ccff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 20, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function drawEnemy(enemy) {
            ctx.fillStyle = enemy.flashTimer > 0 ? '#ffffff' : enemy.color;

            if (enemy.isBoss) {
                ctx.fillRect(enemy.x - enemy.width / 2, enemy.y - enemy.height / 2, enemy.width, enemy.height);
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 2;
                ctx.strokeRect(enemy.x - enemy.width / 2, enemy.y - enemy.height / 2, enemy.width, enemy.height);

                const hpBarWidth = enemy.width;
                const hpBarHeight = 4;
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(enemy.x - hpBarWidth / 2, enemy.y - enemy.height / 2 - 12, hpBarWidth, hpBarHeight);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(enemy.x - hpBarWidth / 2, enemy.y - enemy.height / 2 - 12, (enemy.hp / enemy.maxHp) * hpBarWidth, hpBarHeight);
            } else {
                if (enemy.type === 'slime') {
                    ctx.beginPath();
                    ctx.ellipse(enemy.x, enemy.y, enemy.width / 2, enemy.height / 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(enemy.x - enemy.width / 2, enemy.y - enemy.height / 2, enemy.width, enemy.height);
                }
            }
        }

        function drawItems() {
            items.forEach(item => {
                if (item.type === 'heart') {
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(item.x - 4, item.y - 4, 8, 8);
                } else if (item.type === 'coin') {
                    ctx.fillStyle = '#ffdd00';
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                } else if (item.type === 'chest') {
                    // Draw chest as a glowing treasure box
                    const bob = Math.sin(gameState.frameCount * 0.08) * 2;
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(item.x - 8, item.y - 6 + bob, 16, 12);
                    ctx.fillStyle = '#DAA520';
                    ctx.fillRect(item.x - 8, item.y - 6 + bob, 16, 3);
                    ctx.fillRect(item.x - 2, item.y - 6 + bob, 4, 12);
                    // Sparkle effect
                    ctx.fillStyle = `rgba(255,255,100,${0.5 + Math.sin(gameState.frameCount * 0.12) * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(item.x, item.y - 10 + bob, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawProjectiles() {
            projectiles.forEach(proj => {
                if (proj.type === 'magic') {
                    // Glowing blue-purple magic orb
                    const pulse = Math.sin(gameState.frameCount * 0.3) * 2;
                    ctx.fillStyle = '#7700ff';
                    ctx.beginPath();
                    ctx.arc(proj.x, proj.y, 7 + pulse, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#cc88ff';
                    ctx.beginPath();
                    ctx.arc(proj.x, proj.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(proj.x, proj.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (proj.type === 'arrow') {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(proj.x - 5, proj.y - 2, 10, 4);
                    ctx.fillStyle = '#ccc';
                    ctx.fillRect(proj.x + 3, proj.y - 3, 4, 6);
                } else if (proj.type === 'boomerang') {
                    ctx.fillStyle = '#00ccff';
                    ctx.save();
                    ctx.translate(proj.x, proj.y);
                    ctx.rotate(gameState.frameCount * 0.3);
                    ctx.fillRect(-6, -2, 12, 4);
                    ctx.fillRect(-2, -6, 4, 12);
                    ctx.restore();
                } else if (proj.type === 'bomb') {
                    const timeLeft = proj.life;
                    const flash = timeLeft < 15 && Math.floor(gameState.frameCount / 3) % 2;
                    ctx.fillStyle = flash ? '#ff0000' : '#333';
                    ctx.beginPath();
                    ctx.arc(proj.x, proj.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff8800';
                    ctx.fillRect(proj.x - 1, proj.y - 9, 2, 5);
                } else {
                    ctx.fillStyle = '#ff6600';
                    ctx.fillRect(proj.x - 4, proj.y - 4, 8, 8);
                }
            });
        }

        function drawParticles() {
            ctx.textAlign = 'center';
            particles = particles.filter(p => {
                p.x += (p.vx || 0);
                p.y += p.vy;
                p.life--;
                const alpha = Math.min(1, p.life / 30);
                if (p.big) {
                    ctx.fillStyle = `rgba(255,255,50,${alpha})`;
                    ctx.font = 'bold 20px Courier New';
                    ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
                    ctx.lineWidth = 3;
                    ctx.strokeText(p.text, p.x, p.y);
                    ctx.fillText(p.text, p.x, p.y);
                } else {
                    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                    ctx.font = 'bold 14px Arial';
                    ctx.fillText(p.text, p.x, p.y);
                }
                return p.life > 0;
            });
            ctx.textAlign = 'left';
        }

        function drawHUD() {
            ctx.fillStyle = '#0ff';
            ctx.font = 'bold 14px Courier New';
            ctx.textAlign = 'left';

            // Health bar
            ctx.fillStyle = '#333'; ctx.fillRect(10, 10, 150, 16);
            const hpPct = Math.max(0, player.hp) / player.maxHp;
            ctx.fillStyle = hpPct > 0.5 ? '#0a0' : hpPct > 0.25 ? '#f80' : '#f00';
            ctx.fillRect(10, 10, 150 * hpPct, 16);
            ctx.fillStyle = '#fff'; ctx.font = '11px Courier New';
            ctx.fillText(`HP: ${Math.max(0, player.hp)}/${player.maxHp}`, 14, 23);

            // Level and XP info
            ctx.fillText(`LVL: ${player.level}  XP: ${player.xp}/${player.xpToNext}`, 10, 38);

            // Selected item info
            let itemText = 'No Item';
            if (player.selectedItem) {
                const itemName = player.selectedItem.charAt(0).toUpperCase() + player.selectedItem.slice(1);
                if (player.selectedItem === 'bombs' || player.selectedItem === 'arrows') {
                    itemText = itemName + ' [' + player.inventory[player.selectedItem] + ']';
                } else {
                    itemText = itemName;
                }
            }
            ctx.fillText(`Item: ${itemText}`, 10, 53);
            if (player.level >= 6) {
                const magicReady = player.magicCooldown <= 0;
                ctx.fillStyle = magicReady ? '#c8f' : '#666';
                ctx.fillText(`C:Cycle V:Use B:Magic${magicReady ? '\u2713' : '..'}`, 10, 68);
            } else {
                ctx.fillStyle = '#fff';
                ctx.fillText(`C:Cycle V:Use`, 10, 68);
            }

            ctx.fillText(`Score: ${player.score}`, CANVAS_WIDTH - 150, 25);
            ctx.fillText(`Coins: ${player.coins}`, 10, 83);
            ctx.fillText(`Keys: ${player.keys}`, 10, 98);

            // Player stats
            ctx.fillStyle = '#fc0'; ctx.fillText(`ATK: ${player.attackPower}`, 10, 113);
            ctx.fillStyle = '#0cf'; ctx.fillText(`SPD: ${player.speed.toFixed(1)}`, 70, 113);
            ctx.fillStyle = '#8f8'; ctx.fillText(`DEF: ${player.defense}`, 140, 113);

            let locName = 'Overworld';
            if (gameState.currentDungeon === 0) locName = `Forest Temple - Room ${gameState.currentRoom + 1}`;
            else if (gameState.currentDungeon === 1) locName = `Shadow Cavern - Room ${gameState.currentRoom + 1}`;
            else if (gameState.currentDungeon === 2) locName = `Dragon Keep - Room ${gameState.currentRoom + 1}`;
            ctx.textAlign = 'right';
            ctx.fillText(locName, CANVAS_WIDTH - 10, CANVAS_HEIGHT - 10);

            if (player.hp <= 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 32px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
            }

            // Boss tracker
            ctx.textAlign = 'left';
            ctx.font = '11px Courier New';
            const bosses = ['Forest', 'Shadow', 'Dragon'];
            for (let i = 0; i < 3; i++) {
                ctx.fillStyle = gameState.bossesDefeated.has(i) ? '#0f0' : '#555';
                ctx.fillText((gameState.bossesDefeated.has(i) ? '\u2713 ' : '\u2022 ') + bosses[i], CANVAS_WIDTH - 150, 50 + i * 18);
            }

            // Touch buttons
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                ctx.globalAlpha = 0.4;
                // D-pad area
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(80, CANVAS_HEIGHT - 100, 50, 0, Math.PI * 2); ctx.stroke();
                ctx.fillStyle = '#0ff'; ctx.font = '16px Courier New'; ctx.textAlign = 'center';
                ctx.fillText('\u25B2', 80, CANVAS_HEIGHT - 140);
                ctx.fillText('\u25BC', 80, CANVAS_HEIGHT - 55);
                ctx.fillText('\u25C0', 40, CANVAS_HEIGHT - 96);
                ctx.fillText('\u25B6', 120, CANVAS_HEIGHT - 96);
                // Attack button
                ctx.fillStyle = '#f44'; ctx.beginPath(); ctx.arc(CANVAS_WIDTH - 80, CANVAS_HEIGHT - 120, 25, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.fillText('Z', CANVAS_WIDTH - 80, CANVAS_HEIGHT - 115);
                // Shield button
                ctx.fillStyle = '#08f'; ctx.beginPath(); ctx.arc(CANVAS_WIDTH - 80, CANVAS_HEIGHT - 60, 25, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.fillText('X', CANVAS_WIDTH - 80, CANVAS_HEIGHT - 55);
                // Cycle button (C)
                ctx.fillStyle = '#8f4'; ctx.beginPath(); ctx.arc(CANVAS_WIDTH - 150, CANVAS_HEIGHT - 120, 20, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.font = '14px Courier New'; ctx.fillText('C', CANVAS_WIDTH - 150, CANVAS_HEIGHT - 113);
                // Use button (V)
                ctx.fillStyle = '#f8f'; ctx.beginPath(); ctx.arc(CANVAS_WIDTH - 150, CANVAS_HEIGHT - 60, 20, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.fillText('V', CANVAS_WIDTH - 150, CANVAS_HEIGHT - 53);
                ctx.globalAlpha = 1;
                ctx.textAlign = 'left';
            }
        }

        function drawTransitionOverlay() {
            const alpha = Math.abs(gameState.transitionProgress - 0.5) * 2;
            ctx.fillStyle = `rgba(0,0,0,${alpha})`;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        }

        // ============================================================================
        // GAME LOOP
        // ============================================================================
        let gameOver = false;

        function drawMenu() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Title
            ctx.fillStyle = '#0f0';
            ctx.font = 'bold 36px Courier New';
            ctx.textAlign = 'center';
            ctx.shadowBlur = 10; ctx.shadowColor = '#0f0';
            ctx.fillText('LEGEND OF THE', CANVAS_WIDTH / 2, 150);
            ctx.fillStyle = '#0ff';
            ctx.shadowColor = '#0ff';
            ctx.fillText('LOST KINGDOM', CANVAS_WIDTH / 2, 200);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#888';
            ctx.font = '14px Courier New';
            ctx.fillText('A Top-Down Adventure', CANVAS_WIDTH / 2, 260);

            ctx.fillStyle = '#0a0';
            ctx.font = '12px Courier New';
            ctx.fillText('WASD / Arrow Keys - Move', CANVAS_WIDTH / 2, 320);
            ctx.fillText('Z - Sword Attack', CANVAS_WIDTH / 2, 345);
            ctx.fillText('X - Shield', CANVAS_WIDTH / 2, 370);
            ctx.fillText('Explore 3 Dungeons. Defeat 3 Bosses.', CANVAS_WIDTH / 2, 410);

            const pulse = Math.sin(gameState.frameCount * 0.05) * 0.3 + 0.7;
            ctx.fillStyle = `rgba(255, 255, 0, ${pulse})`;
            ctx.font = 'bold 18px Courier New';
            ctx.fillText('PRESS SPACE OR TAP TO START', CANVAS_WIDTH / 2, 480);
            ctx.textAlign = 'left';
        }

        function drawVictoryScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.textAlign = 'center';
            ctx.fillStyle = '#ff0';
            ctx.font = 'bold 36px Courier New';
            ctx.shadowBlur = 10; ctx.shadowColor = '#ff0';
            ctx.fillText('VICTORY!', CANVAS_WIDTH / 2, 200);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#0ff';
            ctx.font = '18px Courier New';
            ctx.fillText('All dungeons conquered!', CANVAS_WIDTH / 2, 260);
            ctx.fillText('Final Score: ' + player.score, CANVAS_WIDTH / 2, 300);
            ctx.textAlign = 'left';
        }

        function gameLoop() {
            gameState.frameCount++;

            if (gameState.screen === 'menu') {
                drawMenu();
                if (keys['Space'] || keys['Enter']) {
                    gameState.screen = 'playing';
                    keys['Space'] = false;
                    keys['Enter'] = false;
                }
                requestAnimationFrame(gameLoop);
                return;
            }

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            drawRoom();
            drawItems();
            drawProjectiles();
            enemies.forEach(drawEnemy);
            drawPlayer();
            drawParticles();

            // Level up screen flash
            if (levelUpFlash > 0) {
                const flashAlpha = (levelUpFlash / 40) * 0.6;
                ctx.fillStyle = `rgba(255,255,100,${flashAlpha})`;
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                levelUpFlash--;
            }

            drawHUD();

            if (gameState.transitioning) {
                gameState.transitionProgress += 0.02;
                drawTransitionOverlay();
            }

            if (gameState.screen === 'victory') {
                drawVictoryScreen();
            } else if (player.hp > 0) {
                updatePlayer();
                updateEnemies();
                updateProjectiles();
            } else if (!gameOver) {
                gameOver = true;
                setTimeout(() => showHS(player.score), 500);
            } else {
                // Game over screen
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#f00';
                ctx.font = 'bold 36px Courier New';
                ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 40);
                ctx.fillStyle = '#0ff';
                ctx.font = '16px Courier New';
                ctx.fillText('Score: ' + player.score, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
                const pulse = Math.sin(gameState.frameCount * 0.05) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(255, 255, 0, ${pulse})`;
                ctx.font = 'bold 14px Courier New';
                ctx.fillText('PRESS R OR TAP TO RESTART', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 40);
                ctx.textAlign = 'left';

                if (keys['KeyR'] || keys['Space']) {
                    keys['KeyR'] = false;
                    keys['Space'] = false;
                    restartGame();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // ============================================================================
        // RESTART
        // ============================================================================
        function restartGame() {
            player.x = 10 * 32 + 16;
            player.y = 7 * 32 + 16;
            player.hp = 100;
            player.maxHp = 100;
            player.score = 0;
            player.coins = 0;
            player.keys = 0;
            player.facing = 'down';
            player.attackCooldown = 0;
            player.shieldActive = false;
            player.invincible = false;
            player.invincibilityTimer = 0;
            player.level = 1;
            player.xp = 0;
            player.xpToNext = 100;
            player.attackPower = 25;
            player.defense = 0;
            player.speed = 3;
            player.inventory = {
                bow: false,
                boomerang: false,
                speedBoots: false,
                defenseRing: false,
                attackAmulet: false,
                bombs: 0,
                arrows: 0
            };
            player.selectedItem = null;
            player.magicCooldown = 0;
            levelUpFlash = 0;
            gameState.currentDungeon = -1;
            gameState.currentRoom = 0;
            gameState.transitioning = false;
            gameState.transitionProgress = 0;
            gameState.exploredRooms = new Set();
            gameState.bossesDefeated = new Set();
            gameState.screen = 'playing';
            gameOver = false;
            enemies = [];
            projectiles = [];
            items = [];
            particles = [];
            loadRoom();
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================
        loadRoom();
        gameLoop();
    </script>

    <div id="hs-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:10000;flex-direction:column">
        <div style="background:#1a1a2e;border:3px solid #0ff;border-radius:8px;padding:24px;max-width:320px;width:90%;box-shadow:0 0 20px #0ff">
            <h2 style="color:#fff;text-align:center;margin:0 0 12px 0;font-size:18px;font-family:Courier New">HIGH SCORES</h2>
            <div id="hs-game-score" style="color:#ff0;text-align:center;font-size:14px;margin-bottom:16px;font-family:Courier New;font-weight:bold">YOUR SCORE: 0</div>
            <div id="hs-list" style="margin-bottom:16px;font-family:Courier New;max-height:180px;overflow-y:auto"></div>
            <div id="hs-input" style="display:none;margin-bottom:12px">
                <input id="hs-name" type="text" placeholder="Enter name..." maxlength="16" style="width:100%;padding:8px;background:#0a0a1a;border:2px solid #0ff;color:#0ff;font-family:Courier New;font-size:12px;box-sizing:border-box">
            </div>
            <div style="text-align:center">
                <button id="hs-save-btn" style="display:none;padding:8px 16px;margin-right:8px;background:#0ff;color:#000;border:none;border-radius:4px;cursor:pointer;font-family:Courier New;font-weight:bold;font-size:12px">SAVE</button>
                <button id="hs-close-btn" style="padding:8px 16px;background:#ff0;color:#000;border:none;border-radius:4px;cursor:pointer;font-family:Courier New;font-weight:bold;font-size:12px">CLOSE</button>
            </div>
        </div>
    </div>

    <div style="position:fixed;bottom:6px;left:8px;font-family:monospace;font-size:10px;color:rgba(255,255,255,0.35);pointer-events:none;z-index:9999;">Updated: Mar 21, 2026</div>

    <script>
        const HS_KEY='sg_hs_kingdom';
        const HS_MAX=5;
        function getHS(){return JSON.parse(localStorage.getItem(HS_KEY)||'[]');}
        function showHS(currentScore){
            const ol=document.getElementById('hs-overlay');
            ol.style.display='flex';
            document.getElementById('hs-game-score').textContent='YOUR SCORE: '+currentScore;
            const scores=getHS();
            const qualifies=scores.length<HS_MAX||currentScore>(scores[scores.length-1]?.score||0);
            const listEl=document.getElementById('hs-list');
            listEl.innerHTML=scores.length===0?'<div style="color:#666;text-align:center;padding:12px">No scores yet</div>':
                scores.map((s,i)=>'<div style="display:flex;justify-content:space-between;padding:4px 8px;color:'+(i===0?'#ff0':'#0ff')+';font-size:13px"><span>'+(i+1)+'. '+s.name+'</span><span>'+s.score+'</span></div>').join('');
            if(qualifies&&currentScore>0){
                document.getElementById('hs-input').style.display='block';
                document.getElementById('hs-save-btn').style.display='inline-block';
                document.getElementById('hs-name').value=localStorage.getItem('sg_player_name')||'';
                document.getElementById('hs-name').focus();
                window._hsCurrentScore=currentScore;
            }else{
                document.getElementById('hs-input').style.display='none';
                document.getElementById('hs-save-btn').style.display='none';
            }
        }
        function saveHS(){
            const name=(document.getElementById('hs-name').value||'ANONYMOUS').slice(0,16).toUpperCase();
            localStorage.setItem('sg_player_name',name);
            let scores=getHS();
            scores.push({name,score:window._hsCurrentScore});
            scores.sort((a,b)=>b.score-a.score);
            scores=scores.slice(0,HS_MAX);
            localStorage.setItem(HS_KEY,JSON.stringify(scores));
            document.getElementById('hs-input').style.display='none';
            document.getElementById('hs-save-btn').style.display='none';
            const listEl=document.getElementById('hs-list');
            listEl.innerHTML=scores.map((s,i)=>'<div style="display:flex;justify-content:space-between;padding:4px 8px;color:'+(i===0?'#ff0':'#0ff')+';font-size:13px"><span>'+(i+1)+'. '+s.name+'</span><span>'+s.score+'</span></div>').join('');
        }
        function closeHS(){document.getElementById('hs-overlay').style.display='none';}
        document.getElementById('hs-save-btn')?.addEventListener('click',saveHS);
        document.getElementById('hs-close-btn')?.addEventListener('click',closeHS);
        document.getElementById('hs-name')?.addEventListener('keypress',(e)=>{if(e.key==='Enter')saveHS();});
    </script>
</body>
